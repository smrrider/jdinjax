<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eBay Listing Agent v5.6.0</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="eBay Scout">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    
    <!-- Script Imports (Tactical Baseline) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@0.263.0" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
        .auth-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); }
        .login-field { background: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .login-field:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .listing-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .listing-card:hover { transform: translateY(-2px); }
        .scout-fab { box-shadow: 0 8px 32px rgba(16, 185, 129, 0.45); }
        .scout-modal-bg { animation: fadeInBg 0.2s ease; }
        .scout-modal { animation: slideUpModal 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpModal { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .verdict-go { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-color: #6ee7b7; color: #065f46; }
        .verdict-marginal { background: linear-gradient(135deg, #fef9c3, #fde68a); border-color: #fcd34d; color: #78350f; }
        .verdict-nogo { background: linear-gradient(135deg, #fee2e2, #fecaca); border-color: #fca5a5; color: #7f1d1d; }
        .scout-history-item { transition: all 0.15s ease; }
        .scout-history-item:hover { background: #f1f5f9; }
        /* Desktop 3-panel layout */
        .desktop-layout { display: flex; height: 100vh; overflow: hidden; }
        .panel-left { width: 240px; min-width: 240px; height: 100vh; overflow-y: auto; border-right: 1px solid #e2e8f0; background: #ffffff; }
        .panel-center { flex: 1; height: 100vh; overflow-y: auto; background: #f1f5f9; }
        .panel-right { width: 400px; min-width: 400px; height: 100vh; overflow-y: auto; border-left: 1px solid #e2e8f0; background: #ffffff; }
        /* Scanner overlay */
        .scanner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-viewport { position: relative; width: 100%; height: 420px; border-radius: 16px; overflow: hidden; }
        .scanner-viewport video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-corner { position: absolute; width: 32px; height: 32px; border-color: #10b981; border-style: solid; }
        .scanner-corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scanner-corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scanner-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .scanner-corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-line { position: absolute; left: 8px; right: 8px; height: 2px; background: linear-gradient(90deg, transparent, #10b981, transparent); animation: scanLine 2s ease-in-out infinite; }
        @keyframes scanLine { 0%,100% { top: 10%; } 50% { top: 85%; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>
    <script>
    window._loadErrors = [];
    window.onerror = function(msg, src, line, col, err) {
        var info = '<div style="font-family:monospace;padding:20px;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px">'
            + '<h2 style="margin:0 0 12px">App Error</h2>'
            + '<p><b>Message:</b> ' + msg + '</p>'
            + '<p><b>Source:</b> ' + (src||'unknown') + '</p>'
            + '<p><b>Line:</b> ' + line + ':' + col + '</p>'
            + '<pre style="background:#fca5a5;padding:8px;border-radius:4px;overflow:auto;white-space:pre-wrap">' + (err && err.stack ? err.stack : 'no stack') + '</pre>';
        if (window._loadErrors.length) {
            info += '<p><b>Failed script loads:</b></p><ul>' + window._loadErrors.map(function(e){return '<li>'+e+'</li>';}).join('') + '</ul>';
        }
        info += '</div>';
        document.getElementById('root').innerHTML = info;
        return true;
    };
    // Detect which CDN scripts fail to load
    document.addEventListener('error', function(e) {
        if (e.target && e.target.src) {
            window._loadErrors.push(e.target.src);
            document.getElementById('root').innerHTML = '<div style="font-family:monospace;padding:20px;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px">'
                + '<h2>CDN Load Failure</h2>'
                + '<p>Failed to load: <b>' + e.target.src + '</b></p>'
                + '<p>Check your internet connection or firewall blocking unpkg.com/CDN URLs.</p>'
                + '</div>';
        }
    }, true);
    console.log('[JDINJAX] v5.5.0 loading - checking CDN...');
    </script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const APP_VERSION = "5.5.0"; // 3-panel desktop + barcode scanner

        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';
        const SIGN_API_URL     = _isLocal ? 'http://127.0.0.1:3001/api/sign-upload' : '/api/sign-upload';
        const CATEGORY_API_URL = _isLocal ? 'http://127.0.0.1:3001/api/category-resolve' : '/api/category-resolve';
        const BARCODE_API_URL  = _isLocal ? 'http://127.0.0.1:3001/api/barcode-search' : '/api/barcode-search';

        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
        };

        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        // ── Condition sets — eBay condition IDs are category-dependent ────────────
        const EBAY_CONDITIONS_STANDARD = [
            { id: '1000', label: 'New' },
            { id: '1500', label: 'New — Other' },
            { id: '2000', label: 'Seller Refurbished' },
            { id: '2500', label: 'Used — Like New' },
            { id: '3000', label: 'Used — Good' },
            { id: '4000', label: 'Used — Acceptable' },
            { id: '7000', label: 'For Parts / Not Working' }
        ];
        const EBAY_CONDITIONS_CLOTHING = [
            { id: '1000', label: 'New with Tags' },
            { id: '1500', label: 'New without Tags' },
            { id: '1750', label: 'New with Defects' },
            { id: '3000', label: 'Pre-owned' }
        ];
        // eBay clothing supertree — categoryId '11450' = Clothing, Shoes & Accessories
        const CLOTHING_CATEGORY_IDS = new Set([
            '11450','11483','11484','11485','11486','11487','11488','11489',
            '15709','15724','15725','15726','15727','15728','15729','15730',
            '57988','57989','57990','63861','63862','63863','63864','155183',
            '11509','11510','11511','11512','11513','11514','11515','11516',
            '175759','175760','175761','175762','175763','175764','175765'
        ]);
        const EBAY_CONDITIONS = EBAY_CONDITIONS_STANDARD; // legacy alias

        const getConditionSet = (categoryId) => {
            if (!categoryId) return EBAY_CONDITIONS_STANDARD;
            if (CLOTHING_CATEGORY_IDS.has(String(categoryId))) return EBAY_CONDITIONS_CLOTHING;
            return EBAY_CONDITIONS_STANDARD;
        };

        const sanitizeConditionId = (conditionId, categoryId) => {
            const set = getConditionSet(categoryId);
            if (set.some(s => s.id === conditionId)) return conditionId;
            return set[0].id; // default to first valid option
        };

        const JDINJAX_SYSTEM_PROMPT = "Role: eBay Listing Pro for Black Knight Armament. Identify the item in the photos. Title STRICT MAX 80 CHARS. Prices should end in .95. Calculate initial price assuming NEW/Excellent condition. For categoryId and categoryPath: be as specific as possible  -  use the deepest applicable eBay leaf category. For firearms accessories use categories like 73944 (Scopes, Sights & Optics), 73943 (Grips, Forends & Stocks), 73938 (Magazines), 177891 (Cleaning Equipment), 73949 (Slings & Swivels). For general items use the most precise leaf node. Format response as JSON strictly.";



        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title: { type: "STRING" },
                categoryPath: { type: "STRING" },
                categoryId: { type: "STRING" },
                buyItNowPrice: { type: "NUMBER" },
                keyFeatures: { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded: { type: "ARRAY", items: { type: "STRING" } },
                flaws: { type: "STRING" },
                weightItem: { type: "STRING" },
                weightPackaging: { type: "STRING" },
                weightTotal: { type: "STRING" },
                dimensions:          { type: "STRING" },
                brand:               { type: "STRING" },
                itemType:            { type: "STRING" },
                markdownDescription: { type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };
        // --- BARCODE SCANNER -----------------------------------------------------

        const BarcodeScanner = ({ onScan, onClose }) => {
            const videoRef   = useRef(null);
            const readerRef  = useRef(null);
            const inputRef   = useRef(null);
            const [mode, setMode]     = useState('input');   // 'input' | 'camera'
            const [manualVal, setManualVal] = useState('');
            const [camError, setCamError]   = useState(null);
            const [camActive, setCamActive] = useState(false);

            // Auto-focus the text input when modal opens
            useEffect(() => {
                if (mode === 'input') {
                    setTimeout(() => inputRef.current && inputRef.current.focus(), 120);
                }
            }, [mode]);

            // Start camera when switching to camera mode
            useEffect(() => {
                if (mode !== 'camera') return;
                if (!window.ZXing) { setCamError('Scanner library not loaded.'); return; }
                const codeReader = new window.ZXing.BrowserMultiFormatReader();
                readerRef.current = codeReader;
                setCamActive(true);
                codeReader.decodeFromVideoDevice(null, videoRef.current, (result, err) => {
                    if (result) { codeReader.reset(); onScan(result.getText()); }
                    if (err && !(err instanceof window.ZXing.NotFoundException)) console.warn('[Scanner]', err);
                }).catch(() => setCamError('Camera access denied. Check browser permissions.'));
                return () => { try { codeReader.reset(); } catch(e){} };
            }, [mode]);

            const stopCamera = () => {
                if (readerRef.current) try { readerRef.current.reset(); } catch(e){}
                setCamActive(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && manualVal.trim().length >= 4) {
                    onScan(manualVal.trim());
                }
            };

            const handleSubmit = () => {
                if (manualVal.trim().length >= 4) onScan(manualVal.trim());
            };

            return (
                <div className="scanner-overlay" onClick={(e) => { if (e.target === e.currentTarget) { stopCamera(); onClose(); }}}>
                    <div className="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl mx-4">

                        {/* Header */}
                        <div className="px-6 py-5 border-b border-slate-700 flex items-center justify-between">
                            <div>
                                <p className="text-white font-black text-sm uppercase tracking-widest">Barcode Lookup</p>
                                <p className="text-slate-400 text-[10px] mt-0.5 uppercase tracking-widest">Gun · Keyboard · Camera</p>
                            </div>
                            <button onClick={() => { stopCamera(); onClose(); }} className="text-slate-500 hover:text-white transition-colors p-1">
                                <Icon name="X" size={18}/>
                            </button>
                        </div>

                        {/* Mode toggle */}
                        <div className="px-6 pt-5 flex gap-2">
                            <button onClick={() => { stopCamera(); setMode('input'); }}
                                className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 " + (mode === 'input' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-800 text-slate-400 hover:bg-slate-700")}>
                                <Icon name="Keyboard" size={13}/> Type / Gun
                            </button>
                            <button onClick={() => setMode('camera')}
                                className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 " + (mode === 'camera' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-800 text-slate-400 hover:bg-slate-700")}>
                                <Icon name="Camera" size={13}/> Camera
                            </button>
                        </div>

                        {/* Input mode */}
                        {mode === 'input' && (
                            <div className="px-6 py-5 space-y-4">
                                <div className="bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3 flex items-center gap-3 focus-within:border-emerald-500 transition-colors">
                                    <Icon name="ScanLine" size={18} className="text-emerald-400 shrink-0"/>
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        value={manualVal}
                                        onChange={e => setManualVal(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="Scan or type barcode..."
                                        className="flex-1 bg-transparent text-white font-black text-sm placeholder-slate-500 focus:outline-none tracking-widest"
                                        autoComplete="off"
                                        autoCorrect="off"
                                        spellCheck={false}
                                    />
                                    {manualVal.length > 0 && (
                                        <button onClick={() => setManualVal('')} className="text-slate-500 hover:text-white transition-colors">
                                            <Icon name="X" size={14}/>
                                        </button>
                                    )}
                                </div>
                                <p className="text-slate-500 text-[10px] uppercase tracking-widest text-center">
                                    Scanning gun fires on trigger · Keyboard press Enter
                                </p>
                                <button onClick={handleSubmit} disabled={manualVal.trim().length < 4}
                                    className={"w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-2 " + (manualVal.trim().length >= 4 ? "bg-emerald-500 text-white hover:bg-emerald-400 shadow-lg shadow-emerald-900/50" : "bg-slate-800 text-slate-600 cursor-not-allowed")}>
                                    <Icon name="Search" size={14}/> Search
                                </button>
                            </div>
                        )}

                        {/* Camera mode */}
                        {mode === 'camera' && (
                            <div className="px-6 py-5">
                                {camError ? (
                                    <div className="bg-red-900/50 border border-red-700 rounded-2xl px-5 py-4 text-center">
                                        <p className="text-red-300 text-sm font-bold">{camError}</p>
                                        <button onClick={() => { setCamError(null); setMode('input'); }} className="mt-3 px-5 py-2 bg-red-500 text-white rounded-xl text-xs font-black uppercase">Back to Input</button>
                                    </div>
                                ) : (
                                    <div className="scanner-viewport mx-auto">
                                        <video ref={videoRef} className="w-full h-full object-cover" />
                                        <div className="scanner-corner tl" /><div className="scanner-corner tr" />
                                        <div className="scanner-corner bl" /><div className="scanner-corner br" />
                                        <div className="scan-line" />
                                    </div>
                                )}
                                {!camError && (
                                    <p className="text-slate-500 text-[10px] uppercase tracking-widest text-center mt-4">
                                        UPC · EAN · QR · Code128  -  auto-detects
                                    </p>
                                )}
                            </div>
                        )}

                        <div className="px-6 pb-6">
                            <button onClick={() => { stopCamera(); onClose(); }} className="w-full py-3 bg-slate-800 text-slate-400 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition-all">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ScanResult = ({ upc, onClose, onSendToScout, onSendToListing, showToast }) => {
            const [engine, setEngine]     = useState('ebay');
            const [loading, setLoading]   = useState(true);
            const [results, setResults]   = useState([]);
            const [topTitle, setTopTitle] = useState('');
            const [selected, setSelected] = useState(0);

            useEffect(() => { doSearch('ebay'); }, []);

            const doSearch = async (eng) => {
                setLoading(true); setEngine(eng);
                try {
                    const res = await fetch(BARCODE_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ upc, engine: eng })
                    });
                    const d = await res.json();
                    setResults(d.results || []);
                    setTopTitle(d.results?.[0]?.title || '');
                    setSelected(0);
                } catch(e) { showToast('Search failed: ' + e.message); }
                finally { setLoading(false); }
            };

            const selectedItem = results[selected] || {};

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onClick={(e) => { if(e.target===e.currentTarget) onClose(); }}>
                    <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
                        {/* Header */}
                        <div className="bg-slate-900 px-6 py-4 flex items-center justify-between">
                            <div>
                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Barcode Detected</p>
                                <p className="text-emerald-400 font-black text-sm tracking-wider">{upc}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-white transition-colors"><Icon name="X" size={18}/></button>
                        </div>

                        {/* Engine toggle */}
                        <div className="px-6 pt-5 flex gap-2">
                            {['ebay','amazon'].map(eng => (
                                <button key={eng} onClick={() => doSearch(eng)}
                                    className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all " + (engine===eng ? (eng==='ebay' ? 'bg-blue-600 text-white shadow-md' : 'bg-orange-500 text-white shadow-md') : 'bg-slate-100 text-slate-500 hover:bg-slate-200')}>
                                    {eng === 'ebay' ? 'eBay' : 'Amazon'}
                                </button>
                            ))}
                        </div>

                        {/* Results */}
                        <div className="px-6 py-4 max-h-64 overflow-y-auto no-scrollbar">
                            {loading ? (
                                <div className="flex items-center justify-center py-8 gap-3">
                                    <Icon name="Loader2" size={20} className="text-blue-500 animate-spin" />
                                    <span className="text-[11px] font-black text-slate-400 uppercase">Searching {engine}...</span>
                                </div>
                            ) : results.length === 0 ? (
                                <div className="text-center py-8">
                                    <p className="text-[11px] font-black text-slate-400 uppercase">No results found</p>
                                    <p className="text-[10px] text-slate-300 mt-1">Try the other marketplace</p>
                                </div>
                            ) : results.map((r, i) => (
                                <div key={i} onClick={() => setSelected(i)}
                                    className={"flex gap-3 p-3 rounded-2xl cursor-pointer transition-all mb-2 border " + (selected===i ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-transparent hover:border-slate-200')}>
                                    {r.image && <img src={r.image} className="w-12 h-12 rounded-xl object-cover border border-slate-200 shrink-0" />}
                                    <div className="min-w-0 flex-1">
                                        <p className="text-[10px] font-black text-slate-800 leading-tight line-clamp-2">{r.title}</p>
                                        {r.price && <p className="text-[11px] font-black text-emerald-600 mt-1">{r.price}</p>}
                                        {r.condition && <p className="text-[9px] text-slate-400 uppercase mt-0.5">{r.condition}</p>}
                                    </div>
                                    {selected===i && <div className="w-4 h-4 bg-blue-600 rounded-full shrink-0 mt-1 flex items-center justify-center"><Icon name="Check" size={10} className="text-white"/></div>}
                                </div>
                            ))}
                        </div>

                        {/* Destination buttons */}
                        {!loading && results.length > 0 && (
                            <div className="px-6 pb-6 grid grid-cols-2 gap-3 border-t border-slate-100 pt-4">
                                <button onClick={() => onSendToScout(selectedItem, upc)}
                                    className="py-4 bg-emerald-500 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-400 transition-all active:scale-95 flex flex-col items-center gap-1">
                                    <Icon name="Zap" size={16}/>
                                    Send to Scout
                                </button>
                                <button onClick={() => onSendToListing(selectedItem, upc)}
                                    className="py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-100 hover:bg-blue-500 transition-all active:scale-95 flex flex-col items-center gap-1">
                                    <Icon name="FileText" size={16}/>
                                    Send to Listing
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- ARBITRAGE SCOUT -----------------------------------------------------

        const SCOUT_SYSTEM_PROMPT = `You are an expert eBay arbitrage analyst and resale market specialist. 
Analyze the provided item image and condition, then return a complete arbitrage assessment as JSON.
All prices must end in .95. Be precise and realistic based on actual eBay sold listings data.
Return ONLY valid JSON  -  no markdown, no preamble.`;

        const SCOUT_SCHEMA = {
            type: "OBJECT",
            properties: {
                itemTitle:        { type: "STRING" },
                itemDescription:  { type: "STRING" },
                priceLow:         { type: "NUMBER" },
                priceMid:         { type: "NUMBER" },
                priceHigh:        { type: "NUMBER" },
                priceConfidence:  { type: "STRING" },
                priceBasis:       { type: "STRING" },
                sellThroughRate:  { type: "NUMBER" },
                velocityLabel:    { type: "STRING" },
                daysToSell:       { type: "NUMBER" },
                weightOz:         { type: "NUMBER" },
                packageLengthIn:  { type: "NUMBER" },
                packageWidthIn:   { type: "NUMBER" },
                packageHeightIn:  { type: "NUMBER" },
            },
            required: ["itemTitle","priceMid","sellThroughRate","velocityLabel","daysToSell","weightOz","packageLengthIn","packageWidthIn","packageHeightIn"]
        };

        // USPS Ground Advantage Zone 8 rate table (oz -> cents, as of 2024 schedule)
        // Source: USPS Retail Ground Advantage Zone 8 published rates
        const getUspsZone8Rate = (weightOz, lengthIn, widthIn, heightIn) => {
            // Dimensional weight check (USPS uses 139 divisor for Retail)
            const dimWeight = (lengthIn * widthIn * heightIn) / 139;
            const billableOz = Math.max(weightOz, dimWeight * 16);
            const billableLbs = billableOz / 16;

            // Zone 8 Ground Advantage rates (2024)
            const rates = [
                { max: 4/16,   price: 5.55 },
                { max: 8/16,   price: 6.10 },
                { max: 12/16,  price: 6.65 },
                { max: 1,      price: 7.20 },
                { max: 2,      price: 8.95 },
                { max: 3,      price: 10.40 },
                { max: 4,      price: 11.85 },
                { max: 5,      price: 13.30 },
                { max: 6,      price: 14.75 },
                { max: 7,      price: 16.20 },
                { max: 8,      price: 17.65 },
                { max: 9,      price: 19.10 },
                { max: 10,     price: 20.55 },
                { max: 11,     price: 22.00 },
                { max: 12,     price: 23.45 },
                { max: 13,     price: 24.90 },
                { max: 14,     price: 26.35 },
                { max: 15,     price: 27.80 },
                { max: 16,     price: 29.25 },
                { max: 20,     price: 34.50 },
                { max: 25,     price: 40.95 },
                { max: 30,     price: 47.40 },
                { max: 40,     price: 57.50 },
                { max: 50,     price: 67.65 },
                { max: 70,     price: 82.10 },
            ];

            for (const tier of rates) {
                if (billableLbs <= tier.max) return tier.price;
            }
            return 82.10 + ((billableLbs - 70) * 0.80); // overage estimate
        };

        // shippingMode: 'flat' | 'free' | 'pickup'
        const calcArbitrage = (priceMid, purchasePrice, uspsEstimate, shippingMode, flatFee) => {
            const packaging = 2.00;
            if (shippingMode === 'pickup') {
                const netProfit = priceMid - purchasePrice - packaging;
                const roi = purchasePrice > 0 ? (netProfit / purchasePrice) * 100 : 0;
                return { ebayFVF: 0, paymentFee: 0, packaging, uspsEstimate: 0, flatFeeCollected: 0, netShippingCost: 0, totalFees: packaging, netProfit, roi };
            }
            const ebayFVF          = priceMid * 0.1325;
            const paymentFee       = priceMid * 0.029 + 0.30;
            const flatFeeCollected = shippingMode === 'flat' ? (parseFloat(flatFee) || 0) : 0;
            const netShippingCost  = uspsEstimate - flatFeeCollected;
            const totalFees        = ebayFVF + paymentFee + packaging + netShippingCost;
            const netProfit        = priceMid - purchasePrice - totalFees;
            const roi              = purchasePrice > 0 ? (netProfit / purchasePrice) * 100 : 0;
            return { ebayFVF, paymentFee, packaging, uspsEstimate, flatFeeCollected, netShippingCost, totalFees, netProfit, roi };
        };

        const getVerdict = (netProfit) => {
            if (netProfit >= 15)  return { label: 'GO',       css: 'verdict-go',       tag: 'GO' };
            if (netProfit >= 5)   return { label: 'MARGINAL', css: 'verdict-marginal', tag: 'MARGINAL' };
            return                       { label: 'NO-GO',    css: 'verdict-nogo',     tag: 'NO-GO' };
        };

        const ArbitrageScout = ({ proxyUrl, ebayConditions, showToast, dbRef, user, inline = false, scanPreload = null, onScanRequest, onSendToProcessing }) => {
            const [isOpen,        setIsOpen]        = useState(false);
            const [scoutImage,    setScoutImage]     = useState(null);
            const [condition,     setCondition]      = useState('3000');
            const [purchasePrice, setPurchasePrice]  = useState('');
            const [isRunning,     setIsRunning]      = useState(false);
            const [scoutStatus,   setScoutStatus]    = useState('');
            const [result,        setResult]         = useState(null);
            const [history,       setHistory]        = useState([]);
            const [activeHistory, setActiveHistory]  = useState(null);
            const [confirmPurge,  setConfirmPurge]   = useState(false);
            const [shippingMode,    setShippingMode]   = useState('flat');
            const [flatShippingFee, setFlatShippingFee] = useState('6.95');
            const [barcodePreload,  setBarcodePreload]  = useState(null);
            const [errorMsg,      setErrorMsg]       = useState(null);
            const [scoutInputMode,   setScoutInputMode]  = useState('upload'); // 'upload' | 'scan'
            const [scoutCamActive,   setScoutCamActive]  = useState(false);
            const [scoutCamError,    setScoutCamError]   = useState(null);
            const [scoutScanUpc,     setScoutScanUpc]    = useState(null);
            const [scoutScanResults, setScoutScanResults]= useState(null);
            const [scoutManualTitle, setScoutManualTitle]= useState('');
            const scoutVideoRef  = useRef(null);
            const scoutReaderRef = useRef(null);

            // Load Scout history from Firestore on mount
            useEffect(() => {
                if (!user || !dbRef || !dbRef.current) return;
                const path = `artifacts/jdinjax-console/users/${user.uid}/scoutHistory`;
                const unsubscribe = dbRef.current.collection(path)
                    .orderBy('savedAt', 'desc').limit(20)
                    .onSnapshot(snap => {
                        setHistory(snap.docs.map(doc => ({ _docId: doc.id, ...doc.data() })));
                    });
                return () => unsubscribe();
            }, [user, dbRef]);

            // Handle barcode preload from scan
            useEffect(() => {
                if (!scanPreload) return;
                setBarcodePreload(scanPreload);
                setIsOpen(true);
                // Auto-fill purchase price from market price if available
                if (scanPreload.price) {
                    const numeric = parseFloat(scanPreload.price.replace(/[^0-9.]/g, ''));
                    if (numeric > 0) setPurchasePrice(String(numeric.toFixed(2)));
                }
            }, [scanPreload]);

            // ── Scout inline camera helpers ──────────────────────────────────────────
            const stopScoutCam = () => {
                if (scoutReaderRef.current) { try { scoutReaderRef.current.reset(); } catch(e){} scoutReaderRef.current = null; }
                setScoutCamActive(false);
                setScoutCamError(null);
            };

            const startScoutCam = () => {
                if (!window.ZXing) { setScoutCamError('Scanner library not loaded.'); return; }
                setScoutCamError(null);
                setScoutCamActive(true);
                const reader = new window.ZXing.BrowserMultiFormatReader();
                scoutReaderRef.current = reader;
                // Poll for video element — modal renders async; fixed delay unreliable on mobile
                let _attempts = 0;
                console.log('[ScoutCam] startScoutCam called, ZXing:', !!window.ZXing);
                const _waitForVideo = () => {
                    console.log('[ScoutCam] poll attempt', _attempts, '| readerRef:', !!scoutReaderRef.current, '| videoRef:', !!scoutVideoRef.current);
                    if (!scoutReaderRef.current) { console.log('[ScoutCam] aborted — readerRef cleared'); return; }
                    if (!scoutVideoRef.current) {
                        if (++_attempts > 25) { 
                            console.error('[ScoutCam] TIMEOUT after 25 attempts');
                            setScoutCamError('Camera timed out — try again.'); setScoutCamActive(false); return; 
                        }
                        return setTimeout(_waitForVideo, 100);
                    }
                    console.log('[ScoutCam] video element found, attaching decoder');
                    reader.decodeFromVideoDevice(null, scoutVideoRef.current, async (result, err) => {
                        if (result) {
                            const upc = result.getText();
                            // Stop reader BEFORE changing mode to avoid removeChild crash
                            try { reader.reset(); } catch(e) {}
                            scoutReaderRef.current = null;
                            setScoutCamActive(false);
                            // Fetch barcode data, then switch mode
                            setScoutScanResults({ loading: true, items: [], noResults: false });
                            setScoutScanUpc(upc);
                            setScoutInputMode('upload'); // switch away from camera AFTER reader stopped
                            const BARCODE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                                ? 'http://127.0.0.1:3001/api/barcode-search'
                                : '/api/barcode-search';
                            try {
                                const res = await fetch(BARCODE_URL, {
                                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ upc, engine: 'ebay' })
                                });
                                const data = await res.json();
                                const items = data.results || [];
                                setScoutScanResults({ loading: false, items, noResults: items.length === 0 });
                            } catch(e) {
                                setScoutScanResults({ loading: false, items: [], noResults: true });
                            }
                        }
                        if (err && !(err instanceof window.ZXing.NotFoundException)) console.warn('[ScoutCam]', err);
                    }).catch(e => { setScoutCamError('Camera access denied. Check browser permissions.'); setScoutCamActive(false); });
                };
                setTimeout(_waitForVideo, 50);
            };

            const reset = () => {
                setScoutImage(null); setCondition('3000'); setPurchasePrice('');
                setShippingMode('flat'); setFlatShippingFee('6.95');
                setResult(null); setErrorMsg(null); setScoutStatus(''); setActiveHistory(null);
                stopScoutCam(); setScoutInputMode('upload'); setScoutScanUpc(null); setScoutScanResults(null); setScoutManualTitle('');
            };

            const purgeHistory = async () => {
                if (!user || !dbRef || !dbRef.current) return;
                try {
                    const path = `artifacts/jdinjax-console/users/${user.uid}/scoutHistory`;
                    const snap = await dbRef.current.collection(path).get();
                    if (snap.empty) return;
                    const batch = dbRef.current.batch();
                    snap.docs.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    setActiveHistory(null);
                    setResult(null);
                    setConfirmPurge(false);
                    showToast('Scout history cleared.');
                } catch(e) { setConfirmPurge(false); showToast('Purge failed: ' + e.message); }
            };

            const displayResult = activeHistory !== null ? history[activeHistory] : result;

            const runScout = async () => {
                const hasBarcode = !!barcodePreload;
                if (!scoutImage && !hasBarcode) { setErrorMsg("Upload an image or scan a barcode first."); return; }
                if (purchasePrice === '' || purchasePrice === null || purchasePrice === undefined) { setErrorMsg("Enter a purchase price."); return; }
                setIsRunning(true); setErrorMsg(null); setResult(null);
                try {
                    // Skip compression if no image  -  barcode text-only path
                    let scoutBlob = null, b64 = null, scoutMimeType = null;
                    if (scoutImage) {
                        setScoutStatus("Compressing image...");
                        const compressed = await new Promise((res, rej) => {
                            const img = new Image();
                            img.onload = () => {
                                const MAX = 1024;
                                let w = img.width, h = img.height;
                                if (w > MAX || h > MAX) {
                                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                                    else       { w = Math.round(w * MAX / h); h = MAX; }
                                }
                                const canvas = document.createElement('canvas');
                                canvas.width = w; canvas.height = h;
                                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                canvas.toBlob(blob => {
                                    const reader = new FileReader();
                                    reader.onload = e => res({ scoutBlob: blob, b64: e.target.result.split(',')[1], scoutMimeType: 'image/jpeg' });
                                    reader.readAsDataURL(blob);
                                }, 'image/jpeg', 0.82);
                            };
                            img.onerror = () => rej(new Error("Image load failed"));
                            img.src = scoutImage.url;
                        });
                        scoutBlob = compressed.scoutBlob;
                        b64 = compressed.b64;
                        scoutMimeType = compressed.scoutMimeType;
                    } // end if(scoutImage)
                    const condLabel = ebayConditions.find(c => c.id === condition)?.label || 'Used';

                    // Cloudinary upload  -  skip if no image (barcode text-only mode)
                    const cloudinaryUpload = (async () => {
                        if (!scoutBlob) return barcodePreload?.image || null;
                        try {
                            const timestamp = Math.round(Date.now() / 1000);
                            const signRes = await fetch(SIGN_API_URL, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId: user.uid, timestamp })
                            });
                            const { signature, folder } = await signRes.json();
                            const fd = new FormData();
                            fd.append("file", scoutBlob);
                            fd.append("api_key", CLOUDINARY_CONFIG.apiKey);
                            fd.append("timestamp", timestamp);
                            fd.append("signature", signature);
                            fd.append("folder", folder);
                            const upRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const upData = await upRes.json();
                            return upData.secure_url || scoutImage.url;
                        } catch(e) { console.warn('[Scout] Image upload failed:', e.message); return scoutImage.url; }
                    })();

                    setScoutStatus("Running intel analysis...");

                    // Build Gemini parts  -  image if available, barcode title if not
                    const geminiParts = [];
                    if (hasBarcode && barcodePreload.title) {
                        geminiParts.push({ text: `Item: ${barcodePreload.title}${barcodePreload.price ? '. Current market price: ' + barcodePreload.price : ''}. UPC: ${barcodePreload.upc || ''}. Condition: ${condLabel}. Analyze for eBay arbitrage  -  provide pricing, sell-through rate, days to sell, and estimated package dimensions.` });
                    } else {
                        geminiParts.push({ text: `Analyze this item for eBay arbitrage. Condition: ${condLabel}. Provide realistic pricing based on actual eBay sold data, sell-through rate, days to sell, and estimated package dimensions for shipping.` });
                    }
                    if (b64) geminiParts.push({ inlineData: { mimeType: scoutMimeType, data: b64 } });

                    // Gemini + Cloudinary race in parallel  -  net time = max(gemini, upload) not sum
                    const geminiRes = fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: "gemini-2.5-flash",
                            contents: [{ role: "user", parts: geminiParts }],
                            systemInstruction: { parts: [{ text: SCOUT_SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json", responseSchema: SCOUT_SCHEMA }
                        })
                    });

                    const [geminiResponse, persistentImageUrl] = await Promise.all([geminiRes.then(r => r.json()), cloudinaryUpload]);
                    const raw  = geminiResponse.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
                    const ai   = JSON.parse(raw);

                    setScoutStatus("Calculating shipping...");
                    const uspsEstimate = getUspsZone8Rate(ai.weightOz, ai.packageLengthIn, ai.packageWidthIn, ai.packageHeightIn);
                    const purchase     = parseFloat(purchasePrice) || 0;
                    const flatFee      = parseFloat(flatShippingFee) || 0;
                    const arb          = calcArbitrage(ai.priceMid, purchase, uspsEstimate, shippingMode, flatFee);
                    const shipping     = uspsEstimate;
                    const verdict   = getVerdict(arb.netProfit);

                    const scoutResult = {
                        ...ai, condition: condLabel, purchasePrice: purchase,
                        shipping, arb, verdict, shippingMode,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        imageUrl: persistentImageUrl
                    };

                    setResult(scoutResult);
                    setActiveHistory(null);
                    setBarcodePreload(null);

                    // Persist to Firestore, enforce 20-result cap
                    if (user && dbRef && dbRef.current) {
                        try {
                            const path = `artifacts/jdinjax-console/users/${user.uid}/scoutHistory`;
                            const colRef = dbRef.current.collection(path);
                            await colRef.add({ ...scoutResult, savedAt: Date.now() });
                            // Prune to 20  -  delete oldest beyond cap
                            const all = await colRef.orderBy('savedAt', 'desc').get();
                            if (all.docs.length > 20) {
                                const batch = dbRef.current.batch();
                                all.docs.slice(20).forEach(d => batch.delete(d.ref));
                                await batch.commit();
                            }
                        } catch(saveErr) { console.warn('Scout save failed:', saveErr.message); }
                    }
                } catch(e) { setErrorMsg("Scout failed: " + e.message); }
                finally { setIsRunning(false); setScoutStatus(''); }
            };

            // -- Inline mode: desktop right panel -------------------------------------
            if (inline) {
                const renderCostStack = (r) => {
                    const mode = r.shippingMode || 'flat';
                    const usps = r.arb.uspsEstimate || r.shipping || 0;
                    const rows = [
                        { label: 'Sale Price', val: r.priceMid, pos: true },
                        { label: 'Purchase Cost', val: -r.purchasePrice },
                    ];
                    if (mode !== 'pickup') {
                        rows.push({ label: 'eBay FVF (13.25%)', val: -r.arb.ebayFVF });
                        rows.push({ label: 'Payment (2.9%+$0.30)', val: -r.arb.paymentFee });
                    }
                    rows.push({ label: 'Packaging', val: -r.arb.packaging });
                    if (mode === 'free') {
                        rows.push({ label: 'USPS Zone 8', val: -usps });
                    } else if (mode === 'flat') {
                        rows.push({ label: 'USPS Zone 8', val: -usps });
                        if ((r.arb.flatFeeCollected || 0) > 0) rows.push({ label: 'Flat Fee Collected', val: r.arb.flatFeeCollected, pos: true });
                    }
                    return rows.map((row, i) => (
                        <div key={i} className={"flex justify-between items-center py-1 " + (i < rows.length - 1 ? "border-b border-slate-50" : "")}>
                            <span className="text-[9px] font-bold text-slate-600">{row.label}</span>
                            <span className={"text-[10px] font-black " + (row.pos ? "text-emerald-600" : "text-red-500")}>{row.pos ? "+" : "-"}${Math.abs(row.val).toFixed(2)}</span>
                        </div>
                    ));
                };

                return (
                    <div className="flex flex-col h-full">
                        <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between shrink-0 bg-white">
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full"></div>
                                <p className="text-[10px] font-black text-slate-700 uppercase tracking-widest">Arbitrage Scout</p>
                            </div>
                            <div className="flex items-center gap-2">
                                {onScanRequest && (
                                    <button onClick={onScanRequest} title="Scan Barcode"
                                        className="p-2 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-100 transition-all active:scale-95">
                                        <Icon name="ScanLine" size={16}/>
                                    </button>
                                )}
                                {confirmPurge ? (
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => setConfirmPurge(false)} className="text-[9px] font-black text-slate-400 px-2 py-1 rounded-lg hover:bg-slate-100 uppercase">Cancel</button>
                                        <button onClick={purgeHistory} className="text-[9px] font-black text-red-600 px-2 py-1 rounded-lg bg-red-50 uppercase">Confirm</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setConfirmPurge(true)} className="p-1.5 text-slate-300 hover:text-red-400 transition-colors rounded-lg">
                                        <Icon name="Trash2" size={14}/>
                                    </button>
                                )}
                            </div>
                        </div>

                        {barcodePreload && (
                            <div className="mx-4 mt-3 bg-emerald-50 border border-emerald-200 rounded-2xl px-4 py-3 flex items-center justify-between">
                                <div className="min-w-0 flex-1">
                                    <p className="text-[8px] font-black text-emerald-600 uppercase tracking-widest">Barcode Loaded</p>
                                    <p className="text-[10px] font-bold text-slate-700 leading-tight mt-0.5 truncate">{barcodePreload.title}</p>
                                </div>
                                <button onClick={() => setBarcodePreload(null)} className="text-slate-300 hover:text-slate-500 ml-2 shrink-0"><Icon name="X" size={14}/></button>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto no-scrollbar px-4 py-4 space-y-4">
                            {history.length > 0 && activeHistory === null && !result && (
                                <div className="space-y-1">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest px-1 mb-2">Recent Scans</p>
                                    {history.slice(0, 8).map((h, i) => (
                                        <button key={h._docId} onClick={() => setActiveHistory(i)}
                                            className="w-full flex items-center gap-3 p-3 rounded-2xl text-left hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100">
                                            {h.imageUrl && <img src={h.imageUrl} className="w-10 h-10 rounded-xl object-cover border border-slate-200 shrink-0"/>}
                                            <div className="min-w-0 flex-1">
                                                <p className="text-[10px] font-black text-slate-800 uppercase leading-tight truncate">{h.itemTitle}</p>
                                                <p className="text-[9px] text-slate-400 mt-0.5">{h.timestamp}</p>
                                            </div>
                                            <span className={"text-[8px] font-black px-2 py-1 rounded-lg uppercase " + (h.verdict && h.verdict.tag === "GO" ? "bg-emerald-100 text-emerald-700" : h.verdict && h.verdict.tag === "MARGINAL" ? "bg-amber-100 text-amber-700" : "bg-red-100 text-red-700")}>{h.verdict ? h.verdict.tag : "?"}</span>
                                        </button>
                                    ))}
                                </div>
                            )}

                            {activeHistory !== null && (
                                <button onClick={() => setActiveHistory(null)} className="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-slate-800 transition-colors">
                                    <Icon name="ChevronLeft" size={14}/> Back
                                </button>
                            )}

                            {!displayResult && activeHistory === null && (
                                <div className="space-y-3">
                                    {/* ── Scan | Upload toggle ── */}
                                    <div className="flex gap-2 mb-2">
                                        <button onClick={() => { stopScoutCam(); setScoutInputMode('upload'); setScoutScanResults(null); }}
                                            className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 " + (scoutInputMode === 'upload' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-100 text-slate-500 hover:bg-slate-200")}>
                                            <Icon name="ImagePlus" size={12}/> Upload
                                        </button>
                                        <button onClick={() => { setScoutInputMode('scan'); setScoutScanResults(null); setTimeout(startScoutCam, 80); }}
                                            className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 " + (scoutInputMode === 'scan' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-100 text-slate-500 hover:bg-slate-200")}>
                                            <Icon name="ScanLine" size={12}/> Scan
                                        </button>
                                    </div>

                                    {/* ── Upload mode ── */}
                                    {scoutInputMode === 'upload' && (
                                        <div className="relative border-2 border-dashed border-slate-300 rounded-2xl overflow-hidden hover:border-emerald-400 transition-colors">
                                            <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                                onChange={(e) => { if (e.target.files[0]) setScoutImage({ file: e.target.files[0], url: URL.createObjectURL(e.target.files[0]) }); }} />
                                            {scoutImage ? (
                                                <div className="relative">
                                                    <img src={scoutImage.url} className="w-full h-40 object-contain bg-slate-50"/>
                                                    <div className="absolute bottom-2 right-2 bg-emerald-500 text-white text-[9px] font-black px-2 py-1 rounded-full uppercase">Tap to Replace</div>
                                                </div>
                                            ) : (
                                                <div className="py-8 text-center">
                                                    <Icon name="ImagePlus" size={32} className="text-slate-300 mb-2"/>
                                                    <p className="text-xs font-black text-slate-400 uppercase">Load Item Photo</p>
                                                </div>
                                            )}
                                        </div>

                const applyInline = (str) => str

                lines.forEach(line => {
                    if (line.startsWith('*') || line.startsWith('-') || line.startsWith('*')) {
                        if (!inList) { html += "<ul>"; inList = true; }
                        html += `<li>${applyInline(line.substring(1).trim())}</li>`;
                    } else {
                        if (inList) { html += "</ul>"; inList = false; }
                        if (line === line.toUpperCase() && line.length > 3) {
                            html += `<h4>${applyInline(line)}</h4>`;

                // eBay CSV ScheduleTime format: YYYY-MM-DD HH:MM:SS in UTC
                const d = new Date(isoStr);
                const yr  = d.getUTCFullYear();
                const mo  = String(d.getUTCMonth() + 1).padStart(2, '0');
                const dy  = String(d.getUTCDate()).padStart(2, '0');
                const hr  = String(d.getUTCHours()).padStart(2, '0');
                const mn  = String(d.getUTCMinutes()).padStart(2, '0');
                const sc  = String(d.getUTCSeconds()).padStart(2, '0');
                return `${yr}-${mo}-${dy} ${hr}:${mn}:${sc}`;
            };

                            const image = new Image();
                            image.onload = () => {
                                let w = image.width, h = image.height;
                                if (w > maxPx || h > maxPx) {
                                    if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                                    else       { w = Math.round(w * maxPx / h); h = maxPx; }
                                }
                                const canvas = document.createElement('canvas');
                                canvas.width = w; canvas.height = h;
                                canvas.getContext('2d').drawImage(image, 0, 0, w, h);
                                canvas.toBlob(blob => {
                                    const reader = new FileReader();
                                    reader.onload = e => resolve({
                                        blob,
                                        b64: e.target.result.split(',')[1],
                                        mimeType: 'image/jpeg'
                                    });
                                    reader.readAsDataURL(blob);
                                }, 'image/jpeg', 0.82);
                            };
                            image.onerror = () => reject(new Error('Compress failed'));
                            image.src = img.url;
                        });

                            fd.append("api_key", CLOUDINARY_CONFIG.apiKey);
                            fd.append("timestamp", timestamp);
                            fd.append("signature", signature);
                            fd.append("folder", folder);

                                    <h2 className="text-base font-black text-slate-800 uppercase tracking-tight">{activeTab === 'process' ? 'Generate Ads' : activeTab === 'settings' ? 'Settings' : listings.length + ' Drafts Ready'}</h2>
                                </div>
                                <button onClick={() => setShowScanner(true)} className="flex items-center gap-2 px-4 py-2.5 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-400 transition-all active:scale-95 shadow-md shadow-emerald-100">
                                    <Icon name="ScanLine" size={14}/> Scan
                                </button>
                            </div>
                            <div className="p-8">
                                {activeTab === 'process' ? renderProcessTab() : activeTab === 'settings' ? renderSettingsTab() : renderListingsTab()}
                            </div>
                            <footer className="py-6 text-center text-[9px] font-black uppercase tracking-[0.3em] text-slate-300 border-t">© 2026 BLACK KNIGHT ARMAMENT</footer>
                        </div>

                        {/* RIGHT PANEL  -  Scout always visible */}
                        <div className="panel-right">
                            <ArbitrageScout
                                proxyUrl={PROXY_API_URL}
                                ebayConditions={EBAY_CONDITIONS}
                                showToast={showToast}
                                dbRef={dbRef}
                                user={user}
                                inline={true}
                                scanPreload={scoutPreload}
                                onScanRequest={() => setShowScanner(true)}
                                onSendToProcessing={(item) => {
                                    setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                                    setActiveTab('process');
                                    showToast('Scout item sent to Processing.');
                                }}
                            />
                        </div>
                    </div>
                    </>
                );
            }

            // -- MOBILE LAYOUT (unchanged) --------------------------------------------
            return (
                <>
                {showScanner && <BarcodeScanner onScan={handleScan} onClose={() => setShowScanner(false)} />}
                {scanResult && <ScanResult upc={scanResult.upc} onClose={() => setScanResult(null)} onSendToScout={handleSendToScout} onSendToListing={handleSendToListing} showToast={showToast} />}
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto animate-in fade-in duration-700">
                    {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl animate-in slide-in-from-top-4">{toast}</div>}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-6">
                            <h1 className="text-2xl font-black flex items-center gap-3"><Icon name="Package" className="text-blue-600" size={32} /> eBay Scout</h1>
                            <div className="flex flex-col border-l border-slate-300 pl-6">
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Authenticated Operator</span>
                                <span className="text-xs font-black text-blue-600 truncate max-w-[200px]">{user.email || 'Tactical Session Active'}</span>
                            </div>
                        </div>
                        <nav className="flex items-center bg-white rounded-xl shadow-sm p-1 border border-slate-200">
                            <button onClick={() => setActiveTab('process')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'process' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>PROCESSOR</button>
                            <button onClick={() => setActiveTab('listings')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'listings' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>INVENTORY ({listings.length})</button>
                            <button onClick={() => setShowScanner(true)} className="p-2 text-emerald-500 hover:bg-emerald-50 rounded-xl transition-all" title="Scan Barcode"><Icon name="ScanLine" size={20}/></button>
                            <div className="w-[1px] h-6 bg-slate-200 mx-2"></div>
                            <button onClick={logout} className="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Secure Logout"><Icon name="LogOut" size={20}/></button>
                        </nav>
                    </header>
                    <main>
                        {activeTab === 'process' ? renderProcessTab() : activeTab === 'settings' ? renderSettingsTab() : renderListingsTab()}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 eBay Scout * BLACK KNIGHT ARMAMENT * v{APP_VERSION}</footer>
                </div>
                {/* Mobile Scout FAB */}
                <ArbitrageScout
                    proxyUrl={PROXY_API_URL}
                    ebayConditions={EBAY_CONDITIONS}
                    showToast={showToast}
                    dbRef={dbRef}
                    user={user}
                    inline={false}
                    scanPreload={scoutPreload}
                    onScanRequest={() => setShowScanner(true)}
                    onSendToProcessing={(item) => {
                        setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                        setActiveTab('process');
                        showToast('Scout item sent to Processing.');
                    }}
                />
                </>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
