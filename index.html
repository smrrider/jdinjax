                                            <span className="text-[8px] font-black px-2 py-0.5 rounded-lg bg-emerald-100 text-emerald-700 uppercase">Watching</span>
                                            <span className="text-[9px] font-black text-slate-500">eBay Mid: <span className="text-emerald-600">${Number(t.marketPrice||0).toFixed(2)}</span></span>
                                            {t.sellThroughRate && <span className="text-[9px] font-black text-slate-400">{t.sellThroughRate}% STR</span>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2 shrink-0">
                                        <button onClick={() => { setBarcodeListingData({ title: t.title, image: t.imageUrl, price: t.marketPrice ? String(t.marketPrice) : '', upc: '' }); setActiveTab('process'); showToast('Target sent to Processing.'); }}
                                            className="px-3 py-1.5 bg-blue-600 text-white rounded-xl text-[8px] font-black uppercase tracking-widest hover:bg-blue-500 transition-all">
                                            <Icon name="PackagePlus" size={10} className="inline mr-1"/>Process
                                        </button>
                                        <button onClick={async () => { try { await dbRef.current.doc(`artifacts/jdinjax-console/users/${user.uid}/targets/${t.id}`).delete(); } catch(e){} }}
                                            className="px-3 py-1.5 bg-slate-100 text-slate-500 rounded-xl text-[8px] font-black uppercase tracking-widest hover:bg-red-50 hover:text-red-500 transition-all">
                                            <Icon name="Trash2" size={10} className="inline mr-1"/>Remove
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </section>
            );

            const renderListingsTab = () => {
                // Partition listings into Drafts (not yet on eBay) and Submitted (live/ended/sold)
                const isSubmitted = (l) => {
                    const ls = listingStatus[l.id];
                    return !!l.ebayListingId
                        || ['live','ended','sold'].includes(ls?.status)
                        || ['live','ended','sold'].includes(l.ebayStatus);
                };
                const draftListings     = sortedListings.filter(l => !isSubmitted(l));
                const submittedListings = sortedListings.filter(l =>  isSubmitted(l));
                const activeListings    = inventoryFolder === 'drafts' ? draftListings : submittedListings;

                // ── Search filter ──────────────────────────────────────────────
                const searchedListings = inventorySearch.trim()
                    ? activeListings.filter(l => {
                        const q = inventorySearch.toLowerCase();
                        return (l.title || '').toLowerCase().includes(q)
                            || (l.sku || '').toLowerCase().includes(q)
                            || (l.brand || '').toLowerCase().includes(q)
                            || (l.categoryPath || '').toLowerCase().includes(q);
                      })
                    : activeListings;

                // ── Sort ───────────────────────────────────────────────────────
                const sortedFiltered = [...searchedListings].sort((a, b) => {
                    const aPrice = Number(a.buyItNowPrice || a.priceResearch?.mid || 0);
                    const bPrice = Number(b.buyItNowPrice || b.priceResearch?.mid || 0);
                    switch (inventorySort) {
                        case 'oldest':     return (a.timestamp || 0) - (b.timestamp || 0);
                        case 'price_asc':  return aPrice - bPrice;
                        case 'price_desc': return bPrice - aPrice;
                        case 'title_az':   return (a.title || '').localeCompare(b.title || '');
                        case 'category':   return (a.categoryPath || '').localeCompare(b.categoryPath || '');
                        default:           return (b.timestamp || 0) - (a.timestamp || 0);
                    }
                });

                // ── Paginate ───────────────────────────────────────────────────
                const INV_PAGE_SIZE = 20;
                const totalPages    = Math.max(1, Math.ceil(sortedFiltered.length / INV_PAGE_SIZE));
                const safePage      = Math.min(inventoryPage, totalPages);
                const pagedListings = sortedFiltered.slice((safePage - 1) * INV_PAGE_SIZE, safePage * INV_PAGE_SIZE);

                return (
                <div className="space-y-6">
                    {/* ── Header bar ── */}
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm gap-4">
                        <div className="flex items-center gap-4 flex-wrap">
                            {/* Folder tabs */}
                            <div className="flex rounded-2xl overflow-hidden border border-slate-200 text-[10px] font-black uppercase tracking-widest shadow-sm">
                                <button onClick={() => { setInventoryFolder('drafts'); setSelectedDrafts(new Set()); }}
                                    className={`px-5 py-2.5 flex items-center gap-1.5 transition-colors ${inventoryFolder === 'drafts' ? 'bg-slate-900 text-white' : 'bg-white text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="Layers" size={11}/> Drafts <span className="ml-1 bg-white/20 text-current px-1.5 rounded-full">{draftListings.length}</span>
                                </button>
                                <button onClick={() => { setInventoryFolder('submitted'); setSelectedDrafts(new Set()); }}
                                    className={`px-5 py-2.5 flex items-center gap-1.5 transition-colors border-l border-slate-200 ${inventoryFolder === 'submitted' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="CheckCircle" size={11}/> Submitted <span className="ml-1 bg-white/20 text-current px-1.5 rounded-full">{submittedListings.length}</span>
                                </button>
                            </div>
                            <div className="flex flex-col items-start gap-2">
                                <div className="flex gap-2 flex-wrap">
                                    {/* Select All / Deselect All + Bulk push — Drafts tab only */}
                                    {inventoryFolder === 'drafts' && draftListings.length > 0 && (
                                        <button
                                            onClick={() => {
                                                if (selectedDrafts.size === draftListings.length) {
                                                    setSelectedDrafts(new Set());
                                                } else {
                                                    setSelectedDrafts(new Set(draftListings.map(l => l.id)));
                                                }
                                            }}
                                            className={`px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-sm transition-all active:scale-95 border ${selectedDrafts.size === draftListings.length ? 'bg-emerald-50 border-emerald-300 text-emerald-700 hover:bg-emerald-100' : 'bg-white border-slate-200 text-slate-600 hover:border-emerald-300 hover:text-emerald-600'}`}>
                                            <Icon name={selectedDrafts.size === draftListings.length ? 'CheckSquare' : 'Square'} size={13}/>
                                            {selectedDrafts.size === draftListings.length ? 'Deselect All' : 'Select All'}
                                        </button>
                                    )}
                                    {inventoryFolder === 'drafts' && selectedDrafts.size > 0 && (
                                        <button onClick={bulkListOnEbay} disabled={bulkListing}
                                            className="px-5 py-3 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-md hover:bg-emerald-500 transition-all active:scale-95 disabled:opacity-60 shadow-emerald-100">
                                            <Icon name={bulkListing ? 'Loader2' : 'Tag'} size={13} className={bulkListing ? 'animate-spin' : ''}/>
                                            {bulkListing ? 'Listing…' : `List Selected (${selectedDrafts.size})`}
                                        </button>
                                    )}
                                    {listings.some(l => l.ebayOfferId) && (
                                        <button onClick={() => syncEbayStatus(listings)} disabled={ebaySync}
                                            className="px-5 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-md hover:bg-blue-500 transition-all active:scale-95 disabled:opacity-60 shadow-blue-100">
                                            <Icon name={ebaySync ? 'Loader2' : 'RefreshCw'} size={13} className={ebaySync ? 'animate-spin' : ''}/>
                                            {ebaySync ? 'Syncing…' : lastSynced ? `Synced ${lastSynced.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` : 'eBay Status'}
                                        </button>
                                    )}
                                    {inventoryFolder === 'drafts' && (
                                        <div className="flex items-center gap-2">
                                            {/* Export mode toggle */}
                                            <div className="flex rounded-xl overflow-hidden border border-slate-200 text-[10px] font-black uppercase tracking-widest shadow-sm">
                                                <button onClick={() => setExportMode('draft')}
                                                    className={`px-3 py-2.5 flex items-center gap-1.5 transition-colors ${exportMode === 'draft' ? 'bg-slate-700 text-white' : 'bg-white text-slate-400 hover:bg-slate-50'}`}>
                                                    <Icon name="FileText" size={11}/> Draft
                                                </button>
                                                <button onClick={() => setExportMode('add')}
                                                    className={`px-3 py-2.5 flex items-center gap-1.5 transition-colors border-l border-slate-200 ${exportMode === 'add' ? 'bg-blue-600 text-white' : 'bg-white text-slate-400 hover:bg-slate-50'}`}>
                                                    <Icon name="CalendarClock" size={11}/> Add
                                                </button>
                                            </div>
                                            {/* Single export action button */}
                                            <button
                                                disabled={draftListings.length === 0}
                                                onClick={() => {
                                                    if (exportMode === 'draft') {
                                                        exportEbayCSV();
                                                    } else {
                                                        const isMobileExport = window.innerWidth < 768;
                                                        if (isMobileExport) {
                                                            const d = new Date(); d.setDate(d.getDate()+7); d.setSeconds(0,0);
                                                            exportEbayAddCSV(d.toISOString());
                                                        } else {
                                                            if (!scheduleDateTime) { const d = new Date(); d.setDate(d.getDate()+7); d.setSeconds(0,0); setScheduleDateTime(d.toISOString().slice(0,16)); }
                                                            setShowSchedulePicker(true);
                                                        }
                                                    }
                                                }}
                                                className={`px-4 py-2.5 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-md transition-all disabled:bg-slate-200 disabled:shadow-none active:scale-95 ${exportMode === 'draft' ? 'bg-slate-700 hover:bg-slate-600' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-100'}`}>
                                                <Icon name="Download" size={13}/> Export
                                            </button>
                                        </div>
                                    )}
                                </div>
                                {(!settings.shippingProfile || !settings.paymentProfile || !settings.returnProfile) && (
                                    <button onClick={() => setActiveTab('settings')} className="text-[8px] font-black text-amber-500 uppercase tracking-widest flex items-center gap-1 hover:text-amber-600 transition-colors">
                                        <Icon name="AlertTriangle" size={9}/> Business policies not configured
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                    {/* ── Search / Sort / View toolbar ─────────────────────── */}
                    {activeListings.length > 0 && (
                        <div className="flex items-center gap-3 flex-wrap">
                            <div className="flex-1 min-w-[180px] flex items-center gap-2 bg-white border border-slate-200 rounded-2xl px-4 py-2.5 shadow-sm">
                                <Icon name="Search" size={13} className="text-slate-400 shrink-0"/>
                                <input type="text" placeholder="Search title, SKU, brand, category…" value={inventorySearch}
                                    onChange={e => setInventorySearch(e.target.value)}
                                    className="flex-1 text-xs font-bold text-slate-700 placeholder:text-slate-300 bg-transparent focus:outline-none min-w-0"/>
                                {inventorySearch && <button onClick={() => setInventorySearch('')} className="text-slate-300 hover:text-red-400 transition-colors shrink-0"><Icon name="X" size={12}/></button>}
                            </div>
                            <select value={inventorySort} onChange={e => setInventorySort(e.target.value)}
                                className="bg-white border border-slate-200 rounded-2xl px-4 py-2.5 text-[10px] font-black text-slate-600 uppercase focus:outline-none shadow-sm cursor-pointer">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="price_desc">Price: High → Low</option>
                                <option value="price_asc">Price: Low → High</option>
                                <option value="title_az">Title A → Z</option>
                                <option value="category">Category</option>
                            </select>
                            <div className="flex bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                <button onClick={() => setInventoryView('card')} title="Card view"
                                    className={`px-3 py-2.5 transition-colors ${inventoryView === 'card' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="LayoutGrid" size={13}/>
                                </button>
                                <button onClick={() => setInventoryView('list')} title="List view"
                                    className={`px-3 py-2.5 border-l border-slate-200 transition-colors ${inventoryView === 'list' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="List" size={13}/>
                                </button>
                            </div>
                            <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">
                                {sortedFiltered.length}{inventorySearch ? ` of ${activeListings.length}` : ''} item{sortedFiltered.length !== 1 ? 's' : ''}
                            </span>
                        </div>
                    )}

                    {/* ── No search results ─────────────────────────────────── */}
                    {activeListings.length > 0 && sortedFiltered.length === 0 && (
                        <div className="flex flex-col items-center justify-center py-16 text-center">
                            <Icon name="SearchX" size={36} className="text-slate-200 mb-4"/>
                            <p className="text-sm font-black text-slate-500 uppercase tracking-tight">No results for "{inventorySearch}"</p>
                            <button onClick={() => setInventorySearch('')} className="mt-3 text-[10px] font-black text-blue-500 hover:underline uppercase tracking-widest">Clear Search</button>
                        </div>
                    )}

                    {activeListings.length === 0 && (
                        <div className="flex flex-col items-center justify-center py-24 text-center animate-in fade-in duration-500">
                            {inventoryFolder === 'drafts' ? (
                                <>
                                    <div className="w-20 h-20 rounded-[2rem] bg-slate-100 flex items-center justify-center mb-6 shadow-inner">
                                        <Icon name="Layers" size={36} className="text-slate-300"/>
                                    </div>
                                    <p className="text-base font-black text-slate-800 uppercase tracking-tight mb-2">No Drafts Yet</p>
                                    <p className="text-sm text-slate-400 font-bold max-w-xs leading-relaxed">Process an item in the <button onClick={() => setActiveTab('process')} className="text-blue-500 hover:underline font-black">Processor</button> to create your first draft listing.</p>
                                </>
                            ) : (
                                <>
                                    <div className="w-20 h-20 rounded-[2rem] bg-emerald-50 flex items-center justify-center mb-6 shadow-inner">
                                        <Icon name="CheckCircle" size={36} className="text-emerald-200"/>
                                    </div>
                                    <p className="text-base font-black text-slate-800 uppercase tracking-tight mb-2">Nothing Submitted Yet</p>
                                    <p className="text-sm text-slate-400 font-bold max-w-xs leading-relaxed">Items listed on eBay will appear here. Head to <button onClick={() => setInventoryFolder('drafts')} className="text-blue-500 hover:underline font-black">Drafts</button> to push your first listing.</p>
                                </>
                            )}
                        </div>
                    )}
                    {pagedListings.map(l => (
                        <ErrorBoundary key={l.id}>
                        {inventoryView === 'list' ? (
                            /* ── Compact list row ─────────────────────────────── */
                            <div className={`bg-white border rounded-2xl px-4 py-3 flex items-center gap-3 transition-all ${inventoryFolder === 'drafts' && selectedDrafts.has(l.id) ? 'border-emerald-400 ring-2 ring-emerald-200' : 'border-slate-200 hover:border-blue-300'}`}>
                                {inventoryFolder === 'drafts' && (
                                    <button onClick={() => setSelectedDrafts(prev => { const n = new Set(prev); n.has(l.id) ? n.delete(l.id) : n.add(l.id); return n; })}
                                        className={`shrink-0 transition-colors ${selectedDrafts.has(l.id) ? 'text-emerald-500' : 'text-slate-300 hover:text-emerald-400'}`}>
                                        <Icon name={selectedDrafts.has(l.id) ? 'CheckSquare' : 'Square'} size={15}/>
                                    </button>
                                )}
                                <img src={l.images?.[0]} className="w-12 h-12 rounded-xl object-cover shrink-0 border border-slate-100 bg-slate-100"/>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-black text-slate-900 truncate leading-tight">{l.title || 'Untitled'}</p>
                                    <p className="text-[9px] font-bold text-slate-400 truncate mt-0.5">{l.categoryPath || l.categoryId || '—'}</p>
                                </div>
                                <span className="text-[8px] font-black px-2 py-1 rounded-lg bg-slate-100 text-slate-500 uppercase shrink-0 hidden sm:block">{EBAY_CONDITIONS.find(c => c.id === l.conditionId)?.label || 'Used'}</span>
                                <span className="text-sm font-black text-slate-800 shrink-0 w-16 text-right">${Number(l.buyItNowPrice || l.priceResearch?.mid || 0).toFixed(2)}</span>
                                <span className={`text-[8px] font-black px-2 py-1 rounded-lg uppercase shrink-0 hidden md:block ${isSubmitted(l) ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>{isSubmitted(l) ? 'Listed' : 'Draft'}</span>
                                <div className="flex items-center gap-1 shrink-0">
                                    <button onClick={() => researchPrice(l)} title="Re-price"
                                        className="p-2 rounded-xl hover:bg-blue-50 hover:text-blue-600 text-slate-300 transition-colors">
                                        <Icon name="TrendingUp" size={13}/>
                                    </button>
                                    {inventoryFolder === 'drafts'
                                        ? <button onClick={() => listOnEbay(l)} title="List on eBay" className="p-2 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 text-slate-300 transition-colors"><Icon name="Tag" size={13}/></button>
                                        : l.ebayListingId && <a href={`https://www.ebay.com/itm/${l.ebayListingId}`} target="_blank" rel="noreferrer" title="View on eBay" className="p-2 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 text-slate-300 transition-colors"><Icon name="ExternalLink" size={13}/></a>
                                    }
                                    {deleteConfirmId === l.id
                                        ? <span className="flex items-center gap-1">
                                            <button onClick={() => { dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).delete(); setDeleteConfirmId(null); }}
                                                className="px-2 py-1 rounded-lg bg-red-500 text-white text-[9px] font-black uppercase tracking-widest hover:bg-red-600 transition-colors">
                                                Confirm
                                            </button>
                                            <button onClick={() => setDeleteConfirmId(null)}
                                                className="p-1 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
                                                <Icon name="X" size={11}/>
                                            </button>
                                          </span>
                                        : <button onClick={() => setDeleteConfirmId(l.id)} title="Delete"
                                            className="p-2 rounded-xl hover:bg-red-50 hover:text-red-500 text-slate-300 transition-colors">
                                            <Icon name="Trash2" size={13}/>
                                          </button>
                                    }
                                </div>
                            </div>
                        ) : (
                        <div className={`bg-white rounded-[2rem] border flex flex-col md:flex-row overflow-hidden shadow-sm transition-all animate-in fade-in duration-500 listing-card ${inventoryFolder === 'drafts' && selectedDrafts.has(l.id) ? 'border-emerald-400 ring-2 ring-emerald-200' : 'border-slate-200 hover:border-blue-300'}`}>
                            {/* Image column — flex-col so the expandable strip sits below the main photo */}
                            <div className="md:w-72 shrink-0 bg-slate-50 border-r border-slate-100 flex flex-col">
                                {/* Main photo */}
                                <div className="relative group flex-1 overflow-hidden min-h-72 md:min-h-0">
                                    <img src={l.images?.[0]} className="w-full h-full object-cover" />
                                    {/* Bulk-select checkbox — Draft folder only */}
                                    {inventoryFolder === 'drafts' && (
                                        <button
                                            onClick={() => setSelectedDrafts(prev => {
                                                const next = new Set(prev);
                                                next.has(l.id) ? next.delete(l.id) : next.add(l.id);
                                                return next;
                                            })}
                                            className={`absolute top-3 left-3 flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border-2 font-black text-[9px] uppercase tracking-widest transition-all active:scale-90 shadow-lg ${selectedDrafts.has(l.id) ? 'bg-emerald-500 border-emerald-500 text-white shadow-emerald-200' : 'bg-white border-slate-300 text-slate-500 hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50'}`}
                                            title="Select for bulk listing">
                                            <Icon name={selectedDrafts.has(l.id) ? 'CheckSquare' : 'Square'} size={13}/>
                                            {selectedDrafts.has(l.id) ? 'Selected' : 'Select'}
                                        </button>
                                    )}
                                    {/* Assets badge — click to toggle strip */}
                                    <button
                                        onClick={() => setExpandedImageListingId(expandedImageListingId === l.id ? null : l.id)}
                                        className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest hover:bg-black/80 transition-colors flex items-center gap-1.5 active:scale-95">
                                        <Icon name={expandedImageListingId === l.id ? 'ChevronUp' : 'Images'} size={10}/>
                                        {l.images?.length || 0} Assets
                                    </button>
                                    {l.images?.[0] && (
                                        <button
                                            onClick={() => removeBg(l.id, l.images[0])}
                                            disabled={bgRemoving.has(l.id)}
                                            className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity bg-white/90 backdrop-blur-sm text-slate-700 hover:text-purple-600 hover:bg-white border border-slate-200 hover:border-purple-300 rounded-full px-3 py-1.5 text-[9px] font-black uppercase tracking-widest flex items-center gap-1.5 shadow-md disabled:opacity-60 disabled:cursor-wait active:scale-95"
                                            title="Remove background (client-side AI, free)">
                                            {bgRemoving.has(l.id)
                                                ? <><Icon name="Loader2" size={10} className="animate-spin"/> Processing…</>
                                                : <><Icon name="Scissors" size={10}/> Remove BG</>
                                            }
                                        </button>
                                    )}
                                </div>
                                {/* Expandable image strip */}
                                {expandedImageListingId === l.id && (
                                    <div className="border-t border-slate-200 bg-slate-100/70 p-2">
                                        <div className="flex gap-1.5 overflow-x-auto pb-1">
                                            {(l.images || []).map((url, idx) => (
                                                <div key={url + idx} className="relative shrink-0 w-[3.75rem] h-[3.75rem] rounded-xl overflow-hidden border border-slate-200 bg-white group/thumb shadow-sm">
                                                    <img src={url} className="w-full h-full object-cover" />
                                                    <button
                                                        onClick={() => deleteImageFromListing(l.id, l.images, url)}
                                                        className="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full p-0.5 opacity-0 group-hover/thumb:opacity-100 transition-opacity hover:bg-red-600 active:scale-90"
                                                        title="Remove image">
                                                        <Icon name="X" size={9}/>
                                                    </button>
                                                    {idx === 0 && (
                                                        <span className="absolute bottom-0.5 left-0.5 bg-black/60 text-white text-[6px] font-black px-1 py-0.5 rounded leading-none">MAIN</span>
                                                    )}
                                                </div>
                                            ))}
                                            {/* Add image button */}
                                            {(l.images?.length || 0) < 12 && (
                                                <label className="shrink-0 w-[3.75rem] h-[3.75rem] rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors gap-0.5" title="Add image">
                                                    <Icon name="Plus" size={14} className="text-slate-400"/>
                                                    <span className="text-[7px] font-black text-slate-400 uppercase">Add</span>
                                                    <input type="file" accept="image/*" multiple className="hidden"
                                                        onChange={e => { addImagesToListing(l.id, l.images, Array.from(e.target.files)); e.target.value = ''; }}/>
                                                </label>
                                            )}
                                        </div>
                                        <p className="text-[7px] font-black text-slate-400 uppercase tracking-widest mt-1 text-center">{l.images?.length || 0} / 12 images · hover to remove</p>
                                    </div>
                                )}
                            </div>
                            <div className="p-8 flex-grow">
                                <div className="flex justify-between items-start mb-4">
                                    {editingCategoryId === l.id ? (
                                        <div className="flex flex-col gap-3 w-full mr-4 bg-blue-50/50 p-5 rounded-3xl border border-blue-200 shadow-inner">
                                            <p className="text-[9px] font-black text-blue-700 uppercase tracking-widest flex items-center gap-1.5">
                                                <Icon name="FolderTree" size={10}/> Reassign eBay Category

                                                if (ls?.status === 'live') return (
                                                    <div className="flex flex-col gap-2">
                                                        {ls.price && (
                                                            <div className="flex items-center justify-between px-3 py-1.5 bg-emerald-50 border border-emerald-200 rounded-xl">
                                                                <span className="text-[8px] font-black text-emerald-600 uppercase tracking-widest flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"/> Live · eBay Price</span>
                                                                <span className="text-[10px] font-black text-emerald-800">${ls.price}</span>
                                                            </div>

                                                        <a href={ls.url} target="_blank" rel="noopener noreferrer"

                                                            <span className="text-[9px] font-black text-red-700 uppercase tracking-widest">Listing Ended</span>
                                                        </div>
                                                        <button onClick={() => relistOnEbay(l)}

                                                            <Icon name="RefreshCw" size={14}/> Relist on eBay

                                                    </div>

                                                // Sold — show sold badge + relist option
                                                if (ls?.status === 'sold') return (

                                                        <button onClick={() => relistOnEbay(l)}

                                                if (ls?.status === 'error') {
                                                    const raw = ls.message || '';
                                                    const m   = raw.toLowerCase();
                                                    let friendly, fix;
                                                    if (m.includes('leaf category') || m.includes('not a leaf') || m.includes('invalid category')) {
                                                        friendly = 'The selected category is too broad. eBay requires a specific sub-category (e.g. "Men\'s Wetsuits" not just "Wetsuits"). Use Fix Category below to drill down.';
                                                        fix = 'category';
                                                    } else if (m.includes('policy') || m.includes('fulfillment') || m.includes('payment') || m.includes('return')) {
                                                        friendly = 'An eBay business policy (shipping, payment, or returns) is missing or misconfigured.';
                                                        fix = 'settings';
                                                    } else if (m.includes('image') || m.includes('photo') || m.includes('picture')) {
                                                        friendly = 'eBay rejected one or more images. Images must be at least 500×500px and not watermarked.';
                                                        fix = 'retry';
                                                    } else if (m.includes('title')) {
                                                        friendly = 'The listing title has an issue — it may be too long (80 char max) or contain prohibited characters.';
                                                        fix = 'retry';
                                                    } else if (m.includes('25025') || m.includes('concurrent') || m.includes('already being modified')) {
                                                        friendly = 'Submission conflict — the item was already being submitted at the same time. Safe to retry.';
                                                        fix = 'retry';
                                                    } else if (m.includes('token') || m.includes('oauth') || m.includes('unauthorized') || m.includes('403')) {
                                                        friendly = 'eBay authorization expired. Go to Settings and reconnect your eBay account.';

                                                                        <p className="text-[9px] font-black text-red-700 uppercase tracking-widest mb-1">Listing Failed</p>

                                                                            <details className="mt-1.5">

                                                                    </button>

                                                                    <button onClick={() => listOnEbay(l)}

                                                                        <Icon name="RefreshCw" size={13}/> Retry
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </div>

                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                    <span className="text-[9px] text-slate-400 font-bold">available</span>

                                                                                <Icon name="Plus" size={9}/> Add Tier
                                                                            </button>

                                                                                    onChange={e => { const d = [...(cfg.volumeDiscounts||[])]; d[ti]={...d[ti],pctOff:parseFloat(e.target.value)||''}; setAuc({volumeDiscounts:d}); }}
                                                                                    className="w-12 text-[10px] font-black text-center border border-blue-200 rounded-lg px-1 py-1 bg-white focus:outline-none"/>
                                                                                <span className="text-[9px] font-black text-slate-500">%</span>
                                                                                <button onClick={() => { const d=(cfg.volumeDiscounts||[]).filter((_,i)=>i!==ti); setAuc({volumeDiscounts:d}); }}

                                                                                    <Icon name="X" size={11}/>
                                                                                </button>
                                                                            </div>

                                                                        )}
                                                                    </div>
                                                                )}
                                                            </div>

                                                            <Icon name={isAuc ? 'Gavel' : 'Tag'} size={14}/>
                                                            {isAuc ? 'List as Auction' : 'List on eBay'}
                                                        </button>
                                                    </div>
                                                );
                                            })()}

                                            {/* Bottom row — icon buttons right */}

                                                <div></div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => enterEditMode(l)}
                                                        className="p-3 text-blue-500 hover:bg-blue-50 rounded-xl transition-all active:scale-90" title="Edit listing">
                                                        <Icon name="Pencil" size={18}/>
                                                    </button>
                                                    {/* Open on eBay — submitted cards only */}
                                                    {inventoryFolder === 'submitted' && (() => {
                                                        const ls = listingStatus[l.id];
                                                        const ebayUrl = ls?.url || l.ebayListingUrl
                                                            || (l.ebayListingId ? `https://www.ebay.com/itm/${l.ebayListingId}` : null);
                                                        return ebayUrl ? (
                                                            <a href={ebayUrl} target="_blank" rel="noopener noreferrer"

                                                                <Icon name="ExternalLink" size={20}/>

                                                                <Icon name="ExternalLink" size={20}/>

                                                            title={inventoryFolder === 'submitted' ? 'Remove from inventory (does not end eBay listing)' : 'Delete draft'}>
                                                            <Icon name="Trash2" size={22}/>
                                                          </button>
                                                    }
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        )}
                        </ErrorBoundary>

                        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">

                                </div>
                                <div className="p-8 space-y-5">

                                    <span className="text-sm font-black text-slate-800 uppercase tracking-tight">Scout Recon</span>
                                </div>
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">{user.email}</p>
                            </div>
                            <nav className="px-3 py-4 space-y-1 flex-1">
                                <button onClick={() => setActiveTab('process')} className={"w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all " + (activeTab === 'process' ? "bg-blue-600 text-white shadow-md" : "text-slate-500 hover:bg-slate-50")}>
                                    <Icon name="Upload" size={15}/> Processor
                                </button>
                                <button onClick={() => setActiveTab('listings')} className={"w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all " + (activeTab === 'listings' ? "bg-blue-600 text-white shadow-md" : "text-slate-500 hover:bg-slate-50")}>
                                    <Icon name="LayoutGrid" size={15}/> Inventory
                                    <span className="ml-auto bg-blue-100 text-blue-600 text-[9px] font-black px-2 py-0.5 rounded-full">{listings.length}</span>
                                </button>
                                <button onClick={() => setActiveTab('targets')} className={"w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all " + (activeTab === 'targets' ? "bg-emerald-600 text-white shadow-md" : "text-slate-500 hover:bg-slate-50")}>
                                    <Icon name="Crosshair" size={15}/> Targets
                                    {targets.length > 0 && <span className="ml-auto bg-emerald-100 text-emerald-600 text-[9px] font-black px-2 py-0.5 rounded-full">{targets.length}</span>}
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={"w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all " + (activeTab === 'settings' ? "bg-slate-800 text-white shadow-md" : "text-slate-500 hover:bg-slate-50")}>
                                    <Icon name="Settings" size={15}/> Settings
                                </button>
                                {user?.email === OWNER_EMAIL && (
                                    <button onClick={() => setActiveTab('admin')} className={"w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all " + (activeTab === 'admin' ? "bg-violet-600 text-white shadow-md" : "text-slate-500 hover:bg-slate-50")}>
                                        <Icon name="ShieldCheck" size={15}/> Admin
                                    </button>
                                )}
                                <div className="pt-4 border-t border-slate-100 mt-4">
                                    <button onClick={() => setShowScanner(true)} className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-emerald-600 hover:bg-emerald-50 transition-all">
                                        <Icon name="ScanLine" size={15}/> Scan Barcode
                                    </button>
                                </div>
                            </nav>
                            <div className="px-3 py-4 border-t border-slate-100 space-y-2">
                                <div className="bg-slate-50 rounded-2xl px-4 py-3">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Version</p>
                                    <p className="text-[10px] font-black text-slate-600 mt-0.5">v{APP_VERSION}</p>
                                </div>
                                <a href="https://github.com/smrrider/jdinjax/releases/download/v7.0.0/Scout_Recon_User_Guide_v5.pdf" target="_blank" rel="noopener noreferrer"
                                    className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:bg-slate-50 hover:text-blue-600 transition-all">
                                    <Icon name="BookOpen" size={15}/> User Guide
                                </a>
                                <a href="https://res.cloudinary.com/daeb6pcxf/video/upload/v1774029496/Scout_Recon_v7_fece99.mp4" target="_blank" rel="noopener noreferrer"
                                    className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:bg-slate-50 hover:text-purple-600 transition-all">
                                    <Icon name="PlayCircle" size={15}/> Video Tutorial
                                </a>
                                <button onClick={logout} className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-50 transition-all">
                                    <Icon name="LogOut" size={15}/> Sign Out
                                </button>
                            </div>
                        </div>

                        {/* CENTER PANEL  -  Main workspace */}
                        <div className="panel-center">
                            <div className="px-8 py-6 border-b border-slate-200 bg-white flex items-center justify-between sticky top-0 z-10">
                                <div>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{activeTab === 'process' ? 'Listing Processor' : activeTab === 'settings' ? 'Account Configuration' : activeTab === 'targets' ? 'Sourcing Targets' : activeTab === 'admin' ? 'Owner Only' : 'Inventory'}</p>
                                    <h2 className="text-base font-black text-slate-800 uppercase tracking-tight">{activeTab === 'process' ? 'Generate Ads' : activeTab === 'settings' ? 'Settings' : activeTab === 'targets' ? targets.length + ' Watching' : activeTab === 'admin' ? 'Admin Panel' : (() => { const subCount = listings.filter(l => !!l.ebayListingId || ['live','ended','sold'].includes(listingStatus[l.id]?.status) || ['live','ended','sold'].includes(l.ebayStatus)).length; const draftCount = listings.length - subCount; return inventoryFolder === 'submitted' ? subCount + ' Listed' : draftCount + ' Draft' + (draftCount !== 1 ? 's' : '') + ' Ready'; })()}</h2>
                                </div>
                                <button onClick={() => setShowScanner(true)} className="flex items-center gap-2 px-4 py-2.5 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-400 transition-all active:scale-95 shadow-md shadow-emerald-100">
                                    <Icon name="ScanLine" size={14}/> Scan
                                </button>
                            </div>
                            <div className="p-8">
                                {activeTab === 'process' ? renderProcessTab() : activeTab === 'settings' ? renderSettingsTab() : activeTab === 'targets' ? renderTargetsTab() : activeTab === 'admin' ? renderAdminTab() : renderListingsTab()}
                            </div>
                            <footer className="py-6 text-center text-[9px] font-black uppercase tracking-[0.3em] text-slate-300 border-t">© 2026 BLACK KNIGHT ARMAMENT</footer>
                        </div>

                    </div>
                    {/* Desktop Recon FAB — same behaviour as mobile */}
                    <ProfitScout
                        proxyUrl={PROXY_API_URL}
                        ebayConditions={EBAY_CONDITIONS}
                        showToast={showToast}
                        dbRef={dbRef}
                        user={user}
                        inline={false}
                        scanPreload={reconPreload}
                        onScanRequest={() => setShowScanner(true)}
                        userSettings={settings}
                        onSendToProcessing={(item) => {
                            setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                            setActiveTab('process');
                            showToast('Recon item sent to Processing.');
                        }}
                        onSaveTarget={(t) => showToast(`Target saved: ${t.title.slice(0,30)}...`)}
                    />
                    </>
                );
            }

            // -- MOBILE LAYOUT (unchanged) --------------------------------------------
            return (
                <>
                {showScanner && <BarcodeScanner onScan={handleScan} onClose={() => setShowScanner(false)} />}
                {scanResult && <ScanResult upc={scanResult.upc} onClose={() => setScanResult(null)} onSendToRecon={handleSendToRecon} onSendToListing={handleSendToListing} showToast={showToast} />}
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto animate-in fade-in duration-700 overflow-x-hidden">
                    {toast && <div style={{ top: 'calc(1.5rem + env(safe-area-inset-top, 0px))' }} className={`fixed left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl animate-in slide-in-from-top-4 ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>{toast.msg}</div>}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-6">
                            <h1 className="text-2xl font-black flex items-center gap-3"><Icon name="Package" className="text-blue-600" size={32} /> Scout Recon</h1>
                            <div className="flex flex-col border-l border-slate-300 pl-6">
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Authenticated Operator</span>
                                <span className="text-xs font-black text-blue-600 truncate max-w-[200px]">{user.email || 'Tactical Session Active'}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 w-full">
                            <nav className="flex items-center bg-white rounded-xl shadow-sm p-1 border border-slate-200 overflow-x-auto no-scrollbar flex-1">
                                <button onClick={() => setActiveTab('process')} className={`px-3 py-2 rounded-xl text-[10px] font-black transition-all whitespace-nowrap ${activeTab === 'process' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>PROCESSOR</button>
                                <button onClick={() => setActiveTab('listings')} className={`px-3 py-2 rounded-xl text-[10px] font-black transition-all whitespace-nowrap ${activeTab === 'listings' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>INVENTORY ({listings.length})</button>
                                <button onClick={() => setActiveTab('targets')} className={`px-3 py-2 rounded-xl text-[10px] font-black transition-all whitespace-nowrap ${activeTab === 'targets' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500'}`}>TARGETS{targets.length > 0 ? ` (${targets.length})` : ''}</button>
                                <button onClick={() => setShowScanner(true)} className="p-2 text-emerald-500 hover:bg-emerald-50 rounded-xl transition-all shrink-0" title="Scan Barcode"><Icon name="ScanLine" size={18}/></button>
                            </nav>
                            {/* MENU button — outside overflow nav so dropdown renders freely */}
                            <div className="relative shrink-0">
                                {showMobileMenu && <div className="fixed inset-0 z-40" onClick={() => setShowMobileMenu(false)}/>}
                                <button onClick={() => setShowMobileMenu(v => !v)}
                                    className={`px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-1.5 border shadow-sm ${showMobileMenu ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>
                                    <Icon name="Menu" size={13}/> Menu
                                </button>
                                {showMobileMenu && (
                                    <div className="absolute right-0 top-full mt-2 w-44 bg-white rounded-2xl shadow-xl border border-slate-200 py-2 z-50">
                                        <button onClick={() => { setActiveTab('settings'); setShowMobileMenu(false); }}
                                            className={`w-full flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'settings' ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                                            <Icon name="Settings" size={14}/> Settings
                                        </button>
                                        {user?.email === OWNER_EMAIL && (
                                            <button onClick={() => { setActiveTab('admin'); setShowMobileMenu(false); }}
                                                className={`w-full flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'admin' ? 'bg-violet-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>
                                                <Icon name="ShieldCheck" size={14}/> Admin
                                            </button>
                                        )}
                                        <div className="border-t border-slate-100 mt-1 pt-1">
                                            <button onClick={() => { logout(); setShowMobileMenu(false); }}
                                                className="w-full flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-50 transition-all">
                                                <Icon name="LogOut" size={14}/> Sign Out
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>
                    <main>
                        {activeTab === 'process' ? renderProcessTab() : activeTab === 'settings' ? renderSettingsTab() : activeTab === 'targets' ? renderTargetsTab() : activeTab === 'admin' ? renderAdminTab() : renderListingsTab()}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center space-y-4">
                        <div className="flex justify-center gap-4">
                            <a href="https://github.com/smrrider/jdinjax/releases/download/v7.0.0/Scout_Recon_User_Guide_v5.pdf" target="_blank" rel="noopener noreferrer"
                                className="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-blue-600 hover:bg-slate-100 transition-all">
                                <Icon name="BookOpen" size={13}/> User Guide
                            </a>
                            <a href="https://res.cloudinary.com/daeb6pcxf/video/upload/v1774029496/Scout_Recon_v7_fece99.mp4" target="_blank" rel="noopener noreferrer"
                                className="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-purple-600 hover:bg-slate-100 transition-all">
                                <Icon name="PlayCircle" size={13}/> Video Tutorial
                            </a>
                        </div>
                        <p className="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 Scout Recon * BLACK KNIGHT ARMAMENT * v{APP_VERSION}</p>
                    </footer>
                </div>
                {/* Mobile Recon FAB */}
                <ProfitScout
                    proxyUrl={PROXY_API_URL}
                    ebayConditions={EBAY_CONDITIONS}
                    showToast={showToast}
                    dbRef={dbRef}
                    user={user}
                    inline={false}
                    scanPreload={reconPreload}
                    onScanRequest={() => setShowScanner(true)}
                    userSettings={settings}
                    onSendToProcessing={(item) => {
                        setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                        setActiveTab('process');
                        showToast('Recon item sent to Processing.');
                    }}
                    onSaveTarget={(t) => showToast(`Target saved: ${t.title.slice(0,30)}...`)}
                />
                </>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
