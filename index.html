<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JDINJAX eBay Listing Pro</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JDINJAX">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- Android / Theme -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    
    <!-- Script Imports (Locked Baseline) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
        .auth-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const APP_VERSION = "3.9.0";

        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';
        const SCRAPER_API_URL  = _isLocal ? 'http://127.0.0.1:3001/api/category-lookup' : '/api/category-lookup';

        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
        };

        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        const EBAY_CONDITIONS = [
            { id: '1000', label: 'New' }, { id: '1500', label: 'New — Other' }, { id: '1750', label: 'New — Open Box' },
            { id: '2000', label: 'Seller Refurbished' }, { id: '2500', label: 'Used — Like New' }, { id: '3000', label: 'Used — Good' },
            { id: '4000', label: 'Used — Acceptable' }, { id: '7000', label: 'For Parts / Not Working' }
        ];

        const JDINJAX_SYSTEM_PROMPT = `Role: eBay Listing Pro for Black Knight Armament. Title STRICT MAX 80 CHARS. End price in .95. Calculate initial price as NEW. Format: JSON.`;

        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title: { type: "STRING" },
                categoryPath: { type: "STRING" },
                categoryId: { type: "STRING" },
                buyItNowPrice: { type: "NUMBER" },
                keyFeatures: { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded: { type: "ARRAY", items: { type: "STRING" } },
                flaws: { type: "STRING" },
                weightItem: { type: "STRING" },
                weightPackaging: { type: "STRING" },
                weightTotal: { type: "STRING" },
                dimensions: { type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };

        const App = () => {
            // Auth State
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isRegistering, setIsRegistering] = useState(false);

            // App State
            const [images, setImages] = useState([]);
            const [listings, setListings] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [status, setStatus] = useState("");
            const [activeTab, setActiveTab] = useState('process');
            const [processMode, setProcessMode] = useState('bulk');
            const [batchCondition, setBatchCondition] = useState('1000');
            const [errorMsg, setErrorMsg] = useState(null);
            const [toast, setToast] = useState("");
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [tempCategoryData, setTempCategoryData] = useState({ id: '', path: '' });
            const [pricingListingId, setPricingListingId] = useState(null);

            const dbRef = useRef(null);

            // Init Firebase & Listen for Auth Changes
            useEffect(() => {
                const init = async () => {
                    try {
                        await fetchAppConfig();
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        dbRef.current = firebase.firestore();
                        
                        // Set up the persistent listener
                        firebase.auth().onAuthStateChanged(u => {
                            setUser(u);
                            setAuthLoading(false);
                        });
                    } catch (e) { setErrorMsg("Setup Error: " + e.message); }
                };
                init();
            }, []);

            // Sync Inventory based on Authenticated UID
            useEffect(() => {
                if (!user || !dbRef.current) return;
                const path = getListingsPath(user.uid);
                const unsubscribe = dbRef.current.collection(path).onSnapshot(snap => {
                    setListings(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => setErrorMsg("Sync error: " + err.message));
                return () => unsubscribe();
            }, [user]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };
            const cleanJson = (text) => text.replace(/```json|```/g, '').trim();

            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                setAuthLoading(true);
                setErrorMsg(null);
                try {
                    if (isRegistering) {
                        await firebase.auth().createUserWithEmailAndPassword(email, password);
                        showToast("Account Created.");
                    } else {
                        await firebase.auth().signInWithEmailAndPassword(email, password);
                        showToast("Access Granted.");
                    }
                } catch (err) {
                    setErrorMsg(err.message);
                } finally {
                    setAuthLoading(false);
                }
            };

            const logout = () => {
                firebase.auth().signOut().then(() => {
                    setUser(null);
                    showToast("Logged Out.");
                });
            };

            const nuclearReset = async () => {
                if (!window.confirm("⚠️ EMERGENCY PURGE: Clear all inventory drafts?")) return;
                try {
                    const batch = dbRef.current.batch();
                    listings.forEach(l => {
                        const ref = dbRef.current.collection(getListingsPath(user.uid)).doc(l.id);
                        batch.delete(ref);
                    });
                    await batch.commit();
                    showToast("System Reset Complete.");
                } catch (e) { setErrorMsg("Reset failed: " + e.message); }
            };

            const exportEbayCSV = () => {
                if (listings.length === 0) return;
                const headers = ["Action(SiteID=US|Country=US|Currency=USD|Version=1.0|CC=UTF-8)", "Category", "Title", "ConditionID", "BuyItNowPrice", "Quantity", "Description", "PicURL"];
                const rows = listings.map(l => {
                    const cleanTitle = (l.title || "").substring(0, 80).replace(/"/g, '""');
                    const cleanDesc = (l.markdownDescription || "").replace(/"/g, '""');
                    return ["VerifyAdd", l.categoryId || "", `"${cleanTitle}"`, l.conditionId || "1000", l.buyItNowPrice || "0.00", "1", `"${cleanDesc}"`, `"${l.images?.[0] || ''}"`];
                });
                const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `ebay_batch_${Date.now()}.csv`;
                link.click();
                showToast("CSV Exported.");
            };

            const buildJDINJAXDescriptions = (data) => {
                const features = (data.keyFeatures || []).map(f => `• ${f}`).join('\n');
                const included = (data.whatsIncluded || []).map(i => `• ${i}`).join('\n');
                return `Description\n\nKey Features:\n${features}\n\nWhat's Included:\n${included}\n\nVisible Flaws:\n${data.flaws || "None observed"}\n\nShipping Specs:\n- Wt: ${data.weightTotal || 'TBD'}\n- Dims: ${data.dimensions || 'TBD'}\n\nReturns: Buyer responsible for shipping. Continental U.S. only.`.trim();
            };

            const generateJDINJAXListing = async (files, prompt) => {
                const b64s = await Promise.all(files.map(file => new Promise(res => {
                    const r = new FileReader(); r.readAsDataURL(file); r.onload = e => res(e.target.result.split(',')[1]);
                })));
                const res = await fetch(PROXY_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gemini-2.5-flash",
                        contents: [{ role: "user", parts: [{ text: prompt }, ...b64s.map(b => ({ inlineData: { mimeType: "image/jpeg", data: b } }))] }],
                        systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                        generationConfig: { responseMimeType: "application/json", responseSchema: JSON_SCHEMA }
                    })
                });
                const result = await res.json();
                const aiData = JSON.parse(cleanJson(result.candidates[0].content.parts[0].text));
                if (aiData.title) aiData.title = aiData.title.substring(0, 80).trim();
                return aiData;
            };

            const processImages = async (mode) => {
                if (!user) return;
                const step = mode === 'bulk' ? 4 : 1;
                const total = Math.floor(images.length / step);
                setIsProcessing(true);
                try {
                    const listingsPath = getListingsPath(user.uid);
                    for (let i = 0; i < total; i++) {
                        const batch = images.slice(i * step, (i * step) + step);
                        setStatus(`Processing ${i+1}/${total}...`);
                        const urls = await Promise.all(batch.map(async img => {
                            const fd = new FormData(); fd.append("file", img.file); fd.append("upload_preset", CLOUDINARY_CONFIG.uploadPreset);
                            const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const d = await r.json(); return d.secure_url;
                        }));
                        const aiData = await generateJDINJAXListing(batch.map(b => b.file), "Generate technical eBay listing JSON.");
                        try {
                            const params = new URLSearchParams({ title: aiData.title, predictedPath: aiData.categoryPath });
                            const dbRes = await fetch(`${SCRAPER_API_URL}?${params.toString()}`);
                            if (dbRes.ok) {
                                const dbData = await dbRes.json();
                                aiData.categoryId = dbData.categoryId; aiData.categoryPath = dbData.categoryPath;
                            }
                        } catch (e) {}
                        await dbRef.current.collection(listingsPath).add({
                            ...aiData, images: urls, conditionId: batchCondition, timestamp: Date.now(),
                            markdownDescription: buildJDINJAXDescriptions(aiData)
                        });
                    }
                    setImages(images.slice(total * step)); setActiveTab('listings'); showToast(`${total} Ads Generated.`);
                } catch (e) { setErrorMsg(e.message); } finally { setIsProcessing(false); setStatus(""); }
            };

            const researchPrice = async (listing) => {
                if (pricingListingId) return;
                setPricingListingId(listing.id);
                const condition = EBAY_CONDITIONS.find(c => c.id === listing.conditionId)?.label || 'New';
                try {
                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ parts: [{ text: `Market evaluation for: ${listing.title}. Condition: ${condition}. Return JSON with low, mid, high, confidence, basis.` }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await res.json();
                    const prices = JSON.parse(cleanJson(data.candidates[0].content.parts[0].text));
                    await dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`).update({ priceResearch: prices, buyItNowPrice: prices.mid });
                    showToast("Price Intel Updated.");
                } catch (e) { setErrorMsg("Research Failed."); } finally { setPricingListingId(null); }
            };

            // ── RENDER AUTH BRIDGE ──────────────────────────────────────────
            if (authLoading) {
                return <div className="min-h-screen flex items-center justify-center bg-slate-100"><Icon name="Loader2" size={48} className="text-blue-600 animate-spin" /></div>;
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <div className="max-w-md w-full auth-card rounded-[2.5rem] shadow-2xl p-10 border border-slate-200 animate-in fade-in zoom-in-95 duration-500">
                            <div className="text-center mb-8">
                                <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200">
                                    <Icon name="Shield" size={40} className="text-white" />
                                </div>
                                <h1 className="text-3xl font-black uppercase tracking-tighter leading-none">JDINJAX</h1>
                                <p className="text-blue-600 text-sm font-black uppercase tracking-[0.3em] mt-1">Console Perimeter</p>
                            </div>
                            
                            <form onSubmit={handleAuthSubmit} className="space-y-4">
                                <div>
                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-4 mb-1 block">Operator ID (Email)</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="name@email.com" />
                                </div>
                                <div>
                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-4 mb-1 block">Security Key (Password)</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="••••••••" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all uppercase text-[11px] tracking-widest active:scale-95">
                                    {isRegistering ? "Register New Account" : "Access Console"}
                                </button>
                            </form>

                            <div className="mt-8 text-center">
                                <button onClick={() => setIsRegistering(!isRegistering)} className="text-[10px] font-black uppercase text-slate-400 hover:text-blue-600 transition-colors">
                                    {isRegistering ? "Already have an account? Sign In" : "Need access? Request Account"}
                                </button>
                                {errorMsg && <p className="mt-6 p-4 bg-red-50 border border-red-100 text-red-600 text-[10px] font-black rounded-xl uppercase tracking-wider leading-relaxed">{errorMsg}</p>}
                            </div>
                        </div>
                    </div>
                );
            }

            // ── RENDER MAIN CONSOLE ─────────────────────────────────────────
            const sortedListings = [...listings].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto animate-in fade-in duration-700">
                    {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl animate-in fade-in">{toast}</div>}

                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-6">
                            <h1 className="text-2xl font-black flex items-center gap-3"><Icon name="Package" className="text-blue-600" size={32} /> JDINJAX</h1>
                            <div className="hidden md:block h-10 w-[1px] bg-slate-300"></div>
                            <div className="flex flex-col">
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Authenticated Operator</span>
                                <span className="text-xs font-black text-blue-600 truncate max-w-[150px]">{user.email}</span>
                            </div>
                        </div>
                        
                        <nav className="flex items-center bg-white rounded-xl shadow-sm p-1 border border-slate-200">
                            <button onClick={() => setActiveTab('process')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'process' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>PROCESSOR</button>
                            <button onClick={() => setActiveTab('listings')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'listings' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>INVENTORY ({listings.length})</button>
                            <div className="w-[1px] h-6 bg-slate-200 mx-2"></div>
                            <button onClick={logout} className="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Secure Logout"><Icon name="LogOut" size={20}/></button>
                        </nav>
                    </header>

                    <main>
                        {activeTab === 'process' ? (
                            <section className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between gap-4">
                                    <div className="flex bg-white rounded-2xl p-1 border border-slate-200 shadow-sm w-fit">
                                        <button onClick={() => setProcessMode('single')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${processMode === 'single' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}>Single Ad</button>
                                        <button onClick={() => setProcessMode('bulk')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${processMode === 'bulk' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400'}`}>Bulk (4:1)</button>
                                    </div>
                                    <div className="bg-white rounded-2xl p-1 px-4 border border-slate-200 shadow-sm flex items-center gap-3">
                                        <span className="text-[9px] font-black uppercase text-slate-400">Condition</span>
                                        <select value={batchCondition} onChange={(e) => setBatchCondition(e.target.value)} className="bg-transparent text-[10px] font-black uppercase text-blue-600 focus:outline-none">{EBAY_CONDITIONS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
                                    </div>
                                    <button onClick={nuclearReset} className="px-4 py-2 bg-red-50 text-red-600 rounded-xl text-[9px] font-black border border-red-100 uppercase flex items-center gap-2 transition-all hover:bg-red-100"><Icon name="Zap" size={12}/> Purge</button>
                                </div>
                                <div className="bg-white border-2 border-dashed border-slate-300 rounded-[2.5rem] p-12 text-center relative group hover:border-blue-400 transition-all">
                                    <input type="file" multiple accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => {
                                        const f = Array.from(e.target.files).map(file => ({ id: Math.random().toString(36), url: URL.createObjectURL(file), file }));
                                        setImages([...images, ...f]);
                                    }} />
                                    <Icon name="Upload" size={48} className="text-blue-500 mb-4" />
                                    <h3 className="text-lg font-black uppercase tracking-tight">Load Ad Assets</h3>
                                    <p className="text-slate-400 text-xs mt-2 italic max-w-md mx-auto leading-relaxed">
                                        {processMode === 'single' ? "Single Mode: 1 photo = 1 ad." : "Bulk Mode: 4 photos = 1 ad."}
                                    </p>
                                </div>
                                {images.length > 0 && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm animate-in slide-in-from-bottom-4">
                                        <div className="p-4 grid grid-cols-4 sm:grid-cols-8 gap-3 max-h-64 overflow-y-auto no-scrollbar">
                                            {images.map(img => (
                                                <div key={img.id} className="aspect-square rounded-xl overflow-hidden border border-slate-100 relative group">
                                                    <img src={img.url} className="w-full h-full object-cover" />
                                                    <button onClick={() => setImages(images.filter(i => i.id !== img.id))} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2" size={12}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 bg-slate-50 border-t">
                                            <button disabled={isProcessing} onClick={() => processImages(processMode)} className={`w-full py-4 rounded-2xl font-black text-xs uppercase shadow-lg ${processMode === 'single' ? 'bg-slate-800 text-white' : 'bg-blue-600 text-white'}`}>
                                                {isProcessing ? status : `Generate Drafts`}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </section>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm gap-4">
                                    <div className="flex items-center gap-4">
                                        <p className="text-sm font-black text-slate-800 uppercase tracking-widest">{listings.length} Ready Drafts</p>
                                        <button onClick={exportEbayCSV} disabled={listings.length === 0} className="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-md transition-all active:scale-95 disabled:bg-slate-200"><Icon name="Download" size={14}/> Export CSV</button>
                                    </div>
                                    <button onClick={nuclearReset} className="px-6 py-3 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 border border-red-100 shadow-sm"><Icon name="Zap" size={14}/> Emergency Reset</button>
                                </div>
                                {sortedListings.map(l => (
                                    <div key={l.id} className="bg-white rounded-[2rem] border border-slate-200 flex flex-col md:flex-row overflow-hidden shadow-sm hover:border-blue-300 transition-all animate-in fade-in">
                                        <div className="md:w-72 h-72 md:h-auto shrink-0 bg-slate-50 border-r border-slate-100 relative group">
                                            <img src={l.images?.[0]} className="w-full h-full object-cover" />
                                            <div className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">{l.images?.length || 0} Assets</div>
                                        </div>
                                        <div className="p-8 flex-grow">
                                            <div className="flex justify-between items-start mb-4">
                                                {editingCategoryId === l.id ? (
                                                    <div className="flex flex-col gap-3 w-full mr-4 bg-blue-50/50 p-5 rounded-3xl border border-blue-200 shadow-inner">
                                                        <input className="text-xs font-bold border border-blue-200 rounded-xl px-4 py-3 bg-white" value={tempCategoryData.path} onChange={(e) => setTempCategoryData({...tempCategoryData, path: e.target.value})} placeholder="Path" />
                                                        <div className="flex gap-2">
                                                            <input className="text-sm font-black border border-blue-200 rounded-xl px-4 py-3 bg-white flex-grow" value={tempCategoryData.id} onChange={(e) => setTempCategoryData({...tempCategoryData, id: e.target.value})} placeholder="Leaf ID" />
                                                            <button onClick={async () => {
                                                                await dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({ categoryId: tempCategoryData.id, categoryPath: tempCategoryData.path });
                                                                setEditingCategoryId(null); showToast("Saved.");
                                                            }} className="bg-blue-600 text-white px-5 rounded-xl font-black uppercase text-[10px] shadow-md transition-all active:scale-95">Save</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full uppercase tracking-widest border border-blue-100 flex items-center gap-2 group/cat shadow-sm">
                                                            {l.categoryPath || 'No Path Assigned'}
                                                            <button onClick={() => { setEditingCategoryId(l.id); setTempCategoryData({ id: l.categoryId, path: l.categoryPath }); }} className="opacity-0 group-hover/cat:opacity-100 hover:text-blue-800 transition-opacity"><Icon name="Edit2" size={10}/></button>
                                                        </span>
                                                        <div className="flex flex-col items-end">
                                                            <span className="text-2xl font-black text-slate-900 tracking-tighter">${Number(l.buyItNowPrice || 0).toFixed(2)}</span>
                                                            <span className="text-[10px] font-black text-slate-400 uppercase">ID: {l.categoryId || 'N/A'}</span>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                            
                                            <h3 className="text-xl font-black text-slate-900 uppercase leading-tight mb-2">{l.title || "Untitled Ad"}</h3>
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">{(l.title || "").length}/80 Chars</p>

                                            <div className="bg-slate-50 border border-slate-200 rounded-3xl p-5 mb-6 shadow-inner">
                                                <div className="flex items-center gap-2 mb-3 border-b border-slate-200 pb-2">
                                                    <Icon name="FileText" size={14} className="text-blue-500" />
                                                    <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest">Description Intel</span>
                                                </div>
                                                <div className="whitespace-pre-wrap text-[11px] font-mono text-slate-600 h-40 overflow-y-auto no-scrollbar leading-relaxed">{l.markdownDescription || "No data."}</div>
                                            </div>

                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-5 rounded-3xl border border-slate-200 mb-6">
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Item Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightItem || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Pack Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightPackaging || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Total Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightTotal || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Dims</p><p className="text-xs font-bold text-slate-800 text-center">{l.dimensions || 'N/A'}</p></div>
                                            </div>

                                            <div className="bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100">
                                                <span className="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest text-center">Item Condition</span>
                                                <select value={l.conditionId || '1000'} onChange={e => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({conditionId: e.target.value})} className="w-full bg-transparent text-xs font-black uppercase text-blue-600 cursor-pointer text-center focus:outline-none">{EBAY_CONDITIONS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
                                            </div>

                                            {l.priceResearch && (
                                                <div className="bg-gradient-to-br from-blue-50 to-slate-50 rounded-2xl p-5 border border-blue-100 mb-6 shadow-sm">
                                                    <div className="flex items-end gap-4 mb-3">
                                                        <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">Low</span><span className="text-sm font-black text-slate-500">${Number(l.priceResearch?.low || 0).toFixed(2)}</span></div>
                                                        <div className="flex-1 text-center bg-white rounded-2xl px-4 py-3 border border-blue-200 shadow-sm"><span className="text-[8px] text-blue-500 font-black uppercase block mb-1">Recommended</span><span className="text-2xl font-black text-blue-700">${Number(l.priceResearch?.mid || 0).toFixed(2)}</span></div>
                                                        <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">High</span><span className="text-sm font-black text-slate-500">${Number(l.priceResearch?.high || 0).toFixed(2)}</span></div>
                                                        <span className="text-[8px] font-black px-2 py-1 rounded-lg uppercase bg-green-100 text-green-700 shadow-sm">{l.priceResearch?.confidence || 'N/A'}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-600 italic leading-relaxed border-l-2 border-blue-200 pl-3">{l.priceResearch?.basis}</p>
                                                </div>
                                            )}

                                            <div className="flex items-center justify-between border-t border-slate-100 pt-6">
                                                <div className="flex gap-4">
                                                    <button onClick={() => researchPrice(l)} disabled={pricingListingId === l.id} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-2 transition-all active:scale-95 shadow-lg">{pricingListingId === l.id ? <Icon name="Loader2" className="animate-spin" size={14}/> : <Icon name="TrendingUp" size={14}/>} Price Intel</button>
                                                    <button onClick={async () => { await navigator.clipboard.writeText(l.markdownDescription || ''); showToast("Copied!"); }} className="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border border-slate-200 flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm active:scale-95"><Icon name="Clipboard" size={14}/> Copy Desc</button>
                                                </div>
                                                <button onClick={() => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).delete()} className="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all active:scale-90"><Icon name="Trash2" size={22}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 JDINJAX AUTOMATION • BLACK KNIGHT ARMAMENT • v{APP_VERSION}</footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
