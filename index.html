            // Add images to a listing via Cloudinary upload (same signing flow as main processor)
            const addImagesToListing = async (listingId, existingImages, files) => {
                if (!files.length || !CLOUDINARY_CONFIG) return;
                try {
                    const slots = 12 - (existingImages?.length || 0);
                    if (slots <= 0) { showToast('Max 12 images per listing', 'error'); return; }
                    const timestamp = Math.round(Date.now() / 1000);
                    const signRes = await fetch('/api/sign-upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ timestamp })
                    });
                    const { signature, folder } = await signRes.json();
                    const results = await Promise.allSettled(
                        Array.from(files).slice(0, slots).map(async file => {
                            const fd = new FormData();
                            fd.append('file', file);
                            fd.append('api_key', CLOUDINARY_CONFIG.apiKey);
                            fd.append('timestamp', timestamp);
                            fd.append('signature', signature);
                            fd.append('folder', folder);
                            const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: 'POST', body: fd });
                            const d = await r.json();
                            if (!d.secure_url) throw new Error(d.error?.message || 'Upload failed');
                            return d.secure_url;
                        })
                    );
                    const uploaded = results.filter(r => r.status === 'fulfilled').map(r => r.value);
                    if (!uploaded.length) { showToast('All uploads failed', 'error'); return; }
                    const newImages = [...(existingImages || []), ...uploaded];
                    await dbRef.current.doc(`${getListingsPath(user.uid)}/${listingId}`).update({ images: newImages });
                    showToast(`${uploaded.length} image${uploaded.length > 1 ? 's' : ''} added`);
                } catch(e) { showToast(`Upload failed: ${e.message}`, 'error'); }
            };

            // ── Background Removal (client-side, @imgly/background-removal) ─────────
            const removeBg = async (listingId, imageUrl) => {
                if (bgRemoving.has(listingId)) return;
                setBgRemoving(prev => new Set([...prev, listingId]));
                try {
                    showToast('Loading BG removal model…');
                    const { removeBackground } = await getBgRemovalLib();
                    showToast('Removing background…');
                    // removeBackground accepts a URL and returns a transparent PNG Blob
                    const resultBlob = await removeBackground(imageUrl, { output: { format: 'image/png' } });
                    showToast('Resizing & uploading…');
                    const { blob: uploadBlob, mimeType: uploadMime } = await compressBgRemoved(resultBlob);
                    // Sign + upload using existing pattern
                    const timestamp = Math.round(Date.now() / 1000);
                    const signRes = await fetch(SIGN_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.uid, timestamp })
                    });
                    const { signature, folder } = await signRes.json();
                    const fd = new FormData();
                    fd.append('file', uploadBlob, 'bg-removed.webp');
                    fd.append('api_key', CLOUDINARY_CONFIG.apiKey);
                    fd.append('timestamp', timestamp);
                    fd.append('signature', signature);
                    fd.append('folder', folder);
                    const upRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: 'POST', body: fd });
                    const upData = await upRes.json();
                    if (!upData.secure_url) throw new Error(upData.error?.message || 'Upload failed');
                    // Patch Firestore: replace images[0] with the new transparent PNG URL
                    const listing = listings.find(l => l.id === listingId);
                    const updatedImages = listing?.images ? [upData.secure_url, ...listing.images.slice(1)] : [upData.secure_url];
                    await dbRef.current.doc(`${getListingsPath(user.uid)}/${listingId}`).update({ images: updatedImages });
                    showToast('Background removed!', 'success');
                } catch(e) {
                    console.error('[BG Removal]', e);
                    showToast('BG removal failed: ' + e.message, 'error');
                } finally {
                    setBgRemoving(prev => { const s = new Set(prev); s.delete(listingId); return s; });

            };

            const createEmailUser = async () => {

            };

            const exportEbayCSV = () => {
                if (listings.length === 0) return;
                
                // EXACT MAPPING TO UPLOADED TEMPLATE
                const infoLines = [
                    "#INFO,Version=0.0.2,Template= eBay-draft-listings-template_US,,,,,,,,",
                    "#INFO Action and Category ID are required fields. 1) Set Action to Draft 2) Please find the category ID for your listings here: https://pages.ebay.com/sellerinformation/news/categorychanges.html,,,,,,,,,,",
                    "\"#INFO After you've successfully uploaded your draft from the Seller Hub Reports tab, complete your drafts to active listings here: https://www.ebay.com/sh/lst/drafts\",,,,,,,,,,",
                    "#INFO,,,,,,,,,,"
                ];

                const headers = [
                    "Action(SiteID=US|Country=US|Currency=USD|Version=1193|CC=UTF-8)",
                    "Custom label (SKU)",
                    "Category ID",
                    "Title",
                    "UPC",

                const rows = listings.map(l => {

                    const safeConditionId = sanitizeConditionId(l.conditionId || '1000', l.categoryId);

                        `"${escapedDesc}"`,        // Description
                        "FixedPrice",              // Format

                        `"${(settings.paymentProfile  || "").replace(/"/g, '""')}"`,  // PaymentProfileName
                        `"${(settings.returnProfile   || "").replace(/"/g, '""')}"`,  // ReturnProfileName
                        `"${(settings.storeName       || "").replace(/"/g, '""')}"`,  // StoreName

                        settings.postalCode ? `"${settings.postalCode}"` : "",  // PostalCode
                        `"${(l.ammunitionType || "Other").replace(/"/g, '""')}"`,    // C:Ammunition Type

                const csvContent = [

                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                const blobUrl = URL.createObjectURL(blob);
                link.href = blobUrl;
                link.download = `ebay_draft_import_${Date.now()}.csv`;
                link.click();
                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                showToast("CSV Exported (Template v1193).");
            };

            const formatScheduleTime = (isoStr) => {
                // eBay CSV ScheduleTime format: YYYY-MM-DD HH:MM:SS in UTC
                const d = new Date(isoStr);
                const yr  = d.getUTCFullYear();
                const mo  = String(d.getUTCMonth() + 1).padStart(2, '0');
                const dy  = String(d.getUTCDate()).padStart(2, '0');
                const hr  = String(d.getUTCHours()).padStart(2, '0');
                const mn  = String(d.getUTCMinutes()).padStart(2, '0');
                const sc  = String(d.getUTCSeconds()).padStart(2, '0');
                return `${yr}-${mo}-${dy} ${hr}:${mn}:${sc}`;
            };

            const formatScheduleTimeDisplay = (isoStr) => {
                // Human-readable UTC display in toast
                const d = new Date(isoStr);
                return d.toUTCString().replace(' GMT', ' UTC');
            };

            const exportEbayAddCSV = (isoScheduleTime) => {
                if (listings.length === 0) return;
                const schedStr = formatScheduleTime(isoScheduleTime);

                const headers = [
                    "Action(SiteID=US|Country=US|Currency=USD|Version=1193|CC=UTF-8)",
                    "Custom label (SKU)",
                    "Category ID",
                    "Title",
                    "Price",
                    "Quantity",
                    "Item photo URL",
                    "ConditionID",
                    "Description",
                    "Format",
                    "ListingDuration",
                    "Location",
                    "PostalCode",
                    "C:Brand",
                    "C:Type",
                    "C:Ammunition Type",
                    "C:Model",
                    "ScheduleTime",
                    "ShippingProfileName",
                    "PaymentProfileName",
                    "ReturnProfileName"
                ];

                const rows = listings.map(l => {
                    const cleanTitle  = (l.title || "").substring(0, 80).replace(/"/g, '""');
                    const htmlDesc    = `<div>${convertToHtml(l.markdownDescription)}</div>`;
                    const escapedDesc = htmlDesc.replace(/"/g, '""');
                    const sku         = l.sku || `BKA-${l.timestamp || Date.now()}`;
                    // Sanitize at export time — invalid conditionId for this category → '1000' (New)
                    const safeConditionId = sanitizeConditionId(l.conditionId || '1000', l.categoryId);
                    return [
                        "Add",
                        sku,
                        l.categoryId   || "",
                        `"${cleanTitle}"`,
                        Number(l.buyItNowPrice || 0).toFixed(2),
                        "1",
                        `"${(l.images || []).slice(0, 12).join('|')}"`,
                        safeConditionId,           // Condition ID — sanitized, guaranteed valid for category
                        `"${escapedDesc}"`,
                        "FixedPrice",
                        "GTC",
                        `"${(settings.location   || "").replace(/"/g, '""')}"`,
                        `"${(settings.postalCode || "").replace(/"/g, '""')}"`,
                        `"${(l.brand          || "Unbranded").replace(/"/g, '""')}"`,
                        `"${(l.itemType       || "").replace(/"/g, '""')}"`,
                        `"${(l.ammunitionType || "Other").replace(/"/g, '""')}"`,
                        `"${(l.model          || "").replace(/"/g, '""')}"`,
                        `"${schedStr}"`,   // quoted  -  contains spaces
                        `"${(settings.shippingProfile || "").replace(/"/g, '""')}"`,
                        `"${(settings.paymentProfile  || "").replace(/"/g, '""')}"`,
                        `"${(settings.returnProfile   || "").replace(/"/g, '""')}"`
                    ];
                });

                const csvContent = [
                    headers.join(","),
                    ...rows.map(r => r.join(","))
                ].join("\r\n");

                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                const blobUrl2 = URL.createObjectURL(blob);
                link.href = blobUrl2;
                link.download = `ebay_add_import_${Date.now()}.csv`;
                link.click();
                setTimeout(() => URL.revokeObjectURL(blobUrl2), 5000);
                showToast("✅ Add CSV Exported — Listings scheduled for: " + formatScheduleTimeDisplay(isoScheduleTime));
                setShowSchedulePicker(false);
            };

            const processImages = async (mode) => {
                if (!user) return;

                if (images.length === 0) {
                    showToast('No images loaded. Add images before processing.', 'error');
                    return;
                }

                // Single mode: ALL images → 1 listing.
                // Bulk mode: group by user-defined bulkGroupSize.
                const groupSize = parseInt(settings.bulkGroupSize) || 4;
                const batches = mode === 'single'
                    ? [images]
                    : Array.from({ length: Math.ceil(images.length / groupSize) }, (_, i) => images.slice(i * groupSize, i * groupSize + groupSize));
                const total = batches.length;
                setIsProcessing(true);
                let completed = 0;
                setStatus(`Processing 0/${total}...`);
                try {
                    const listingsPath = getListingsPath(user.uid);
                    // If BG removal is enabled, load the library once before parallel processing
                    let bgRemovalFn = null;
                    if (removeBgOnProcess) {
                        setStatus('Loading BG removal model…');
                        const lib = await getBgRemovalLib();
                        bgRemovalFn = lib.removeBackground;
                        setStatus(`Processing 0/${total}…`);
                    }

                    await Promise.all(batches.map(async (batch, i) => {
                        // Optionally strip backgrounds before compress+upload
                        const processedBatch = bgRemovalFn
                            ? await Promise.all(batch.map(async img => {
                                const bgBlob = await bgRemovalFn(img.url, { output: { format: 'image/png' } });
                                return { ...img, _bgBlob: bgBlob };
                              }))
                            : batch;

                        // Compress all images in this batch in parallel
                        const compressed = await Promise.all(processedBatch.map(img =>
                            img._bgBlob
                                // BG-removed: resize to 1024px + convert to WebP (transparency + ~80% size reduction vs PNG)
                                ? compressBgRemoved(img._bgBlob)
                                : compressImage(img)
                        ));
                        const primaryB64 = { data: compressed[0].b64, mimeType: compressed[0].mimeType };

                        // Single sign-upload call for the whole batch — all images share timestamp+signature
                        const timestamp = Math.round(Date.now() / 1000);
                        const signRes = await fetch(SIGN_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: user.uid, timestamp })
                        });
                        const { signature, folder } = await signRes.json();

                        // Fire Cloudinary uploads + Gemini in parallel
                        const MAX_UPLOAD_BYTES = 15 * 1024 * 1024; // 15 MB hard cap
                        const uploadPromise = Promise.allSettled(compressed.map(async (comp) => {
                            if (comp.blob.size > MAX_UPLOAD_BYTES) throw new Error(`Image exceeds 15 MB limit (${(comp.blob.size/1024/1024).toFixed(1)} MB)`);
                            const fd = new FormData();
                            fd.append("file", comp.blob);
                            fd.append("api_key", CLOUDINARY_CONFIG.apiKey);
                            fd.append("timestamp", timestamp);
                            fd.append("signature", signature);
                            fd.append("folder", folder);
                            const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const d = await r.json();
                            if (!d.secure_url) throw new Error(`Upload failed: ${d.error?.message || 'Unknown error'}`);
                            return d.secure_url;
                        }));

                        const geminiPromise = fetch(PROXY_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: "gemini-2.5-flash",
                                contents: [{ role: "user", parts: [{ text: "Technical eBay JSON data." }, { inlineData: { mimeType: primaryB64.mimeType, data: primaryB64.data } }] }],
                                systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                                generationConfig: { responseMimeType: "application/json", responseSchema: JSON_SCHEMA }
                            })
                        });

                        const [uploadResults, geminiRes] = await Promise.all([uploadPromise, geminiPromise]);

                        const failedUploads = uploadResults.filter(r => r.status === 'rejected').length;
                        if (failedUploads > 0) showToast(`${failedUploads} image(s) failed to upload  -  skipped.`);
                        const urls = uploadResults.filter(r => r.status === 'fulfilled').map(r => r.value);
                        if (urls.length === 0) { showToast(`Batch ${i+1}: all uploads failed — check Cloudinary config.`, 'error'); return; }

                        const result = await geminiRes.json();
                        if (!result.candidates?.[0]?.content?.parts?.[0]?.text) {
                            console.error('[Gemini] Bad response:', JSON.stringify(result).substring(0, 300));
                            throw new Error('Gemini returned no candidates — check model or API key.');
                        }
                        const aiData = JSON.parse(cleanJson(result.candidates[0].content.parts[0].text));

                        aiData.categorySource = 'AI Draft';
                        const currentCondition = EBAY_CONDITIONS.find(c => c.id === batchCondition)?.label || 'Used';
                        const finalConditionId = sanitizeConditionId(batchCondition, aiData.categoryId);
                        const listingPayload = {
                            ...aiData,
                            images: urls,
                            conditionId: finalConditionId,
                            timestamp: Date.now(),
                            sku: `BKA-${Date.now()}`,
                            markdownDescription: buildDescription(aiData, currentCondition, settings.adFooter)
                        };
                        const docRef = await dbRef.current.collection(listingsPath).add(listingPayload);

                        // Background: auto price research — fires immediately, no user action needed
                        autoResearchPrice(docRef.id, {
                            title: aiData.title,
                            conditionId: finalConditionId,
                            categoryId: aiData.categoryId
                        }).catch(() => {});

                        // Background: refine category — Firestore listener auto-updates UI when done
                        fetch(CATEGORY_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: aiData.title, keyFeatures: aiData.keyFeatures || [], description: aiData.markdownDescription || '' })
                        }).then(async catRes => {
                            if (!catRes.ok) return;
                            const catData = await catRes.json();
                            await docRef.update({
                                categoryId:     catData.categoryId,
                                categoryPath:   catData.categoryPath,
                                categorySource: catData.confidence === 'High' ? 'AI Verified' : 'AI Predicted',
                                conditionId:    sanitizeConditionId(batchCondition, catData.categoryId)
                            });
                        }).catch(e => console.warn('Category resolve failed:', e.message));

                        completed++;
                        setStatus(`Processing ${completed}/${total}...`);
                    }));

                    images.forEach(img => URL.revokeObjectURL(img.url));
                    setImages([]); setActiveTab('listings'); showToast(`${total} Ad${total !== 1 ? 's' : ''} Generated.`);
                } catch (e) { showToast(e.message || 'Processing failed — check console.', 'error'); console.error('[processImages]', e); } finally { setIsProcessing(false); setStatus(""); }
            };

            // ── Shared price research core ────────────────────────────────────────
            // Used by both the manual Re-Price button and the auto-run after processing.
            // Stores conditionId alongside results so the UI can flag stale prices on condition change.
            const runPriceResearch = async (listing) => {
                const condition = EBAY_CONDITIONS.find(c => c.id === listing.conditionId)?.label || 'Used';
                let prices = null;
                // 1. eBay Browse API — real active listings
                try {
                    const tok = await user.getIdToken();
                    const ebayRes = await fetch('/api/ebay/price-research', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                        body: JSON.stringify({ title: listing.title, conditionId: listing.conditionId, categoryId: listing.categoryId })
                    });
                    const ebayData = await ebayRes.json();
                    if (ebayData.source === 'ebay_browse' && ebayData.mid) {
                        prices = { low: ebayData.low, mid: ebayData.mid, high: ebayData.high,
                            confidence: ebayData.confidence, basis: ebayData.basis,
                            count: ebayData.count, source: 'eBay Live', conditionId: listing.conditionId };
                    }
                } catch(e) { console.warn('[Price] Browse API error:', e.message); }
                // 2. Gemini fallback
                if (!prices) {
                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ role: "user", parts: [{ text: `Estimate current eBay market value for: "${listing.title}". Condition: ${condition}. Return ONLY JSON with keys: low, mid, high (all numbers ending in .95), confidence (string: Low/Medium/High), basis (string: brief 1-sentence rationale).` }] }],
                            systemInstruction: { parts: [{ text: "You are an expert eBay pricing analyst specializing in firearms accessories, tactical gear, and general merchandise. Analyze real eBay sold listings data. All prices must end in .95. Return ONLY valid JSON with no markdown or preamble." }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await res.json();
                    const gPrices = JSON.parse(cleanJson(data.candidates[0].content.parts[0].text));
                    prices = { ...gPrices, source: 'AI Estimate', count: null, conditionId: listing.conditionId };
                }
                await dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`)
                    .update({ priceResearch: prices, buyItNowPrice: prices.mid });
                setLocalPriceResults(prev => ({ ...prev, [listing.id]: prices }));
                return prices;
            };

            // Manual Re-Price button — shows spinner, blocks duplicate clicks
            const researchPrice = async (listing) => {
                if (pricingListingId) return;
                setPricingListingId(listing.id);
                try { await runPriceResearch(listing); }
                catch(e) { setErrorMsg("Re-Price Failed."); }
                finally { setPricingListingId(null); }
            };

            // Auto-run — fires silently after a new listing is created, no UI lock
            const autoResearchPrice = async (listingId, listingSnapshot) => {
                setAutoPricingIds(prev => new Set([...prev, listingId]));
                try { await runPriceResearch({ id: listingId, ...listingSnapshot }); }
                catch(e) { console.warn('[AutoPrice] Failed for', listingId, ':', e.message); }
                finally { setAutoPricingIds(prev => { const n = new Set(prev); n.delete(listingId); return n; }); }
            };

            // ── Phase 5: Direct Listing Submission ────────────────────────────
            // Calls POST /api/ebay/list which runs the full 3-step Sell Inventory API flow:
            //   PUT inventory_item → POST offer → POST offer/publish
            const listOnEbay = async (listing) => {
                if (!user) return;

                // Guard: policies must be configured
                if (!ebayPolicies || !settings.shippingProfile || !settings.paymentProfile || !settings.returnProfile) {
                    showToast('Configure eBay policies in Settings first', 'error');
                    return;
                }

                // Resolve policy IDs from names stored in settings
                const fulfillmentPolicy = ebayPolicies.fulfillment?.find(p => p.name === settings.shippingProfile);
                const paymentPolicy     = ebayPolicies.payment?.find(p => p.name === settings.paymentProfile);
                const returnPolicy      = ebayPolicies.returns?.find(p => p.name === settings.returnProfile);

                if (!fulfillmentPolicy || !paymentPolicy || !returnPolicy) {
                    const missing = [
                        !fulfillmentPolicy && settings.shippingProfile,
                        !paymentPolicy     && settings.paymentProfile,
                        !returnPolicy      && settings.returnProfile
                    ].filter(Boolean).join(', ');
                    showToast(`eBay policy not found: ${missing}`, 'error');
                    return;
                }

                // Build aspects object from saved spec_* fields
                const aspects = {};
                Object.entries(listing).forEach(([key, val]) => {
                    if (key.startsWith('spec_') && val) {
                        const specName = key.slice(5).replace(/_/g, ' ');
                        aspects[specName] = [String(val)];
                    }
                });

                // SKU: unique per listing using doc ID
                const sku = `SR-${listing.id}`;

                // Convert markdown description to HTML for eBay listing body
                const description = convertToHtml(listing.markdownDescription || listing.description || '');

                // Auction settings for this listing
                const auctionCfg  = auctionSettings[listing.id] || {};
                const isAuction   = auctionCfg.format === 'auction';

                setListingStatus(prev => ({ ...prev, [listing.id]: 'publishing' }));

                try {
                    const tok = await user.getIdToken();
                    const body = {
                        sku,
                        title:               listing.title,
                        description,
                        price:               listing.buyItNowPrice,
                        categoryId:          listing.categoryId,
                        conditionId:         listing.conditionId,
                        images:              listing.images || [],
                        aspects,
                        fulfillmentPolicyId: fulfillmentPolicy.id,
                        paymentPolicyId:     paymentPolicy.id,
                        returnPolicyId:      returnPolicy.id,
                        listingDocId:        listing.id,
                        format:              isAuction ? 'AUCTION' : 'FIXED_PRICE',
                        listingDuration:     isAuction ? (auctionCfg.duration || 'DAYS_7') : 'GTC'
                    };
                    if (isAuction) {
                        body.startPrice      = auctionCfg.startPrice || '0.99';
                        if (auctionCfg.reservePrice) body.reservePrice    = auctionCfg.reservePrice;
                        if (auctionCfg.binPrice)     body.auctionBinPrice = auctionCfg.binPrice;
                    } else {
                        // Fixed price extras
                        body.quantity = parseInt(auctionCfg.quantity || 1);
                        const validTiers = (auctionCfg.volumeDiscounts || []).filter(d => d.minQty >= 2 && d.pctOff > 0);
                        if (validTiers.length) body.volumeDiscounts = validTiers;
                    }
                    const res = await fetch('/api/ebay/list', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Listing failed');

                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'live', url: data.listingUrl, listingId: data.listingId, format: isAuction ? 'auction' : 'fixed' } }));
                    showToast(isAuction ? `🔨 Auction live! #${data.listingId}` : `🚀 Listed on eBay! #${data.listingId}`);
                } catch(e) {
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'error', message: e.message } }));
                    showToast(`eBay error: ${e.message}`, 'error');
                }
            };

            // ── Phase 6: Batch-sync eBay status for all listed cards ──────────────
            // Calls POST /api/ebay/sync-status for every card that has an ebayOfferId,
            // then updates listingStatus in memory (and Firestore, server-side).
            const syncEbayStatus = async (targetListings) => {
                if (!user) return;
                const withOffer = (targetListings || listings).filter(l => l.ebayOfferId);
                if (!withOffer.length) return;
                setEbaySync(true);
                try {
                    const tok = await user.getIdToken();
                    // Process in chunks of 50 (server cap)
                    for (let i = 0; i < withOffer.length; i += 50) {
                        const chunk    = withOffer.slice(i, i + 50);
                        const offerIds = chunk.map(l => l.ebayOfferId);
                        const res = await fetch('/api/ebay/sync-status', {
                            method:  'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                            body:    JSON.stringify({ offerIds })
                        });
                        if (!res.ok) { console.warn('[Sync] batch failed:', await res.text()); continue; }
                        const { results } = await res.json();
                        setListingStatus(prev => {
                            const next = { ...prev };
                            chunk.forEach(l => {
                                const r = results[l.ebayOfferId];
                                if (!r) return;
                                if (r.ebayStatus === 'PUBLISHED') {
                                    next[l.id] = { status: 'live',  url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId, price: r.price, quantity: r.quantity };
                                } else if (r.ebayStatus === 'ENDED') {
                                    next[l.id] = { status: 'ended', url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId };
                                } else if (r.ebayStatus === 'SOLD') {
                                    next[l.id] = { status: 'sold', url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId, soldFor: r.soldDetails?.soldFor, soldTo: r.soldDetails?.soldTo };
                                }
                            });
                            return next;
                        });
                    }
                    setLastSynced(new Date());
                    showToast(`Synced ${withOffer.length} eBay listing${withOffer.length !== 1 ? 's' : ''}`);
                } catch(e) {
                    console.warn('[Sync]', e.message);
                    showToast('eBay sync failed: ' + e.message, 'error');
                } finally {
                    setEbaySync(false);
                }
            };

            // ── Phase 6: Relist an ended/sold item on eBay ────────────────────────
            const relistOnEbay = async (listing) => {
                if (!user) return;
                setListingStatus(prev => ({ ...prev, [listing.id]: 'publishing' }));
                try {
                    const tok = await user.getIdToken();
                    const res = await fetch('/api/ebay/relist', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                        body:    JSON.stringify({ listingDocId: listing.id })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Relist failed');
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'live', url: data.listingUrl, listingId: data.listingId, offerId: data.offerId } }));
                    showToast(`🔄 Relisted on eBay! #${data.listingId}`);
                } catch(e) {
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'error', message: e.message } }));
                    showToast(`Relist error: ${e.message}`, 'error');
                }
            };

            if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><Icon name="Loader2" size={48} className="text-blue-600 animate-spin" /></div>;

            // ── Access Denied screen ──────────────────────────────────────────
            if (accessDenied) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-red-200 text-center">
                        <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                            <Icon name="ShieldX" size={28} className="text-red-500"/>
                        </div>
                        <h2 className="text-lg font-black text-red-700 uppercase tracking-tight mb-2">Access Denied</h2>
                        <p className="text-sm text-slate-500 mb-6">Your account has not been approved for Scout Recon. Contact the administrator to request access.</p>
                        <button onClick={() => { setAccessDenied(false); }} className="w-full py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-700 text-sm uppercase tracking-widest">Back to Login</button>
                    </div>
                </div>
            );

            // Surface init errors (bad env vars, network down, etc.) — prevents silent white screen
            if (errorMsg && !user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-red-200">
                        <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mb-6">
                            <Icon name="AlertTriangle" size={28} className="text-red-500"/>
                        </div>
                        <h2 className="text-lg font-black text-red-700 uppercase tracking-tight mb-2">Access Bridge Failure</h2>
                        <p className="text-sm font-bold text-slate-600 mb-4">{errorMsg}</p>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Checklist:</p>
                        <ul className="text-xs text-slate-500 space-y-1 list-disc list-inside mb-6">
                            <li>Node server running on port 3001?</li>
                            <li>.env has all FIREBASE_* keys set?</li>
                            <li>GEMINI_API_KEY and SERPAPI_KEY present?</li>
                            <li>CLOUDINARY_* vars configured?</li>
                        </ul>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-red-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-500 transition-all">
                            Retry
                        </button>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full auth-card rounded-[3rem] shadow-2xl p-10 border border-slate-200 animate-in fade-in zoom-in-95 duration-500">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200 shadow-blue-200/50"><Icon name="Shield" size={40} className="text-white" /></div>
                            <h1 className="text-3xl font-black uppercase tracking-tight">Scout Recon</h1>
                            <p className="text-blue-600 text-xs font-black uppercase tracking-[0.3em] mt-2">Access Bridge Perimeter</p>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-1">Black Knight Armament Logistics</p>
                        </div>
                        <button onClick={handleGoogleAuth} className="w-full bg-white border border-slate-200 text-slate-700 font-bold py-4 rounded-2xl shadow-sm flex items-center justify-center gap-3 hover:bg-slate-50 active:scale-95 text-sm mb-3 transition-all">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Operator Google Access
                        </button>
                        {loginError && (
                            <div className="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 mb-3 text-xs font-bold text-red-600 text-center">{loginError}</div>
                        )}
                        <div className="relative flex items-center justify-center py-4">
                            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200"></div></div>
                            <span className="relative bg-white px-4 text-[9px] font-black uppercase text-slate-400 tracking-widest">OR Logistics ID</span>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full login-field rounded-2xl px-6 py-4 text-sm font-bold focus:outline-none" placeholder="Email ID" />
                            <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full login-field rounded-2xl px-6 py-4 text-sm font-bold focus:outline-none" placeholder="Security Key" />
                            <button type="submit" className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest active:scale-95 shadow-lg shadow-blue-100 transition-all">Enter Console</button>
                        </form>
                    </div>
                </div>
            );

            const handleScan = (upc) => {
                setShowScanner(false);
                setScanResult({ upc });
            };

            const handleSendToRecon = (item, upc) => {
                setScanResult(null);
                setReconPreload({ title: item.title, upc, price: item.price });
            };

            const handleSendToListing = (item, upc) => {
                setScanResult(null);
                setBarcodeListingData({ title: item.title, image: item.image, price: item.price, upc });
                setActiveTab('process');
                showToast('Barcode item loaded  -  review and generate listing.');
            };

            // -- Process barcode item into listing (no photo required) -----------------
            const processBarcodeItem = async () => {
                if (!barcodeListingData || !user) return;
                setIsProcessing(true);
                setActiveTab('process');
                try {
                    const listingsPath = getListingsPath(user.uid);
                    setStatus('Generating listing from barcode data...');

                    // Use SerpApi image URL directly  -  proxy fetch to b64 for Gemini
                    let imageUrls = [];
                    let b64Parts = [];
                    if (barcodeListingData.image) {
                        try {
                            const imgRes = await fetch('/api/proxy-image', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ url: barcodeListingData.image })
                            });
                            if (imgRes.ok) {
                                const { b64, mimeType, cloudinaryUrl } = await imgRes.json();
                                if (cloudinaryUrl) imageUrls = [cloudinaryUrl];
                                if (b64) b64Parts = [{ inlineData: { mimeType, data: b64 } }];
                            }
                        } catch(e) { console.warn('[Barcode Listing] Image proxy failed:', e.message); }
                    }

                    const contextHint = barcodeListingData.title
                        ? 'Item: ' + barcodeListingData.title + (barcodeListingData.price ? '  -  Market price: ' + barcodeListingData.price : '') + '. UPC: ' + (barcodeListingData.upc || '') + '. Generate a complete eBay listing.'
                        : 'Generate a complete eBay listing from the item image.';

                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ role: 'user', parts: [{ text: contextHint }, ...b64Parts] }],
                            systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: 'application/json', responseSchema: JSON_SCHEMA }
                        })
                    });
                    const result = await res.json();
                    const aiData = JSON.parse(cleanJson(result.candidates[0].content.parts[0].text));

                    // Category resolve
                    let finalSource = 'UNMAPPED';
                    try {
                        const catRes = await fetch(CATEGORY_API_URL, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: aiData.title, keyFeatures: aiData.keyFeatures || [], description: aiData.markdownDescription || '' })
                        });
                        if (catRes.ok) {
                            const catData = await catRes.json();
                            aiData.categoryId = catData.categoryId;
                            aiData.categoryPath = catData.categoryPath;
                            finalSource = catData.confidence === 'High' ? 'AI Verified' : 'AI Predicted';
                        }
                    } catch(e) { console.warn('[Barcode Listing] Category resolve failed:', e.message); }

                    aiData.categorySource = finalSource;
                    const currentCondition = EBAY_CONDITIONS.find(ec => ec.id === batchCondition)?.label || 'Used';
                    await dbRef.current.collection(listingsPath).add({
                        ...aiData,
                        images: imageUrls,
                        conditionId: batchCondition,
                        timestamp: Date.now(),
                        sku: 'BKA-' + Date.now(),
                        markdownDescription: buildDescription(aiData, currentCondition, settings.adFooter),
                        upc: barcodeListingData.upc || '',
                        buyItNowPrice: aiData.buyItNowPrice || (barcodeListingData.price ? parseFloat(barcodeListingData.price.replace(/[^0-9.]/g,'')) || 0 : 0)
                    });

                    setBarcodeListingData(null);
                    setActiveTab('listings');
                    showToast('Barcode listing generated successfully.');
                } catch(e) { setErrorMsg('Barcode listing failed: ' + e.message); }
                finally { setIsProcessing(false); setStatus(''); }
            };

            // -- Shared content blocks ------------------------------------------------

            const renderSettingsTab = () => (
                <section className="space-y-6 max-w-xl">

                    {/* ── eBay Account Connection ───────────────────────────────────── */}
                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                        <div className="px-8 py-5 border-b border-slate-100 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Icon name="Link" size={16} className="text-blue-600"/>
                                <div>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">eBay Developer API</p>
                                    <h3 className="text-sm font-black text-slate-800 uppercase tracking-tight">Account Connection</h3>
                                </div>
                            </div>
                            {ebayConn?.connected && (
                                <span className={`text-[8px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${ebayConn.env === 'sandbox' ? 'bg-amber-100 text-amber-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                    {ebayConn.env === 'sandbox' ? '⚗ Sandbox' : '✓ Live'}
                                </span>
                            )}
                        </div>
                        <div className="p-8 space-y-5">
                            <div>
                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                    <Icon name="User" size={11}/> eBay Username
                                </label>
                                <input
                                    type="text"
                                    value={ebayUsername}
                                    onChange={e => setEbayUsername(e.target.value)}
                                    placeholder="Your eBay username"
                                    autoComplete="off"
                                    className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all bg-slate-50 placeholder-slate-300"
                                />
                            </div>
                            <div>
                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                    <Icon name="Lock" size={11}/> eBay Password
                                </label>
                                <input
                                    type="password"
                                    value={ebayPassword}
                                    onChange={e => setEbayPassword(e.target.value)}
                                    placeholder="Your eBay password"
                                    autoComplete="new-password"
                                    className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all bg-slate-50 placeholder-slate-300"
                                />
                            </div>
                            <div className="flex items-center gap-3 pt-1">
                                <button
                                    onClick={syncEbayPolicies}
                                    disabled={ebayPoliciesSyncing || (!ebayConn?.connected && (!ebayUsername || !ebayPassword))}
                                    className="flex-1 flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 transition-all disabled:bg-slate-200 disabled:text-slate-400 active:scale-95 shadow-md shadow-blue-100">
                                    <Icon name={ebayPoliciesSyncing ? 'Loader' : 'RefreshCw'} size={11} className={ebayPoliciesSyncing ? 'animate-spin' : ''}/>
                                    {ebayPoliciesSyncing ? 'Syncing...' : 'Sync with eBay'}
                                </button>
                                {ebayConn?.connected && (
                                    <button
                                        onClick={disconnectEbay}
                                        className="px-4 py-3 border border-slate-200 text-slate-400 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-red-200 hover:text-red-400 transition-all active:scale-95">
                                        Disconnect
                                    </button>
                                )}
                            </div>
                            {ebayConn?.connected && (
                                <p className="text-[9px] font-black text-emerald-500 flex items-center gap-1">
                                    <Icon name="CheckCircle" size={10}/> Connected · {ebayConn.env === 'sandbox' ? 'Sandbox' : 'Live'} · {new Date(ebayConn.connectedAt).toLocaleDateString()}
                                </p>
                            )}
                        </div>
                    </div>

                    {/* ── Business Policies ────────────────────────────────────────── */}
                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                        <div className="px-8 py-5 border-b border-slate-100 flex items-center gap-3">
                            <Icon name="Shield" size={16} className="text-blue-600"/>
                            <div>
                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">eBay Account</p>
                                <h3 className="text-sm font-black text-slate-800 uppercase tracking-tight">Business Policies</h3>
                            </div>
                        </div>
                        <div className="p-8 space-y-5">
                            {[
                                { key: 'shippingProfile', label: 'Shipping Policy', icon: 'Truck',      opts: ebayPolicies?.fulfillment, placeholder: 'e.g. Standard Shipping Policy' },
                                { key: 'paymentProfile',  label: 'Payment Policy',  icon: 'CreditCard', opts: ebayPolicies?.payment,      placeholder: 'e.g. eBay Managed Payments' },
                                { key: 'returnProfile',   label: 'Return Policy',   icon: 'RotateCcw',  opts: ebayPolicies?.returns,      placeholder: 'e.g. 30 Day Returns' },
                            ].map(({ key, label, icon, opts, placeholder }) => (
                                <div key={key}>
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                        <Icon name={icon} size={11}/> {label}
                                    </label>
                                    {opts && opts.length > 0 ? (
                                        <select
                                            value={settings[key] || ''}
                                            onChange={e => setSettings(s => ({ ...s, [key]: e.target.value }))}
                                            className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all bg-slate-50">
                                            <option value="">— Select {label} —</option>
                                            {opts.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                        </select>
                                    ) : (
                                        <input
                                            type="text"
                                            value={settings[key] || ''}
                                            onChange={e => setSettings(s => ({ ...s, [key]: e.target.value }))}
                                            placeholder={ebayConn?.connected ? 'Click Sync Policies to load options' : placeholder}
                                            className="w-full px-4 py-3 rounded-2xl border border-slate-200 text-sm font-bold text-slate-700 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all bg-slate-50 placeholder-slate-300"
                                        />
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                        <div className="px-8 py-5 border-b border-slate-100 flex items-center gap-3">
                            <Icon name="Store" size={16} className="text-emerald-600"/>
                            <div>
                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Listing Defaults</p>
                                <h3 className="text-sm font-black text-slate-800 uppercase tracking-tight">Seller Identity</h3>

                    {/* Desktop Recon FAB — same behaviour as mobile */}
                    <ArbitrageRecon
                        proxyUrl={PROXY_API_URL}
                        ebayConditions={EBAY_CONDITIONS}
                        showToast={showToast}
                        dbRef={dbRef}
                        user={user}
                        inline={false}
                        scanPreload={reconPreload}
                        onScanRequest={() => setShowScanner(true)}
                        userSettings={settings}
                        onSendToProcessing={(item) => {
                            setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                            setActiveTab('process');
                            showToast('Recon item sent to Processing.');
                        }}
                    />
                    </>
                );
            }

            // -- MOBILE LAYOUT (unchanged) --------------------------------------------
            return (
                <>
                {showScanner && <BarcodeScanner onScan={handleScan} onClose={() => setShowScanner(false)} />}
                {scanResult && <ScanResult upc={scanResult.upc} onClose={() => setScanResult(null)} onSendToRecon={handleSendToRecon} onSendToListing={handleSendToListing} showToast={showToast} />}
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto animate-in fade-in duration-700">
                    {toast && <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl animate-in slide-in-from-top-4 ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>{toast.msg}</div>}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div className="flex items-center gap-6">
                            <h1 className="text-2xl font-black flex items-center gap-3"><Icon name="Package" className="text-blue-600" size={32} /> Scout Recon</h1>
                            <div className="flex flex-col border-l border-slate-300 pl-6">
                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1">Authenticated Operator</span>
                                <span className="text-xs font-black text-blue-600 truncate max-w-[200px]">{user.email || 'Tactical Session Active'}</span>
                            </div>
                        </div>
                        <nav className="flex items-center bg-white rounded-xl shadow-sm p-1 border border-slate-200">
                            <button onClick={() => setActiveTab('process')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'process' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>PROCESSOR</button>
                            <button onClick={() => setActiveTab('listings')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'listings' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>INVENTORY ({listings.length})</button>
                            <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'settings' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-500'}`}>SETTINGS</button>
                            <button onClick={() => setShowScanner(true)} className="p-2 text-emerald-500 hover:bg-emerald-50 rounded-xl transition-all" title="Scan Barcode"><Icon name="ScanLine" size={20}/></button>
                            <div className="w-[1px] h-6 bg-slate-200 mx-2"></div>
                            <button onClick={logout} className="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Secure Logout"><Icon name="LogOut" size={20}/></button>
                        </nav>
                    </header>
                    <main>
                        {activeTab === 'process' ? renderProcessTab() : activeTab === 'settings' ? renderSettingsTab() : renderListingsTab()}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center space-y-4">
                        <div className="flex justify-center gap-4">
                            <a href="https://github.com/smrrider/jdinjax/releases/download/v6.0.0/Scout_Recon_User_Guide_v4.pdf" target="_blank" rel="noopener noreferrer"
                                className="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-blue-600 hover:bg-slate-100 transition-all">
                                <Icon name="BookOpen" size={13}/> User Guide
                            </a>
                            <a href="https://res.cloudinary.com/daeb6pcxf/video/upload/v1773766345/Scout_Recon_mtgwlt.mp4" target="_blank" rel="noopener noreferrer"
                                className="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-purple-600 hover:bg-slate-100 transition-all">
                                <Icon name="PlayCircle" size={13}/> Video Tutorial
                            </a>
                        </div>
                        <p className="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 Scout Recon * BLACK KNIGHT ARMAMENT * v{APP_VERSION}</p>
                    </footer>
                </div>
                {/* Mobile Recon FAB */}
                <ArbitrageRecon
                    proxyUrl={PROXY_API_URL}
                    ebayConditions={EBAY_CONDITIONS}
                    showToast={showToast}
                    dbRef={dbRef}
                    user={user}
                    inline={false}
                    scanPreload={reconPreload}
                    onScanRequest={() => setShowScanner(true)}
                    userSettings={settings}
                    onSendToProcessing={(item) => {
                        setBarcodeListingData({ title: item.title, image: item.imageUrl, price: item.price ? String(item.price) : '', upc: '' });
                        setActiveTab('process');
                        showToast('Recon item sent to Processing.');
                    }}
                />
                </>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
