<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eBay Scout</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="eBay Scout">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    
    <!-- Script Imports (Tactical Baseline) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
        .auth-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); }
        .login-field { background: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .login-field:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .listing-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .listing-card:hover { transform: translateY(-2px); }
        .scout-fab { box-shadow: 0 8px 32px rgba(16, 185, 129, 0.45); }
        .scout-modal-bg { animation: fadeInBg 0.2s ease; }
        .scout-modal { animation: slideUpModal 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpModal { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .verdict-go { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-color: #6ee7b7; color: #065f46; }
        .verdict-marginal { background: linear-gradient(135deg, #fef9c3, #fde68a); border-color: #fcd34d; color: #78350f; }
        .verdict-nogo { background: linear-gradient(135deg, #fee2e2, #fecaca); border-color: #fca5a5; color: #7f1d1d; }
        .scout-history-item { transition: all 0.15s ease; }
        .scout-history-item:hover { background: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const APP_VERSION = "4.5.0"; // Feature: Arbitrage Scout Module — FAB, Intel Card, Session History

        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';
        const SIGN_API_URL     = _isLocal ? 'http://127.0.0.1:3001/api/sign-upload' : '/api/sign-upload';
        const SCRAPER_API_URL  = _isLocal ? 'http://127.0.0.1:3001/api/category-lookup' : '/api/category-lookup';

        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
        };

        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        const EBAY_CONDITIONS = [
            { id: '1000', label: 'New' }, { id: '1500', label: 'New — Other' }, { id: '1750', label: 'New — Open Box' },
            { id: '2000', label: 'Seller Refurbished' }, { id: '2500', label: 'Used — Like New' }, { id: '3000', label: 'Used — Good' },
            { id: '4000', label: 'Used — Acceptable' }, { id: '7000', label: 'For Parts / Not Working' }
        ];

        const JDINJAX_SYSTEM_PROMPT = "Role: eBay Listing Pro for Black Knight Armament. Identify the item in the photos. Title STRICT MAX 80 CHARS. Prices should end in .95. Calculate initial price assuming NEW/Excellent condition. Format response as JSON strictly.";

        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title: { type: "STRING" },
                categoryPath: { type: "STRING" },
                categoryId: { type: "STRING" },
                buyItNowPrice: { type: "NUMBER" },
                keyFeatures: { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded: { type: "ARRAY", items: { type: "STRING" } },
                flaws: { type: "STRING" },
                weightItem: { type: "STRING" },
                weightPackaging: { type: "STRING" },
                weightTotal: { type: "STRING" },
                dimensions: { type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };
        // ─── ARBITRAGE SCOUT ─────────────────────────────────────────────────────

        const SCOUT_SYSTEM_PROMPT = `You are an expert eBay arbitrage analyst and resale market specialist. 
Analyze the provided item image and condition, then return a complete arbitrage assessment as JSON.
All prices must end in .95. Be precise and realistic based on actual eBay sold listings data.
Return ONLY valid JSON — no markdown, no preamble.`;

        const SCOUT_SCHEMA = {
            type: "OBJECT",
            properties: {
                itemTitle:        { type: "STRING" },
                itemDescription:  { type: "STRING" },
                priceLow:         { type: "NUMBER" },
                priceMid:         { type: "NUMBER" },
                priceHigh:        { type: "NUMBER" },
                priceConfidence:  { type: "STRING" },
                priceBasis:       { type: "STRING" },
                sellThroughRate:  { type: "NUMBER" },
                velocityLabel:    { type: "STRING" },
                daysToSell:       { type: "NUMBER" },
                weightOz:         { type: "NUMBER" },
                packageLengthIn:  { type: "NUMBER" },
                packageWidthIn:   { type: "NUMBER" },
                packageHeightIn:  { type: "NUMBER" },
            },
            required: ["itemTitle","priceMid","sellThroughRate","velocityLabel","daysToSell","weightOz","packageLengthIn","packageWidthIn","packageHeightIn"]
        };

        // USPS Ground Advantage Zone 8 rate table (oz → cents, as of 2024 schedule)
        // Source: USPS Retail Ground Advantage Zone 8 published rates
        const getUspsZone8Rate = (weightOz, lengthIn, widthIn, heightIn) => {
            // Dimensional weight check (USPS uses 139 divisor for Retail)
            const dimWeight = (lengthIn * widthIn * heightIn) / 139;
            const billableOz = Math.max(weightOz, dimWeight * 16);
            const billableLbs = billableOz / 16;

            // Zone 8 Ground Advantage rates (2024)
            const rates = [
                { max: 4/16,   price: 5.55 },
                { max: 8/16,   price: 6.10 },
                { max: 12/16,  price: 6.65 },
                { max: 1,      price: 7.20 },
                { max: 2,      price: 8.95 },
                { max: 3,      price: 10.40 },
                { max: 4,      price: 11.85 },
                { max: 5,      price: 13.30 },
                { max: 6,      price: 14.75 },
                { max: 7,      price: 16.20 },
                { max: 8,      price: 17.65 },
                { max: 9,      price: 19.10 },
                { max: 10,     price: 20.55 },
                { max: 11,     price: 22.00 },
                { max: 12,     price: 23.45 },
                { max: 13,     price: 24.90 },
                { max: 14,     price: 26.35 },
                { max: 15,     price: 27.80 },
                { max: 16,     price: 29.25 },
                { max: 20,     price: 34.50 },
                { max: 25,     price: 40.95 },
                { max: 30,     price: 47.40 },
                { max: 40,     price: 57.50 },
                { max: 50,     price: 67.65 },
                { max: 70,     price: 82.10 },
            ];

            for (const tier of rates) {
                if (billableLbs <= tier.max) return tier.price;
            }
            return 82.10 + ((billableLbs - 70) * 0.80); // overage estimate
        };

        const calcArbitrage = (priceMid, purchasePrice, shippingCost) => {
            const ebayFVF     = priceMid * 0.1325;
            const paymentFee  = priceMid * 0.029 + 0.30;
            const packaging   = 2.00;
            const totalFees   = ebayFVF + paymentFee + packaging + shippingCost;
            const netProfit   = priceMid - purchasePrice - totalFees;
            const roi         = purchasePrice > 0 ? (netProfit / purchasePrice) * 100 : 0;
            return { ebayFVF, paymentFee, packaging, shippingCost, totalFees, netProfit, roi };
        };

        const getVerdict = (netProfit) => {
            if (netProfit >= 15)  return { label: '🟢 GO',       css: 'verdict-go',       tag: 'GO' };
            if (netProfit >= 5)   return { label: '🟡 MARGINAL', css: 'verdict-marginal', tag: 'MARGINAL' };
            return                       { label: '🔴 NO-GO',    css: 'verdict-nogo',     tag: 'NO-GO' };
        };

        const ArbitrageScout = ({ proxyUrl, ebayConditions, showToast }) => {
            const [isOpen,        setIsOpen]        = useState(false);
            const [scoutImage,    setScoutImage]     = useState(null);
            const [condition,     setCondition]      = useState('3000');
            const [purchasePrice, setPurchasePrice]  = useState('');
            const [isRunning,     setIsRunning]      = useState(false);
            const [scoutStatus,   setScoutStatus]    = useState('');
            const [result,        setResult]         = useState(null);
            const [history,       setHistory]        = useState([]); // session only, max 5
            const [activeHistory, setActiveHistory]  = useState(null);
            const [errorMsg,      setErrorMsg]       = useState(null);

            const reset = () => {
                setScoutImage(null); setCondition('3000'); setPurchasePrice('');
                setResult(null); setErrorMsg(null); setScoutStatus(''); setActiveHistory(null);
            };

            const displayResult = activeHistory !== null ? history[activeHistory] : result;

            const runScout = async () => {
                if (!scoutImage || !purchasePrice) { setErrorMsg("Upload an image and enter purchase price."); return; }
                setIsRunning(true); setErrorMsg(null); setResult(null);
                try {
                    setScoutStatus("Uploading image...");
                    const b64 = await new Promise((res, rej) => {
                        const r = new FileReader(); r.readAsDataURL(scoutImage.file);
                        r.onload = e => res(e.target.result.split(',')[1]);
                        r.onerror = () => rej(new Error("Read failed"));
                    });

                    const condLabel = ebayConditions.find(c => c.id === condition)?.label || 'Used';
                    setScoutStatus("Running intel analysis...");

                    const res = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: "gemini-2.5-flash",
                            contents: [{ role: "user", parts: [
                                { text: `Analyze this item for eBay arbitrage. Condition: ${condLabel}. Provide realistic pricing based on actual eBay sold data, sell-through rate, days to sell, and estimated package dimensions for shipping.` },
                                { inlineData: { mimeType: "image/jpeg", data: b64 } }
                            ]}],
                            systemInstruction: { parts: [{ text: SCOUT_SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json", responseSchema: SCOUT_SCHEMA }
                        })
                    });

                    const data = await res.json();
                    const raw  = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
                    const ai   = JSON.parse(raw);

                    setScoutStatus("Calculating shipping...");
                    const shipping  = getUspsZone8Rate(ai.weightOz, ai.packageLengthIn, ai.packageWidthIn, ai.packageHeightIn);
                    const purchase  = parseFloat(purchasePrice) || 0;
                    const arb       = calcArbitrage(ai.priceMid, purchase, shipping);
                    const verdict   = getVerdict(arb.netProfit);

                    const scoutResult = {
                        ...ai, condition: condLabel, purchasePrice: purchase,
                        shipping, arb, verdict,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        imageUrl: scoutImage.url
                    };

                    setResult(scoutResult);
                    setHistory(prev => [scoutResult, ...prev].slice(0, 5));
                    setActiveHistory(null);
                } catch(e) { setErrorMsg("Scout failed: " + e.message); }
                finally { setIsRunning(false); setScoutStatus(''); }
            };

            return (
                <>
                    {/* FAB */}
                    <button
                        onClick={() => { setIsOpen(true); reset(); }}
                        className="fixed bottom-8 right-8 z-40 scout-fab bg-emerald-500 hover:bg-emerald-400 text-white rounded-2xl px-5 py-4 flex items-center gap-3 font-black text-[11px] uppercase tracking-widest transition-all active:scale-95 hover:scale-105"
                    >
                        <Icon name="Crosshair" size={20} />
                        Scout
                    </button>

                    {/* Modal Backdrop */}
                    {isOpen && (
                        <div className="scout-modal-bg fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-6" onClick={(e) => { if(e.target === e.currentTarget) setIsOpen(false); }}>
                            <div className="scout-modal bg-white w-full md:max-w-2xl md:rounded-[2.5rem] rounded-t-[2.5rem] max-h-[92vh] overflow-y-auto no-scrollbar shadow-2xl">

                                {/* Header */}
                                <div className="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-slate-100 px-8 py-5 flex items-center justify-between rounded-t-[2.5rem] z-10">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-100">
                                            <Icon name="Crosshair" size={20} className="text-white" />
                                        </div>
                                        <div>
                                            <h2 className="text-base font-black uppercase tracking-tight leading-none">Arbitrage Scout</h2>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-0.5">eBay Flip Intel Engine</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsOpen(false)} className="p-2 hover:bg-slate-100 rounded-xl transition-colors">
                                        <Icon name="X" size={20} className="text-slate-400" />
                                    </button>
                                </div>

                                <div className="p-8 space-y-6">

                                    {/* Session History */}
                                    {history.length > 0 && (
                                        <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200">
                                            <p className="text-[8px] font-black uppercase text-slate-400 tracking-widest mb-3">Session History ({history.length}/5)</p>
                                            <div className="space-y-1">
                                                {history.map((h, i) => (
                                                    <button key={i} onClick={() => { setActiveHistory(i); setResult(null); }}
                                                        className={`scout-history-item w-full flex items-center gap-3 p-3 rounded-xl text-left ${activeHistory === i ? 'bg-emerald-50 border border-emerald-200' : 'border border-transparent'}`}>
                                                        <img src={h.imageUrl} className="w-10 h-10 rounded-lg object-cover border border-slate-200 shrink-0" />
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-[10px] font-black text-slate-800 truncate">{h.itemTitle}</p>
                                                            <p className="text-[9px] text-slate-400 font-bold">{h.timestamp} · ${h.arb.netProfit.toFixed(2)} net</p>
                                                        </div>
                                                        <span className={`text-[8px] font-black px-2 py-1 rounded-lg border ${h.verdict.css}`}>{h.verdict.tag}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Input Panel — hide if viewing history */}
                                    {activeHistory === null && (
                                        <>
                                            {/* Image Upload */}
                                            <div className="relative border-2 border-dashed border-slate-300 rounded-2xl overflow-hidden hover:border-emerald-400 transition-colors">
                                                <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                                    onChange={(e) => { if (e.target.files[0]) setScoutImage({ file: e.target.files[0], url: URL.createObjectURL(e.target.files[0]) }); }} />
                                                {scoutImage ? (
                                                    <div className="relative">
                                                        <img src={scoutImage.url} className="w-full h-52 object-contain bg-slate-50" />
                                                        <div className="absolute bottom-3 right-3 bg-emerald-500 text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-widest">Tap to Replace</div>
                                                    </div>
                                                ) : (
                                                    <div className="py-12 text-center">
                                                        <Icon name="Camera" size={40} className="text-slate-300 mb-3" />
                                                        <p className="text-sm font-black text-slate-400 uppercase">Load Item Photo</p>
                                                        <p className="text-[10px] text-slate-300 mt-1">Single image for item identification</p>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Condition + Price Row */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Item Condition</p>
                                                    <select value={condition} onChange={e => setCondition(e.target.value)}
                                                        className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none uppercase cursor-pointer">
                                                        {ebayConditions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                                    </select>
                                                </div>
                                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Purchase Price</p>
                                                    <div className="flex items-center gap-1">
                                                        <span className="text-slate-400 font-black text-sm">$</span>
                                                        <input type="number" step="0.01" min="0" value={purchasePrice}
                                                            onChange={e => setPurchasePrice(e.target.value)}
                                                            placeholder="0.00"
                                                            className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none placeholder-slate-300" />
                                                    </div>
                                                </div>
                                            </div>

                                            {errorMsg && (
                                                <div className="bg-red-50 border border-red-200 rounded-2xl px-5 py-3 text-xs font-bold text-red-600">{errorMsg}</div>
                                            )}

                                            {/* Run Button */}
                                            <button onClick={runScout} disabled={isRunning || !scoutImage || !purchasePrice}
                                                className={`w-full py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all active:scale-95 shadow-lg flex items-center justify-center gap-3 ${isRunning || !scoutImage || !purchasePrice ? 'bg-slate-200 text-slate-400' : 'bg-emerald-500 text-white shadow-emerald-100 hover:bg-emerald-400'}`}>
                                                {isRunning ? <><Icon name="Loader2" size={16} className="animate-spin" /> {scoutStatus || 'Running Scout...'}</> : <><Icon name="Zap" size={16} /> Run Arbitrage Intel</>}
                                            </button>
                                        </>
                                    )}

                                    {/* Back button when viewing history */}
                                    {activeHistory !== null && (
                                        <button onClick={() => setActiveHistory(null)} className="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-slate-800 transition-colors">
                                            <Icon name="ChevronLeft" size={14} /> New Scout
                                        </button>
                                    )}

                                    {/* ── INTEL CARD ─────────────────────────────── */}
                                    {displayResult && (() => {
                                        const r = displayResult;
                                        return (
                                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-400">

                                                {/* Verdict Banner */}
                                                <div className={`rounded-2xl border-2 px-6 py-5 flex items-center justify-between ${r.verdict.css}`}>
                                                    <div>
                                                        <p className="text-2xl font-black leading-none">{r.verdict.label}</p>
                                                        <p className="text-[10px] font-black uppercase tracking-widest mt-1 opacity-70">Arbitrage Verdict</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-3xl font-black leading-none">${r.arb.netProfit.toFixed(2)}</p>
                                                        <p className="text-[9px] font-black uppercase tracking-widest mt-1 opacity-70">Net Profit · {r.arb.roi.toFixed(0)}% ROI</p>
                                                    </div>
                                                </div>

                                                {/* Item ID */}
                                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-5 flex gap-4">
                                                    {r.imageUrl && <img src={r.imageUrl} className="w-20 h-20 rounded-xl object-cover border border-slate-200 shrink-0" />}
                                                    <div className="min-w-0">
                                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Item Identified</p>
                                                        <p className="text-sm font-black text-slate-900 leading-tight uppercase">{r.itemTitle}</p>
                                                        <p className="text-[10px] text-slate-500 mt-1 leading-relaxed">{r.itemDescription}</p>
                                                        <span className="text-[9px] font-black text-blue-500 bg-blue-50 border border-blue-100 px-2 py-1 rounded-lg mt-2 inline-block uppercase">{r.condition}</span>
                                                    </div>
                                                </div>

                                                {/* Price Intel */}
                                                <div className="bg-white border border-slate-200 rounded-2xl p-5">
                                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-4">eBay Market Intel — {r.priceConfidence} Confidence</p>
                                                    <div className="flex items-end gap-3 mb-3">
                                                        <div className="text-center flex-1 bg-slate-50 rounded-xl p-3 border border-slate-200">
                                                            <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Low</p>
                                                            <p className="text-base font-black text-slate-500">${Number(r.priceLow || 0).toFixed(2)}</p>
                                                        </div>
                                                        <div className="text-center flex-1 bg-blue-50 rounded-xl p-3 border-2 border-blue-200">
                                                            <p className="text-[8px] font-black text-blue-500 uppercase mb-1">Mid (Used)</p>
                                                            <p className="text-xl font-black text-blue-700">${Number(r.priceMid || 0).toFixed(2)}</p>
                                                        </div>
                                                        <div className="text-center flex-1 bg-slate-50 rounded-xl p-3 border border-slate-200">
                                                            <p className="text-[8px] font-black text-slate-400 uppercase mb-1">High</p>
                                                            <p className="text-base font-black text-slate-500">${Number(r.priceHigh || 0).toFixed(2)}</p>
                                                        </div>
                                                    </div>
                                                    <p className="text-[10px] text-slate-500 italic border-l-2 border-blue-200 pl-3 leading-relaxed">{r.priceBasis}</p>
                                                </div>

                                                {/* Sell-Through */}
                                                <div className="bg-white border border-slate-200 rounded-2xl p-5">

                        html += `<li>${line.substring(1).trim()}</li>`;

                        if (inList) { html += "</ul>"; inList = false; }
                        if (line === line.toUpperCase() && line.length > 3) {

                                    <div className="flex items-center gap-3 bg-white px-5 py-2 rounded-2xl border border-slate-200 shadow-sm">
                                        <span className="text-[9px] font-black uppercase text-slate-400">Batch Condition</span>
                                        <select value={batchCondition} onChange={(e) => setBatchCondition(e.target.value)} className="bg-transparent text-[10px] font-black uppercase text-blue-600 focus:outline-none">{EBAY_CONDITIONS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
                                    </div>
                                    <button onClick={nuclearReset} className="px-5 py-2 bg-red-50 text-red-600 rounded-xl text-[9px] font-black border border-red-100 uppercase transition-all hover:bg-red-100 flex items-center gap-2 shadow-sm"><Icon name="Zap" size={12}/> Purge</button>
                                </div>
                                <div className="bg-white border-2 border-dashed border-slate-300 rounded-[2.5rem] p-12 text-center relative group hover:border-blue-400 transition-all shadow-sm">
                                    <input type="file" multiple accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => setImages([...images, ...Array.from(e.target.files).map(file => ({ id: Math.random().toString(36), url: URL.createObjectURL(file), file }))])} />
                                    <Icon name="Upload" size={48} className="text-blue-500 mb-4" />
                                    <h3 className="text-lg font-black uppercase tracking-tight leading-none">Load Ad Assets</h3>
                                    <p className="text-slate-400 text-xs mt-3 italic max-w-xs mx-auto">{processMode === 'single' ? "Single Mode: 1 photo per unique listing." : "Bulk Mode: 4 photos per technical listing."}</p>
                                </div>
                                {images.length > 0 && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm animate-in slide-in-from-bottom-4">
                                        <div className="p-4 grid grid-cols-4 sm:grid-cols-8 gap-3 max-h-64 overflow-y-auto no-scrollbar">
                                            {images.map(img => (
                                                <div key={img.id} className="aspect-square rounded-xl overflow-hidden border border-slate-100 relative group">
                                                    <img src={img.url} className="w-full h-full object-cover" />
                                                    <button onClick={() => setImages(images.filter(i => i.id !== img.id))} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2" size={12}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 bg-slate-50 border-t"><button disabled={isProcessing} onClick={() => processImages(processMode)} className={`w-full py-5 rounded-2xl font-black text-xs uppercase shadow-lg shadow-blue-100 active:scale-95 transition-all ${isProcessing ? 'bg-slate-400' : 'bg-blue-600 text-white'}`}>{isProcessing ? status : `Generate Inventory Ads`}</button></div>
                                    </div>
                                )}
                            </section>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm gap-4">
                                    <div className="flex items-center gap-4">
                                        <p className="text-sm font-black text-slate-800 uppercase tracking-widest">{listings.length} Ready Drafts</p>
                                        <button onClick={exportEbayCSV} disabled={listings.length === 0} className="px-6 py-3 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-md hover:bg-green-700 transition-all disabled:bg-slate-200 active:scale-95"><Icon name="Download" size={14}/> Export CSV</button>
                                    </div>
                                    <button onClick={nuclearReset} className="px-6 py-3 bg-red-50 text-red-600 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 border border-red-100 shadow-sm transition-all hover:bg-red-100 active:scale-95"><Icon name="Zap" size={14}/> Emergency Reset</button>
                                </div>
                                {sortedListings.map(l => (
                                    <div key={l.id} className="bg-white rounded-[2rem] border border-slate-200 flex flex-col md:flex-row overflow-hidden shadow-sm hover:border-blue-300 transition-all animate-in fade-in duration-500 listing-card">
                                        <div className="md:w-72 h-72 md:h-auto shrink-0 bg-slate-50 border-r border-slate-100 relative group">
                                            <img src={l.images?.[0]} className="w-full h-full object-cover" />
                                            <div className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">{l.images?.length || 0} Assets</div>
                                        </div>
                                        <div className="p-8 flex-grow">
                                            <div className="flex justify-between items-start mb-4">
                                                {editingCategoryId === l.id ? (
                                                    <div className="flex flex-col gap-3 w-full mr-4 bg-blue-50/50 p-5 rounded-3xl border border-blue-200 shadow-inner">
                                                        <input className="text-xs font-bold border border-blue-200 rounded-xl px-4 py-3 bg-white" value={tempCategoryData.path} onChange={(e) => setTempCategoryData({...tempCategoryData, path: e.target.value})} placeholder="Path" />
                                                        <div className="flex gap-2">
                                                            <input className="text-sm font-black border border-blue-200 rounded-xl px-4 py-3 bg-white flex-grow" value={tempCategoryData.id} onChange={(e) => setTempCategoryData({...tempCategoryData, id: e.target.value})} placeholder="Leaf ID" />
                                                            <button onClick={async () => { await dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({ categoryId: tempCategoryData.id, categoryPath: tempCategoryData.path, categorySource: 'Manual Overide' }); setEditingCategoryId(null); showToast("Saved."); }} className="bg-blue-600 text-white px-5 rounded-xl font-black uppercase text-[10px] shadow-md transition-all active:scale-95">Save</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col gap-1 items-start">
                                                        <span className={`text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest border flex items-center gap-2 group/cat shadow-sm ${
                                                            l.categorySource === 'CSV Verified' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                                                            l.categorySource === 'AI Predicted' ? 'bg-amber-50 text-amber-600 border-amber-100' : 
                                                            'bg-red-50 text-red-600 border-red-100'
                                                        }`}>
                                                            {l.categoryPath || 'UNMAPPED - ACTION REQUIRED'}
                                                            <button onClick={() => { setEditingCategoryId(l.id); setTempCategoryData({ id: l.categoryId || '', path: l.categoryPath || '' }); }} className="opacity-0 group-hover/cat:opacity-100 hover:text-blue-800 transition-opacity"><Icon name="Edit2" size={10}/></button>
                                                        </span>
                                                        <span className={`text-[8px] font-black uppercase ml-2 ${
                                                            l.categorySource === 'AI Predicted' ? 'text-amber-400 italic' : 
                                                            l.categorySource === 'CSV Verified' ? 'text-blue-400' : 'text-red-400 animate-pulse'
                                                        }`}>
                                                            {l.categorySource === 'AI Predicted' ? 'CSV Match Failed - Using AI Suggestion' : 
                                                             l.categorySource === 'CSV Verified' ? 'Database Confirmed' : 'Action Required: Assign Category'}
                                                        </span>
                                                    </div>
                                                )}
                                                {!editingCategoryId && (
                                                    <div className="flex flex-col items-end">
                                                        <span className="text-2xl font-black text-slate-900 tracking-tighter leading-none">${Number(l.buyItNowPrice || 0).toFixed(2)}</span>
                                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">SKU: {l.sku || 'N/A'}</span>
                                                    </div>
                                                )}
                                            </div>
                                            <h3 className="text-xl font-black text-slate-900 uppercase leading-tight mb-4 tracking-tight">{l.title || "Untitled Ad"}</h3>
                                            
                                            <div className="bg-slate-50 border border-slate-200 rounded-3xl p-5 mb-6 shadow-inner">
                                                <div className="flex items-center gap-2 mb-3 border-b border-slate-200 pb-2">
                                                    <Icon name="FileText" size={14} className="text-blue-500" />
                                                    <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest">Description Intel</span>
                                                </div>
                                                <div className="whitespace-pre-wrap text-[11px] font-mono text-slate-600 h-48 overflow-y-auto no-scrollbar leading-relaxed">
                                                    {l.markdownDescription || "No technical logistics generated."}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-5 rounded-3xl border border-slate-200 mb-6 shadow-inner">
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Item Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightItem || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Pack Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightPackaging || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Total Wt</p><p className="text-xs font-bold text-slate-800 text-center">{l.weightTotal || 'N/A'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Dims</p><p className="text-xs font-bold text-slate-800 text-center">{l.dimensions || 'N/A'}</p></div>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100 shadow-sm">
                                                <span className="text-[9px] font-black text-slate-400 uppercase mb-2 block tracking-widest text-center">Listing Condition</span>
                                                <select value={l.conditionId || '1000'} onChange={e => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({conditionId: e.target.value})} className="w-full bg-transparent text-xs font-black uppercase text-blue-600 cursor-pointer text-center focus:outline-none">{EBAY_CONDITIONS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
                                            </div>
                                            {l.priceResearch && (
                                                <div className="bg-gradient-to-br from-blue-50 to-slate-50 rounded-2xl p-5 border border-blue-100 mb-6 shadow-sm">
                                                    <div className="flex items-end gap-4 mb-3">
                                                        <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">Low</span><span className="text-sm font-black text-slate-500">${Number(l.priceResearch?.low || 0).toFixed(2)}</span></div>
                                                        <div className="flex-1 text-center bg-white rounded-2xl px-4 py-3 border border-blue-200 shadow-sm"><span className="text-[8px] text-blue-500 font-black uppercase block mb-1">Recommended</span><span className="text-2xl font-black text-blue-700">${Number(l.priceResearch?.mid || 0).toFixed(2)}</span></div>
                                                        <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">High</span><span className="text-sm font-black text-slate-500">${Number(l.priceResearch?.high || 0).toFixed(2)}</span></div>
                                                        <span className="text-[8px] font-black px-2 py-1 rounded-lg uppercase bg-green-100 text-green-700 shadow-sm">{l.priceResearch?.confidence || 'N/A'}</span>
                                                    </div>
                                                    <p className="text-[10px] text-slate-600 italic leading-relaxed border-l-2 border-blue-200 pl-3">{l.priceResearch?.basis}</p>
                                                </div>
                                            )}
                                            <div className="flex items-center justify-between border-t border-slate-100 pt-6">
                                                <div className="flex gap-4">
                                                    <button onClick={() => researchPrice(l)} disabled={pricingListingId === l.id} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-50/50">{pricingListingId === l.id ? <Icon name="Loader2" className="animate-spin" size={14}/> : <Icon name="TrendingUp" size={14}/>} Price Intel</button>
                                                    <button onClick={async () => { await navigator.clipboard.writeText(l.markdownDescription || ''); showToast("Copied to Clipboard."); }} className="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase border border-slate-200 flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm active:scale-95"><Icon name="Clipboard" size={14}/> Copy Desc</button>
                                                </div>
                                                <button onClick={() => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).delete()} className="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all active:scale-90"><Icon name="Trash2" size={22}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 eBay Scout • BLACK KNIGHT ARMAMENT • v{APP_VERSION}</footer>
                </div>

                {/* Arbitrage Scout FAB + Modal */}
                <ArbitrageScout
                    proxyUrl={PROXY_API_URL}
                    ebayConditions={EBAY_CONDITIONS}
                    showToast={showToast}
                />
                </>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
