<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Script Imports (Tactical Baseline) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
        .auth-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); }
        .login-field { background: #f1f5f9; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .login-field:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .listing-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .listing-card:hover { transform: translateY(-2px); }
        .recon-fab { box-shadow: 0 8px 32px rgba(16, 185, 129, 0.45); }
        .recon-modal-bg { animation: fadeInBg 0.2s ease; }
        .recon-modal { animation: slideUpModal 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpModal { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .verdict-go { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border-color: #6ee7b7; color: #065f46; }
        .verdict-marginal { background: linear-gradient(135deg, #fef9c3, #fde68a); border-color: #fcd34d; color: #78350f; }
        .verdict-nogo { background: linear-gradient(135deg, #fee2e2, #fecaca); border-color: #fca5a5; color: #7f1d1d; }
        .recon-history-item { transition: all 0.15s ease; }
        .recon-history-item:hover { background: #f1f5f9; }
        /* iOS PWA safe-area insets — keeps content below status bar and above home indicator */
        body {
            padding-top:    env(safe-area-inset-top,    0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left:   env(safe-area-inset-left,   0px);
            padding-right:  env(safe-area-inset-right,  0px);
        }
        /* Desktop 2-panel layout */
        .desktop-layout { display: flex; height: calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)); overflow: hidden; }
        .panel-left { width: 240px; min-width: 240px; height: 100%; overflow-y: auto; border-right: 1px solid #e2e8f0; background: #ffffff; }
        .panel-center { flex: 1; height: 100%; overflow-y: auto; background: #f1f5f9; }
        /* Scanner overlay */
        .scanner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .scanner-viewport { position: relative; width: 100%; height: 420px; border-radius: 16px; overflow: hidden; }
        .scanner-viewport video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-corner { position: absolute; width: 32px; height: 32px; border-color: #10b981; border-style: solid; }
        .scanner-corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scanner-corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scanner-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .scanner-corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-line { position: absolute; left: 8px; right: 8px; height: 2px; background: linear-gradient(90deg, transparent, #10b981, transparent); animation: scanLine 2s ease-in-out infinite; }
        @keyframes scanLine { 0%,100% { top: 10%; } 50% { top: 85%; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <!-- BG removal loader lives in a real module script so the browser handles
         the dynamic import() natively — Babel (text/babel) transforms import()
         into require() which doesn't exist in the browser, causing the error. -->
    <script type="module">
        // esm.sh does a full CJS→ESM conversion of the entire dependency tree.
        // The bare jsDelivr package URL serves the CJS main entry which the
        // browser cannot import as ESM — hence "Failed to fetch dynamically
        // imported module". esm.sh resolves that.
        window._loadBgRemoval = () =>
            import('https://esm.sh/@imgly/background-removal@1.4.5');
    </script>

    <script>
    window._loadErrors = [];
    window.onerror = function(msg, src, line, col, err) {
        console.error('[App Error]', msg, src, line, col, err);
        // Only wipe the UI for fatal parse/script errors (not React render errors)
        var isCDN = src && (src.indexOf('unpkg') !== -1 || src.indexOf('cdnjs') !== -1 || src.indexOf('gstatic') !== -1 || src.indexOf('googleapis') !== -1);
        var isBabel = src && src.indexOf('babel') !== -1;
        if (!isCDN && !isBabel) {
            // Surface the error in the root div so it's visible (not a silent white screen)
            var root = document.getElementById('root');
            if (root && root.innerHTML.trim() === '') {
                root.innerHTML = '<div style="font-family:monospace;padding:20px;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px">'
                    + '<h2 style="margin:0 0 12px">App Error</h2>'
                    + '<p><b>Message:</b> ' + msg + '</p>'
                    + '<p><b>Source:</b> ' + (src||'unknown') + '</p>'
                    + '<p><b>Line:</b> ' + line + ':' + col + '</p>'
                    + '<pre style="background:#fca5a5;padding:8px;border-radius:4px;overflow:auto;white-space:pre-wrap">' + (err && err.stack ? err.stack : 'no stack') + '</pre>'
                    + '</div>';
            }
        }
        return true;
    };
    // Detect which CDN scripts fail to load
    document.addEventListener('error', function(e) {
        if (e.target && e.target.src && e.target.tagName === 'SCRIPT') {
            window._loadErrors.push(e.target.src);
            document.getElementById('root').innerHTML = '<div style="font-family:monospace;padding:20px;background:#fee2e2;color:#991b1b;border-radius:8px;margin:20px">'
                + '<h2>CDN Load Failure</h2>'
                + '<p>Failed to load: <b>' + e.target.src + '</b></p>'
                + '<p>Check your internet connection or firewall blocking unpkg.com/CDN URLs.</p>'
                + '</div>';
        }
    }, true);
    console.log('[JDINJAX] v5.6.0 loading - checking CDN...');
    </script>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const APP_VERSION = "8.0.0"; // ALA §9.5 compliance — SerpAPI decommissioned

        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';
        const SIGN_API_URL     = _isLocal ? 'http://127.0.0.1:3001/api/sign-upload' : '/api/sign-upload';
        const CATEGORY_API_URL = _isLocal ? 'http://127.0.0.1:3001/api/category-resolve' : '/api/category-resolve';
        const BARCODE_API_URL  = _isLocal ? 'http://127.0.0.1:3001/api/barcode-search' : '/api/barcode-search';

        // ── Debug auth bypass — LOCAL ONLY, never active in production ────────────
        const OWNER_EMAIL = 'admin@scout-recon.com'; // always has access — update if your email differs

        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;
        let EBAY_CONFIG       = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
            EBAY_CONFIG       = cfg.ebay || null;
        };

        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        // ── Condition sets — eBay condition IDs are category-dependent ────────────
        // ── eBay Condition Schema Engine ──────────────────────────────────────────────────
        // Two schemas only:
        //   STANDARD — used for everything (4 conditions, valid across all eBay categories)
        //   CLOTHING  — used only for Clothing/Shoes/Accessories (has New w/ Tags, Pre-owned, etc.)
        // If conditionId doesn't match the schema for a category → falls back to '1000' (New).

        // Universal 4-condition set — matches eBay's simplified condition dialog
        // valid across: Parts, Electronics, Sporting Goods, Home & Garden, Tools, etc.
        const EBAY_CONDITIONS_STANDARD = [
            { id: '1000', label: 'New' },
            { id: '1500', label: 'New other (see details)' },
            { id: '3000', label: 'Used' },
            { id: '7000', label: 'For parts or not working' }
        ];

        // Clothing, Shoes & Accessories — cat 11450 supertree only
        const EBAY_CONDITIONS_CLOTHING = [
            { id: '1000', label: 'New with Tags' },
            { id: '1500', label: 'New without Tags' },
            { id: '1750', label: 'New with Defects' },
            { id: '3000', label: 'Pre-owned' }
        ];

        // Clothing, Shoes & Accessories — eBay cat 11450 and subcategory leaves
        const CLOTHING_CATEGORY_IDS = new Set([
            '11450','11483','11484','11485','11486','11487','11488','11489',
            '15709','15724','15725','15726','15727','15728','15729','15730',
            '57988','57989','57990','63861','63862','63863','63864','155183',
            '11509','11510','11511','11512','11513','11514','11515','11516',
            '175759','175760','175761','175762','175763','175764','175765',
            '63889','93427','11631','11632','11633','11634','11635',
            '11636','11637','11638','95672','24437'
        ]);

        const EBAY_CONDITIONS = EBAY_CONDITIONS_STANDARD; // legacy alias

        // Returns Clothing schema for clothing/shoes categories, Standard for everything else
        const getConditionSet = (categoryId) => {
            if (categoryId && CLOTHING_CATEGORY_IDS.has(String(categoryId))) return EBAY_CONDITIONS_CLOTHING;
            return EBAY_CONDITIONS_STANDARD;
        };

        // If stored conditionId is valid for this category → keep it.
        // Otherwise → '1000' (New) — safe fallback valid in every eBay schema.
        const sanitizeConditionId = (conditionId, categoryId) => {
            const set = getConditionSet(categoryId);
            if (set.some(s => s.id === String(conditionId))) return String(conditionId);
            return '1000'; // universal safe fallback — exists in all eBay condition schemas
        };

        const JDINJAX_SYSTEM_PROMPT = "Role: eBay Listing Pro for Black Knight Armament. Identify the item in the photos. Title STRICT MAX 80 CHARS. Prices should end in .95. Calculate initial price assuming NEW/Excellent condition. For categoryId and categoryPath: be as specific as possible  -  use the deepest applicable eBay leaf category. For firearms accessories use categories like 73944 (Scopes, Sights & Optics), 73943 (Grips, Forends & Stocks), 73938 (Magazines), 177891 (Cleaning Equipment), 73949 (Slings & Swivels). For ammunition use category 26460 (Ammunition) and always populate ammunitionType (e.g. Centerfire, Rimfire, Shotgun Shell, Airsoft BB). For general items use the most precise leaf node. For model: populate with the specific product model name or number when the item has one (electronics, appliances, tools, optics, smart home devices, sporting goods, toys, etc. — e.g. 'Hub Mini', 'Echo Dot 5th Gen', 'Glock 17'). Leave model as an empty string for items that do not have a meaningful model identifier (clothing, shoes, fabric, generic accessories, consumables). Format response as JSON strictly.";



        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title: { type: "STRING" },
                categoryPath: { type: "STRING" },
                categoryId: { type: "STRING" },
                buyItNowPrice: { type: "NUMBER" },
                keyFeatures: { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded: { type: "ARRAY", items: { type: "STRING" } },
                flaws: { type: "STRING" },
                weightItem: { type: "STRING" },
                weightPackaging: { type: "STRING" },
                weightTotal: { type: "STRING" },
                dimensions:          { type: "STRING" },
                brand:               { type: "STRING" },
                itemType:            { type: "STRING" },
                model:               { type: "STRING" },
                markdownDescription: { type: "STRING" },
                ammunitionType:      { type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        // ── Background removal — lazy CDN ESM loader (shared, cached per session) ─
        // esm.sh performs a full CJS→ESM conversion of the entire dependency tree,
        // fixing the "require is not defined" error from jsDelivr's surface-level transform.
        // No publicPath override — the library resolves model files from its own
        // built-in CDN default (overriding it with jsDelivr caused "models/medium not found").
        let _bgRemovalLib = null;
        const getBgRemovalLib = async () => {
            if (!_bgRemovalLib) {
                // Use the module-script loader — Babel transforms import() into require()
                // which doesn't exist in the browser; the module script bypasses Babel.
                if (!window._loadBgRemoval) throw new Error('BG removal loader not initialised — reload the page.');
                _bgRemovalLib = await window._loadBgRemoval();
            }
            return _bgRemovalLib;
        };

        // ── Compress a bg-removed PNG blob → resized WebP (preserves transparency) ─
        // WebP gives ~80% smaller files vs PNG while keeping the alpha channel.
        const compressBgRemoved = (blob, maxPx = 1024) => new Promise((resolve, reject) => {
            const url = URL.createObjectURL(blob);
            const image = new Image();
            image.onload = () => {
                URL.revokeObjectURL(url);
                let w = image.width, h = image.height;
                if (w > maxPx || h > maxPx) {
                    if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                    else       { w = Math.round(w * maxPx / h); h = maxPx; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                // Do NOT fill background — preserve alpha channel
                canvas.getContext('2d').drawImage(image, 0, 0, w, h);
                canvas.toBlob(resized => {
                    const reader = new FileReader();
                    reader.onload = e => resolve({ blob: resized, b64: e.target.result.split(',')[1], mimeType: 'image/webp' });
                    reader.onerror = reject;
                    reader.readAsDataURL(resized);
                }, 'image/webp', 0.88);
            };
            image.onerror = () => reject(new Error('Failed to load bg-removed image for compression'));
            image.src = url;
        });

        // ── Shared image compression utility ─────────────────────────────────────
        const compressImage = (img, maxPx = 1024) => new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => {
                let w = image.width, h = image.height;
                if (w > maxPx || h > maxPx) {
                    if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                    else       { w = Math.round(w * maxPx / h); h = maxPx; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(image, 0, 0, w, h);
                canvas.toBlob(blob => {
                    const reader = new FileReader();
                    reader.onload = e => resolve({ blob, b64: e.target.result.split(',')[1], mimeType: 'image/jpeg' });
                    reader.readAsDataURL(blob);
                }, 'image/jpeg', 0.82);
            };
            image.onerror = () => reject(new Error('Compress failed'));
            image.src = img.url;
        });

        // ── Shared listing description builder ───────────────────────────────────
        const buildDescription = (aiData, conditionLabel, adFooter = '') => {
            const body = `DESCRIPTION & TECHNICAL SPECIFICATIONS

${aiData.title}

KEY FEATURES:
${(aiData.keyFeatures || []).map(f => `* ${f}`).join('\n')}

WHAT'S INCLUDED:
${(aiData.whatsIncluded || []).map(i => `* ${i}`).join('\n')}

CONDITION & FLAWS:
* Condition: ${conditionLabel}
* Visible Flaws: ${aiData.flaws || "None observed during technical inspection."}

SHIPPING LOGISTICS:
* Item Weight: ${aiData.weightItem || 'TBD'}
* Packaging Weight: ${aiData.weightPackaging || 'TBD'}
* Total Shipping Weight: ${aiData.weightTotal || 'TBD'}
* Dimensions: ${aiData.dimensions || 'TBD'}`;
            return adFooter && adFooter.trim()
                ? `${body}\n\n${adFooter.trim()}`
                : body;
        };

        // ── SpecPicker — searchable dropdown with custom-value fallback for mandatory eBay specs ──
        // Used in the edit-mode spec panel. Has a search field, filtered list, and a free-text
        // input at the bottom. Custom values not in eBay's allowed list trigger a warning modal.
        const SpecPicker = ({ spec, specKey, fillVal, borderCol, onSave }) => {
            const [open, setOpen]               = React.useState(false);
            const [search, setSearch]           = React.useState('');
            const [customInput, setCustomInput] = React.useState('');
            const [pendingCustom, setPendingCustom] = React.useState(null);
            const dropRef = React.useRef(null);

            React.useEffect(() => {
                if (!open) return;
                const handler = (e) => { if (dropRef.current && !dropRef.current.contains(e.target)) { setOpen(false); setSearch(''); } };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [open]);

            const filtered = (spec.values || []).filter(v => v.toLowerCase().includes(search.toLowerCase()));

            const pick = (val) => { onSave(val); setOpen(false); setSearch(''); setCustomInput(''); };

            const tryCustom = () => {
                const val = customInput.trim();
                if (!val) return;
                const inList = (spec.values || []).some(v => v.toLowerCase() === val.toLowerCase());
                if (inList) { pick(val); } else { setPendingCustom(val); }
            };

            return (
                <div className="relative" ref={dropRef}>
                    {/* Trigger */}
                    <button onClick={() => setOpen(o => !o)}
                        className={`text-[10px] font-black text-slate-700 bg-white border rounded-lg px-2 py-1 max-w-[160px] flex items-center gap-1 ${borderCol}`}>
                        <span className="truncate max-w-[130px]">{fillVal || '— select —'}</span>
                        <Icon name="ChevronDown" size={9} className="shrink-0 text-slate-400"/>
                    </button>

                    {/* Dropdown panel */}
                    {open && (
                        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-slate-200 rounded-xl shadow-2xl w-56 overflow-hidden">
                            {/* Search */}
                            <div className="p-2 border-b border-slate-100">
                                <input autoFocus type="text" placeholder="Search options…"
                                    value={search} onChange={e => setSearch(e.target.value)}
                                    className="w-full text-[10px] font-bold border border-slate-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-blue-400"/>
                            </div>
                            {/* Filtered options */}
                            <div className="max-h-44 overflow-y-auto">
                                {filtered.length > 0
                                    ? filtered.map(v => (
                                        <button key={v} onClick={() => pick(v)}
                                            className={`w-full text-left text-[10px] font-bold px-3 py-1.5 hover:bg-blue-50 hover:text-blue-700 transition-colors ${fillVal === v ? 'bg-blue-50 text-blue-700' : 'text-slate-700'}`}>
                                            {v}
                                        </button>
                                    ))
                                    : <p className="text-[9px] text-slate-400 font-black uppercase text-center py-3 px-2">No matches — use custom below</p>
                                }
                            </div>
                            {/* Custom input */}
                            <div className="border-t border-slate-100 p-2 flex gap-1">
                                <input type="text" placeholder="Enter custom value…"
                                    value={customInput} onChange={e => setCustomInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && tryCustom()}
                                    className="flex-1 text-[10px] font-bold border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:border-amber-400"/>
                                <button onClick={tryCustom}
                                    className="bg-slate-800 text-white text-[9px] font-black px-2 py-1 rounded-lg hover:bg-slate-700 transition-colors shrink-0">
                                    Use
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Warning modal — custom value not in eBay's list */}
                    {pendingCustom && (
                        <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4" onClick={() => setPendingCustom(null)}>
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-xs w-full" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start gap-3 mb-4">
                                    <div className="w-9 h-9 bg-amber-100 rounded-xl flex items-center justify-center shrink-0">
                                        <Icon name="AlertTriangle" size={18} className="text-amber-600"/>
                                    </div>
                                    <div>
                                        <p className="text-xs font-black text-slate-800 mb-1">Not in eBay's allowed list</p>
                                        <p className="text-[10px] text-slate-500 font-bold leading-relaxed">
                                            "<span className="text-slate-700 font-black">{pendingCustom}</span>" is not one of eBay's accepted values for <span className="text-slate-700 font-black">{spec.name}</span>. eBay may reject this listing at publish time.
                                        </p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { pick(pendingCustom); setPendingCustom(null); setCustomInput(''); }}
                                        className="flex-1 bg-amber-500 text-white text-[10px] font-black py-2.5 rounded-xl hover:bg-amber-600 transition-colors">
                                        Save Anyway
                                    </button>
                                    <button onClick={() => setPendingCustom(null)}
                                        className="flex-1 bg-slate-100 text-slate-700 text-[10px] font-black py-2.5 rounded-xl hover:bg-slate-200 transition-colors">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };
        // --- BARCODE SCANNER -----------------------------------------------------

        const BarcodeScanner = ({ onScan, onClose }) => {
            const videoRef   = useRef(null);
            const readerRef  = useRef(null);
            const inputRef   = useRef(null);
            const isMobile   = window.innerWidth < 768;
            const [mode, setMode]     = useState(isMobile ? 'camera' : 'input');   // 'input' | 'camera'
            const [manualVal, setManualVal] = useState('');
            const [camError, setCamError]   = useState(null);
            const [camActive, setCamActive] = useState(false);

            // Auto-focus the text input when modal opens
            useEffect(() => {
                if (mode === 'input') {
                    setTimeout(() => inputRef.current && inputRef.current.focus(), 120);
                }
            }, [mode]);

            // Start camera when switching to camera mode
            useEffect(() => {
                if (mode !== 'camera') return;
                if (!window.ZXing) { setCamError('Scanner library not loaded.'); return; }
                const codeReader = new window.ZXing.BrowserMultiFormatReader();
                readerRef.current = codeReader;
                setCamActive(true);
                codeReader.decodeFromVideoDevice(null, videoRef.current, (result, err) => {
                    if (result) { codeReader.reset(); onScan(result.getText()); }
                    if (err && !(err instanceof window.ZXing.NotFoundException)) console.warn('[Scanner]', err);
                }).catch(() => setCamError('Camera access denied. Check browser permissions.'));
                return () => { try { codeReader.reset(); } catch(e){} };
            }, [mode]);

            const stopCamera = () => {
                if (readerRef.current) try { readerRef.current.reset(); } catch(e){}
                setCamActive(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && manualVal.trim().length >= 4) {
                    onScan(manualVal.trim());
                }
            };

            const handleSubmit = () => {
                if (manualVal.trim().length >= 4) onScan(manualVal.trim());
            };

            return (
                <div className="scanner-overlay" onClick={(e) => { if (e.target === e.currentTarget) { stopCamera(); onClose(); }}}>
                    <div className="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl mx-4">

                        {/* Header */}
                        <div className="px-6 py-5 border-b border-slate-700 flex items-center justify-between">
                            <div>
                                <p className="text-white font-black text-sm uppercase tracking-widest">Barcode Lookup</p>
                                <p className="text-slate-400 text-[10px] mt-0.5 uppercase tracking-widest">{isMobile ? 'Camera' : 'Gun · Keyboard · Camera'}</p>
                            </div>
                            <button onClick={() => { stopCamera(); onClose(); }} className="text-slate-500 hover:text-white transition-colors p-1">
                                <Icon name="X" size={18}/>
                            </button>
                        </div>

                        {/* Mode toggle — desktop only; mobile is camera-only */}
                        {!isMobile && (
                        <div className="px-6 pt-5 flex gap-2">
                            <button onClick={() => { stopCamera(); setMode('input'); }}
                                className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 " + (mode === 'input' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-800 text-slate-400 hover:bg-slate-700")}>
                                <Icon name="Keyboard" size={13}/> Type / Gun
                            </button>
                            <button onClick={() => setMode('camera')}
                                className={"flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 " + (mode === 'camera' ? "bg-emerald-500 text-white shadow-md" : "bg-slate-800 text-slate-400 hover:bg-slate-700")}>
                                <Icon name="Camera" size={13}/> Camera
                            </button>
                        </div>
                        )}

                        {/* Input mode */}
                        {mode === 'input' && (
                            <div className="px-6 py-5 space-y-4">
                                <div className="bg-slate-800 border border-slate-600 rounded-2xl px-4 py-3 flex items-center gap-3 focus-within:border-emerald-500 transition-colors">
                                    <Icon name="ScanLine" size={18} className="text-emerald-400 shrink-0"/>
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        value={manualVal}
                                        onChange={e => setManualVal(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="Scan or type barcode..."
                                        className="flex-1 bg-transparent text-white font-black text-sm placeholder-slate-500 focus:outline-none tracking-widest"
                                        autoComplete="off"
                                        autoCorrect="off"
                                        spellCheck={false}
                                    />
                                    {manualVal.length > 0 && (
                                        <button onClick={() => setManualVal('')} className="text-slate-500 hover:text-white transition-colors">
                                            <Icon name="X" size={14}/>
                                        </button>
                                    )}
                                </div>
                                <p className="text-slate-500 text-[10px] uppercase tracking-widest text-center">
                                    Scanning gun fires on trigger · Keyboard press Enter
                                </p>
                                <button onClick={handleSubmit} disabled={manualVal.trim().length < 4}
                                    className={"w-full py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-2 " + (manualVal.trim().length >= 4 ? "bg-emerald-500 text-white hover:bg-emerald-400 shadow-lg shadow-emerald-900/50" : "bg-slate-800 text-slate-600 cursor-not-allowed")}>
                                    <Icon name="Search" size={14}/> Search
                                </button>
                            </div>
                        )}

                        {/* Camera mode */}
                        {mode === 'camera' && (
                            <div className="px-6 py-5">
                                {camError ? (
                                    <div className="bg-red-900/50 border border-red-700 rounded-2xl px-5 py-4 text-center">
                                        <p className="text-red-300 text-sm font-bold">{camError}</p>
                                        <button onClick={() => { setCamError(null); setMode('input'); }} className="mt-3 px-5 py-2 bg-red-500 text-white rounded-xl text-xs font-black uppercase">Back to Input</button>
                                    </div>
                                ) : (
                                    <div className="scanner-viewport mx-auto">
                                        <video ref={videoRef} className="w-full h-full object-cover" />
                                        <div className="scanner-corner tl" /><div className="scanner-corner tr" />
                                        <div className="scanner-corner bl" /><div className="scanner-corner br" />
                                        <div className="scan-line" />
                                    </div>
                                )}
                                {!camError && (
                                    <p className="text-slate-500 text-[10px] uppercase tracking-widest text-center mt-4">
                                        UPC · EAN · QR · Code128  -  auto-detects
                                    </p>
                                )}
                            </div>
                        )}

                        <div className="px-6 pb-6">
                            <button onClick={() => { stopCamera(); onClose(); }} className="w-full py-3 bg-slate-800 text-slate-400 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition-all">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ScanResult = ({ upc, onClose, onSendToRecon, onSendToListing, showToast }) => {
            // engine state removed — UPCitemdb is engine-agnostic (ALA §9.5 — 21 MAR 2026)
            const [loading, setLoading]   = useState(true);
            const [results, setResults]   = useState([]);
            const [topTitle, setTopTitle] = useState('');
            const [selected, setSelected] = useState(0);

            useEffect(() => { doSearch(); }, []);

            const doSearch = async () => {
                setLoading(true);
                try {
                    const res = await fetch(BARCODE_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ upc })
                    });
                    const d = await res.json();
                    setResults(d.results || []);
                    setTopTitle(d.results?.[0]?.title || '');

            return (
                <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onClick={(e) => { if(e.target===e.currentTarget) onClose(); }}>
                    <div className="bg-white rounded-3xl w-[90vw] max-w-sm shadow-2xl overflow-hidden">
                        {/* Header */}
                        <div className="bg-slate-900 px-6 py-4 flex items-center justify-between">
                            <div>
                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Barcode Detected</p>
                                <p className="text-emerald-400 font-black text-sm tracking-wider">{upc}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-white transition-colors"><Icon name="X" size={18}/></button>
                        </div>

                        {/* Engine toggle removed — UPCitemdb is engine-agnostic (ALA §9.5 — 21 MAR 2026) */}

                        {/* Results */}
                        <div className="px-6 py-4 max-h-64 overflow-y-auto no-scrollbar">
                            {loading ? (
                                <div className="flex items-center justify-center py-8 gap-3">
                                    <Icon name="Loader2" size={20} className="text-blue-500 animate-spin" />
                                    <span className="text-[11px] font-black text-slate-400 uppercase">Looking up barcode...</span>
                                </div>
                            ) : results.length === 0 ? (
                                <div className="text-center py-8">
                                    <p className="text-[11px] font-black text-slate-400 uppercase">No results found</p>
                                    <p className="text-[10px] text-slate-300 mt-1">Try the other marketplace</p>
                                </div>
                            ) : results.map((r, i) => (
                                <div key={i} onClick={() => setSelected(i)}
                                    className={"flex gap-3 p-3 rounded-2xl cursor-pointer transition-all mb-2 border " + (selected===i ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-transparent hover:border-slate-200')}>
                                    {r.image && <img src={r.image} className="w-12 h-12 rounded-xl object-cover border border-slate-200 shrink-0" />}
                                    <div className="min-w-0 flex-1">
                                        <p className="text-[10px] font-black text-slate-800 leading-tight line-clamp-2">{r.title}</p>
                                        {/* price display removed — UPCitemdb price fields not passed through (ALA §9.5) */}
                                        {r.brand && <p className="text-[9px] text-slate-400 uppercase mt-0.5">{r.brand}</p>}
                                    </div>
                                    {selected===i && <div className="w-4 h-4 bg-blue-600 rounded-full shrink-0 mt-1 flex items-center justify-center"><Icon name="Check" size={10} className="text-white"/></div>}
                                </div>
                            ))}
                        </div>

                        {/* Destination buttons */}
                        {!loading && results.length > 0 && (
                            <div className="px-6 pb-6 grid grid-cols-2 gap-3 border-t border-slate-100 pt-4">
                                <button onClick={() => onSendToRecon(selectedItem, upc)}
                                    className="py-4 bg-emerald-500 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-100 hover:bg-emerald-400 transition-all active:scale-95 flex flex-col items-center gap-1">
                                    <Icon name="Zap" size={16}/>
                                    Send to Recon
                                </button>
                                <button onClick={() => onSendToListing(selectedItem, upc)}
                                    className="py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-100 hover:bg-blue-500 transition-all active:scale-95 flex flex-col items-center gap-1">
                                    <Icon name="FileText" size={16}/>
                                    Send to Listing
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- ARBITRAGE SCOUT -----------------------------------------------------

        const SCOUT_SYSTEM_PROMPT = `You are an expert resale market analyst and pricing specialist.
Analyze the provided item image and condition, then return a complete market assessment as JSON.
All prices must end in .95. Be precise and realistic based on your independent market knowledge.

CRITICAL RULES — pricing fields (priceLow, priceMid, priceHigh, priceBasis):
- Do NOT reference eBay, eBay listings, eBay sold data, or eBay marketplace prices
- Do NOT reference Amazon, Walmart, or any specific marketplace pricing data
- Base all pricing on your independent training knowledge of general retail and resale markets
- priceBasis must describe your reasoning without citing any specific marketplace or platform

CRITICAL RULES — velocity fields (sellThroughRate, daysToSell, velocityLabel):
- sellThroughRate must be estimated from your independent knowledge of general resale
  market velocity for this item category — NOT derived from eBay listing or sold counts
- daysToSell must be a general market estimate based on item type and condition —
  NOT computed from eBay active or completed listing data
- velocityLabel must reflect general market demand (e.g. HIGH, MEDIUM, LOW, SLOW) based
  on your independent assessment of the item category
- Do NOT derive any velocity metric from eBay marketplace data of any kind

Return ONLY valid JSON — no markdown, no preamble.`;

        const SCOUT_SCHEMA = {
            type: "OBJECT",
            properties: {
                itemTitle:        { type: "STRING" },
                itemDescription:  { type: "STRING" },
                priceLow:         { type: "NUMBER" },
                priceMid:         { type: "NUMBER" },
                priceHigh:        { type: "NUMBER" },
                priceConfidence:  { type: "STRING" },
                priceBasis:       { type: "STRING" },
                sellThroughRate:  { type: "NUMBER" },
                velocityLabel:    { type: "STRING" },
                daysToSell:       { type: "NUMBER" },
                weightOz:         { type: "NUMBER" },
                packageLengthIn:  { type: "NUMBER" },
                packageWidthIn:   { type: "NUMBER" },
                packageHeightIn:  { type: "NUMBER" },
            },
            required: ["itemTitle","priceMid","sellThroughRate","velocityLabel","daysToSell","weightOz","packageLengthIn","packageWidthIn","packageHeightIn"]
        };

        // USPS Ground Advantage Zone 8 rate table (oz -> cents, as of 2024 schedule)
        // Source: USPS Retail Ground Advantage Zone 8 published rates
        const getUspsZone8Rate = (weightOz, lengthIn, widthIn, heightIn) => {
            // Dimensional weight check (USPS uses 139 divisor for Retail)
            const dimWeight = (lengthIn * widthIn * heightIn) / 139;
            const billableOz = Math.max(weightOz, dimWeight * 16);
            const billableLbs = billableOz / 16;

            // Zone 8 Ground Advantage rates (2024)
            const rates = [
                { max: 4/16,   price: 5.55 },
                { max: 8/16,   price: 6.10 },
                { max: 12/16,  price: 6.65 },
                { max: 1,      price: 7.20 },
                { max: 2,      price: 8.95 },
                { max: 3,      price: 10.40 },
                { max: 4,      price: 11.85 },
                { max: 5,      price: 13.30 },
                { max: 6,      price: 14.75 },
                { max: 7,      price: 16.20 },
                { max: 8,      price: 17.65 },
                { max: 9,      price: 19.10 },
                { max: 10,     price: 20.55 },
                { max: 11,     price: 22.00 },
                { max: 12,     price: 23.45 },
                { max: 13,     price: 24.90 },
                { max: 14,     price: 26.35 },
                { max: 15,     price: 27.80 },
                { max: 16,     price: 29.25 },
                { max: 20,     price: 34.50 },
                { max: 25,     price: 40.95 },
                { max: 30,     price: 47.40 },
                { max: 40,     price: 57.50 },
                { max: 50,     price: 67.65 },
                { max: 70,     price: 82.10 },
            ];

            for (const tier of rates) {
                if (billableLbs <= tier.max) return tier.price;
            }
            return 82.10 + ((billableLbs - 70) * 0.80); // overage estimate
        };

        // shippingMode: 'flat' | 'free' | 'pickup'
        const calcArbitrage = (priceMid, purchasePrice, uspsEstimate, shippingMode, flatFee, feeOverrides = {}) => {
            const packaging = 2.00;
            if (shippingMode === 'pickup') {
                const netProfit = priceMid - purchasePrice - packaging;
                const roi = purchasePrice > 0 ? (netProfit / purchasePrice) * 100 : 0;
                return { ebayFVF: 0, paymentFee: 0, packaging, uspsEstimate: 0, flatFeeCollected: 0, netShippingCost: 0, totalFees: packaging, netProfit, roi };
            }
            const ebayFVF          = priceMid * ((parseFloat(feeOverrides.ebayFeePercent) || 13.25) / 100);
            const paymentFee       = priceMid * ((parseFloat(feeOverrides.paymentFeePercent) || 2.9) / 100) + (parseFloat(feeOverrides.paymentFeeFlat) || 0.30);
            const flatFeeCollected = shippingMode === 'flat' ? (parseFloat(flatFee) || 0) : 0;
            const netShippingCost  = uspsEstimate - flatFeeCollected;
            const totalFees        = ebayFVF + paymentFee + packaging + netShippingCost;
            const netProfit        = priceMid - purchasePrice - totalFees;
            const roi              = purchasePrice > 0 ? (netProfit / purchasePrice) * 100 : 0;
            return { ebayFVF, paymentFee, packaging, uspsEstimate, flatFeeCollected, netShippingCost, totalFees, netProfit, roi };
        };

        const getVerdict = (netProfit) => {
            if (netProfit >= 15)  return { label: 'GO',       css: 'verdict-go',       tag: 'GO' };
            if (netProfit >= 5)   return { label: 'MARGINAL', css: 'verdict-marginal', tag: 'MARGINAL' };
            return                       { label: 'NO-GO',    css: 'verdict-nogo',     tag: 'NO-GO' };
        };

        const calcListingProfit = (salePrice, purchasePrice, userSettings) => {
            const price = parseFloat(salePrice) || 0;
            const cost  = parseFloat(purchasePrice) || 0;
            if (price === 0) return null;
            const ebayFee    = price * ((parseFloat(userSettings.ebayFeePercent) || 13.25) / 100);
            const paymentFee = price * ((parseFloat(userSettings.paymentFeePercent) || 2.9) / 100) + (parseFloat(userSettings.paymentFeeFlat) || 0.30);
            const shipping   = parseFloat(userSettings.shippingCost) || 0;
            const totalFees  = ebayFee + paymentFee + shipping;
            const netProfit  = price - cost - totalFees;
            const margin     = price > 0 ? (netProfit / price) * 100 : 0;
            return { ebayFee, paymentFee, shipping, totalFees, netProfit, margin };
        };

        // ── Error Boundary — catches render crashes in listing cards, prevents full wipe ──
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
                            <p className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-2">Render Error</p>
                            <p className="text-xs text-red-500 mb-4">{this.state.error?.message || 'Unknown error'}</p>
                            <button onClick={() => this.setState({ hasError: false, error: null })}
                                className="px-4 py-2 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase hover:bg-red-400 transition-all">
                                Retry
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ── ReconScanResults — shared between inline and modal Recon modes ────────
        // Previously duplicated ~80 lines of JSX. Single source of truth.
        // Engine toggle removed from ReconScanResultsPanel — UPCitemdb is engine-agnostic (ALA §9.5 — 21 MAR 2026)
        const ReconScanResultsPanel = ({ reconScanResults, reconManualTitle, setReconManualTitle, setBarcodePreload, setReconScanResults, setResult, setActiveHistory, setShowReconScanner, setReconImage }) => {
            if (!reconScanResults) return null;
            const { loading, items, noResults, upc } = reconScanResults;
            return (
                <div className="rounded-2xl border-2 border-slate-200 overflow-hidden">
                    {loading ? (
                        <div className="py-8 text-center">
                            <Icon name="Loader2" size={24} className="animate-spin text-emerald-500 mx-auto mb-2"/>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Looking up barcode...</p>
                        </div>
                    ) : noResults ? (
                        <div className="p-4 space-y-3">
                            <p className="text-slate-500 text-xs font-bold text-center">No results — try the other marketplace or enter manually</p>
                            <input type="text" value={reconManualTitle} onChange={e => setReconManualTitle(e.target.value)} placeholder="Enter item title manually..." className="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold focus:outline-none focus:border-emerald-400"/>
                            <div className="flex gap-2">
                                <button onClick={() => { if(reconManualTitle.trim()) { setBarcodePreload({ title: reconManualTitle.trim() }); setReconScanResults(null); setResult(null); setActiveHistory(null); }}} className="flex-1 py-2 bg-emerald-500 text-white rounded-xl text-[10px] font-black uppercase">Use Title</button>
                                <button onClick={() => { setReconScanResults(null); setShowReconScanner(true); }} className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-black uppercase">Scan Again</button>
                            </div>
                        </div>
                    ) : (
                        <div className="max-h-60 overflow-y-auto no-scrollbar">
                            {(items||[]).map((item, i) => (
                                <button key={item.url || i} onClick={() => { setBarcodePreload(item); if (item.image && setReconImage) setReconImage({ file: null, url: item.image }); setReconScanResults(null); setResult(null); setActiveHistory(null); }}
                                    className="w-full flex items-center gap-3 px-4 py-3 hover:bg-emerald-50 border-b border-slate-100 last:border-0 transition-colors text-left active:scale-[0.98]">
                                    {item.image && <img src={item.image} className="w-10 h-10 rounded-lg object-cover border border-slate-200 shrink-0" onError={(e) => e.target.style.display='none'}/>}
                                    <div className="flex-1 min-w-0">
                                        <p className="text-xs font-bold text-slate-800 leading-snug line-clamp-2">{item.title}</p>
                                        {item.brand && <p className="text-[10px] text-slate-400 font-black mt-0.5">{item.brand}</p>}
                                    </div>
                                    <Icon name="ChevronRight" size={14} className="text-slate-300 shrink-0"/>
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ProfitScout = ({ proxyUrl, ebayConditions, showToast, dbRef, user, inline = false, scanPreload = null, onScanRequest, onSendToProcessing, onSaveTarget, userSettings = {} }) => {
            const [isOpen,        setIsOpen]        = useState(false);
            const [reconImage,    setReconImage]     = useState(null);
            const [condition,     setCondition]      = useState('1000');
            const [purchasePrice, setPurchasePrice]  = useState(() => localStorage.getItem('ps_purchase_price') || '');
            const [isRunning,     setIsRunning]      = useState(false);
            const [reconStatus,   setReconStatus]    = useState('');
            const [result,        setResult]         = useState(null);
            const [history,       setHistory]        = useState([]);
            const [activeHistory, setActiveHistory]  = useState(null);
            const [confirmPurge,  setConfirmPurge]   = useState(false);
            const [shippingMode,    setShippingMode]   = useState('flat');
            const [flatShippingFee, setFlatShippingFee] = useState('6.95');
            const [barcodePreload,  setBarcodePreload]  = useState(null);
            const [errorMsg,      setErrorMsg]       = useState(null);
            // arLivePrices / arPriceLoading removed — ALA §9.5 compliance — 21 MAR 2026
            const [reconScanResults, setReconScanResults] = useState(null);
            const [reconManualTitle, setReconManualTitle] = useState('');
            const [showReconScanner, setShowReconScanner] = useState(false);
            // reconDefaultEngine removed — engine toggle decommissioned (ALA §9.5 — 21 MAR 2026)
            const [arMode, setArMode] = useState(() => localStorage.getItem('ps_mode') || 'fo');

            // Load Recon history from Firestore on mount
            useEffect(() => {
                if (!user || !dbRef || !dbRef.current) return;
                const path = `artifacts/jdinjax-console/users/${user.uid}/reconHistory`;
                const unsubscribe = dbRef.current.collection(path)
                    .orderBy('savedAt', 'desc').limit(20)
                    .onSnapshot(snap => {
                        setHistory(snap.docs.map(doc => ({ _docId: doc.id, ...doc.data() })));
                    });
                return () => unsubscribe();
            }, [user, dbRef]);

            // Persist purchase price and AR mode across sessions
            useEffect(() => {
                if (purchasePrice) localStorage.setItem('ps_purchase_price', purchasePrice);
                else localStorage.removeItem('ps_purchase_price');
            }, [purchasePrice]);
            useEffect(() => { localStorage.setItem('ps_mode', arMode); }, [arMode]);

            // Handle barcode preload from scan
            useEffect(() => {
                if (!scanPreload) return;
                setBarcodePreload(scanPreload);
                setIsOpen(true);
                // Auto-fill purchase price from market price if available
                if (scanPreload.price) {
                    const numeric = parseFloat(scanPreload.price.replace(/[^0-9.]/g, ''));
                    if (numeric > 0) setPurchasePrice(String(numeric.toFixed(2)));
                }
            }, [scanPreload]);

            // ── Recon inline camera helpers ──────────────────────────────────────────


            const handleReconScan = async (upc) => {
                setShowReconScanner(false);
                setReconScanResults({ loading: true, items: [], noResults: false });
                const BARCODE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? 'http://127.0.0.1:3001/api/barcode-search' : '/api/barcode-search';
                try {
                    const res = await fetch(BARCODE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ upc }) });
                    const data = await res.json();
                    const items = data.results || [];
                    setReconScanResults({ loading: false, items, noResults: items.length === 0, upc });
                } catch(e) {
                    setReconScanResults({ loading: false, items: [], noResults: true, upc });
                }
            };

            // reconSearchEngine removed — engine toggle decommissioned (ALA §9.5 — 21 MAR 2026)

            const reset = () => {
                if (reconImage && reconImage.url && reconImage.url.startsWith('blob:')) {
                    URL.revokeObjectURL(reconImage.url);
                }
                setReconImage(null); setCondition('1000'); setPurchasePrice(localStorage.getItem('ps_purchase_price') || '');
                setShippingMode('flat'); setFlatShippingFee('6.95');
                setResult(null); setErrorMsg(null); setReconStatus(''); setActiveHistory(null);
                setReconScanResults(null); setReconManualTitle('');
            };

            const purgeHistory = () => {
                setConfirmPurge(false);
                if (!user || !dbRef || !dbRef.current) {
                    showToast('Not connected — try again.');
                    return;
                }
                const errMsg = (e) => {
                    if (!e) return 'Unknown error';
                    if (typeof e === 'string') return e;
                    return e.message || e.code || e.toString() || 'Unknown error';
                };
                const path = `artifacts/jdinjax-console/users/${user.uid}/reconHistory`;
                dbRef.current.collection(path).get()
                    .then(snap => {
                        if (!snap || !snap.docs || snap.docs.length === 0) {
                            setHistory([]);
                            showToast('History already empty.');
                            return;
                        }
                        const batch = dbRef.current.batch();
                        snap.docs.forEach(d => batch.delete(d.ref));
                        return batch.commit();
                    })
                    .then(() => {
                        setHistory([]);
                        setActiveHistory(null);
                        setResult(null);
                        setReconImage(null);
                        setBarcodePreload(null);
                        setPurchasePrice('');
                        setReconScanResults(null);
                        setErrorMsg(null);
                        showToast('Recon history cleared.');
                    })
                    .catch(e => {
                        showToast('Purge failed: ' + errMsg(e));
                    });
            };

            const handleSaveTarget = async () => {
                const r = displayResult;
                if (!r || !user || !dbRef || !dbRef.current) return;
                const target = {
                    title: r.itemTitle,
                    imageUrl: r.imageUrl || null,
                    marketPrice: (r.priceMid || 0).toFixed(2),
                    sellThroughRate: r.sellThroughRate || 0,
                    savedAt: Date.now(),
                };
                try {
                    const path = `artifacts/jdinjax-console/users/${user.uid}/targets`;
                    await dbRef.current.collection(path).add(target);
                    onSaveTarget && onSaveTarget(target);
                    // Reset to ready state (price stays)
                    setResult(null); setReconImage(null); setBarcodePreload(null);
                } catch(e) { showToast('Save failed: ' + e.message); }
            };

            const displayResult = activeHistory !== null ? history[activeHistory] : result;

            const runRecon = async () => {
                const hasBarcode = !!barcodePreload;
                if (!reconImage && !hasBarcode) { setErrorMsg("Upload an image or scan a barcode first."); return; }
                setIsRunning(true); setErrorMsg(null); setResult(null);
                try {
                    // Skip compression if no image or image is URL-only (from barcode scan selection)
                    let reconBlob = null, b64 = null, reconMimeType = null;
                    if (reconImage && reconImage.file) {
                        setReconStatus("Compressing image...");
                        const compressed = await compressImage(reconImage);
                        reconBlob = compressed.blob;
                        b64 = compressed.b64;
                        reconMimeType = compressed.mimeType;
                    } // end if(reconImage.file)
                    const condLabel = ebayConditions.find(c => c.id === condition)?.label || 'Used';

                    // Cloudinary upload  -  skip if no image (barcode text-only mode)
                    const cloudinaryUpload = (async () => {
                        if (!reconBlob) return barcodePreload?.image || null;
                        try {
                            const timestamp = Math.round(Date.now() / 1000);
                            const signRes = await fetch(SIGN_API_URL, {
                                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await user.getIdToken()}` },
                                body: JSON.stringify({ userId: user.uid, timestamp })
                            });
                            const { signature, folder } = await signRes.json();
                            const fd = new FormData();
                            fd.append("file", reconBlob);
                            fd.append("api_key", CLOUDINARY_CONFIG.apiKey);
                            fd.append("timestamp", timestamp);
                            fd.append("signature", signature);
                            fd.append("folder", folder);
                            const upRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const upData = await upRes.json();
                            return upData.secure_url || reconImage.url;
                        } catch(e) { console.warn('[Recon] Image upload failed:', e.message); return reconImage.url; }
                    })();

                    setReconStatus("Running intel analysis...");

                    // Build Gemini parts  -  image if available, barcode title if not
                    const geminiParts = [];
                    if (hasBarcode && barcodePreload.title) {
                        geminiParts.push({ text: `Item: ${barcodePreload.title}${barcodePreload.price ? '. Reference price: ' + barcodePreload.price : ''}. UPC: ${barcodePreload.upc || ''}. Condition: ${condLabel}. Using your independent market knowledge, provide realistic pricing, sell-through rate estimate, days to sell estimate, and estimated package dimensions.` });
                    } else {
                        geminiParts.push({ text: `Analyze this item for resale pricing. Condition: ${condLabel}. Using your independent market knowledge (not eBay sold data), provide realistic pricing, sell-through rate estimate, days to sell estimate, and estimated package dimensions for shipping.` });
                    }
                    if (b64) geminiParts.push({ inlineData: { mimeType: reconMimeType, data: b64 } });

                    // Gemini + Cloudinary race in parallel  -  net time = max(gemini, upload) not sum
                    const geminiRes = fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: "gemini-2.5-flash",
                            contents: [{ role: "user", parts: geminiParts }],
                            systemInstruction: { parts: [{ text: SCOUT_SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json", responseSchema: SCOUT_SCHEMA }
                        })
                    });

                    const [geminiResponse, persistentImageUrl] = await Promise.all([geminiRes.then(r => r.json()), cloudinaryUpload]);
                    const raw  = geminiResponse.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
                    const ai   = JSON.parse(raw);

                    setReconStatus("Calculating shipping...");
                    const uspsEstimate = getUspsZone8Rate(ai.weightOz, ai.packageLengthIn, ai.packageWidthIn, ai.packageHeightIn);
                    const purchase     = parseFloat(purchasePrice) || 0;
                    const flatFee      = parseFloat(flatShippingFee) || 0;
                    const arb          = calcArbitrage(ai.priceMid, purchase, uspsEstimate, shippingMode, flatFee, userSettings);
                    const shipping     = uspsEstimate;
                    const verdict   = getVerdict(arb.netProfit);

                    const reconResult = {
                        ...ai, condition: condLabel, purchasePrice: purchase,
                        shipping, arb, verdict, shippingMode,
                        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        imageUrl: persistentImageUrl
                    };

                    setResult(reconResult);
                    setActiveHistory(null);
                    setBarcodePreload(null);

                    // eBay live price research removed — ALA §9.5 compliance — 21 MAR 2026

                    // Persist to Firestore, enforce 20-result cap
                    if (user && dbRef && dbRef.current) {
                        try {
                            const path = `artifacts/jdinjax-console/users/${user.uid}/reconHistory`;
                            const colRef = dbRef.current.collection(path);
                            await colRef.add({ ...reconResult, savedAt: Date.now() });
                            // Prune to 20  -  delete oldest beyond cap
                            const all = await colRef.orderBy('savedAt', 'desc').limit(21).get();
                            if (all.docs.length > 20) {
                                const batch = dbRef.current.batch();
                                all.docs.slice(20).forEach(d => batch.delete(d.ref));
                                await batch.commit();
                            }
                        } catch(saveErr) { console.warn('Recon save failed:', saveErr.message); }
                    }
                } catch(e) { setErrorMsg("Recon failed: " + e.message); }
                finally { setIsRunning(false); setReconStatus(''); }
            };

            // activeResult useMemo removed — ALA §9.5 compliance — 21 MAR 2026
            // All result display now uses displayResult directly.

            // -- Inline mode: desktop right panel -------------------------------------
            if (inline) {
                const renderCostStack = (r) => {
                    const mode = r.shippingMode || 'flat';
                    const usps = r.arb.uspsEstimate || r.shipping || 0;
                    const rows = [
                        { label: 'Sale Price', val: r.priceMid, pos: true },
                        { label: 'Purchase Cost', val: -r.purchasePrice },
                    ];
                    if (mode !== 'pickup') {
                        rows.push({ label: 'eBay FVF (13.25%)', val: -r.arb.ebayFVF });
                        rows.push({ label: 'Payment (2.9%+$0.30)', val: -r.arb.paymentFee });
                    }
                    rows.push({ label: 'Packaging', val: -r.arb.packaging });
                    if (mode === 'free') {
                        rows.push({ label: 'USPS Zone 8', val: -usps });
                    } else if (mode === 'flat') {
                        rows.push({ label: 'USPS Zone 8', val: -usps });
                        if ((r.arb.flatFeeCollected || 0) > 0) rows.push({ label: 'Flat Fee Collected', val: r.arb.flatFeeCollected, pos: true });
                    }
                    return rows.map((row, i) => (
                        <div key={i} className={"flex justify-between items-center py-1 " + (i < rows.length - 1 ? "border-b border-slate-50" : "")}>
                            <span className="text-[9px] font-bold text-slate-600">{row.label}</span>
                            <span className={"text-[10px] font-black " + (row.pos ? "text-emerald-600" : "text-red-500")}>{row.pos ? "+" : "-"}${Math.abs(row.val).toFixed(2)}</span>
                        </div>
                    ));
                };

                return (
                    <>
                    <div className="flex flex-col h-full">
                        <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between shrink-0 bg-white">
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full"></div>
                                <p className="text-[10px] font-black text-slate-700 uppercase tracking-widest">Profit Scout</p>
                            </div>
                            <div className="flex items-center gap-2">
                                {onScanRequest && (
                                    <button onClick={onScanRequest} title="Scan Barcode"
                                        className="p-2 bg-emerald-50 text-emerald-600 rounded-xl hover:bg-emerald-100 transition-all active:scale-95">
                                        <Icon name="ScanLine" size={16}/>
                                    </button>
