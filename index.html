<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JDINJAX eBay Listing Pro</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JDINJAX">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">

    <!-- Android / Theme -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ─── JDINJAX CONFIGURATION & CONSTANTS ────────────────────────────────────
        // FIX [Review #1]: GEMINI_API_KEY removed from client-side code entirely.
        //                  All Gemini requests are proxied through proxy.js running
        //                  on localhost:3001. Key lives in server-side .env only.
        const APP_VERSION = "3.4.7";

        // Environment detection
        // LOCAL  (file:// or localhost) → calls local proxy.js on 127.0.0.1:3001
        // CLOUD  (Railway etc.)         → calls same-origin relative paths
        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const PROXY_HEALTH_URL = _isLocal ? 'http://127.0.0.1:3001/health'     : '/health';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';

        // Runtime config — populated by fetchAppConfig() on mount.
        // Firebase and Cloudinary credentials are NEVER hardcoded here.
        // They are fetched from the server and injected at runtime.
        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            if (!res.ok) throw new Error('Failed to load app config from server.');
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
        };

        // FIX [Review #8]: Replaced __app_id dead-code branch with a defined constant.
        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        // ── Shipping Profile Templates ────────────────────────────────────────
        const SHIPPING_PROFILES = [
            { id: 'usps_fr_small',  label: 'USPS Flat Rate — Small Box',  service: 'USPSPriority',      type: 'Flat',       cost: '9.85'  },
            { id: 'usps_fr_medium', label: 'USPS Flat Rate — Medium Box', service: 'USPSPriority',      type: 'Flat',       cost: '16.10' },
            { id: 'usps_fr_large',  label: 'USPS Flat Rate — Large Box',  service: 'USPSPriority',      type: 'Flat',       cost: '21.90' },
            { id: 'usps_priority',  label: 'USPS Priority (Calculated)',   service: 'USPSPriority',      type: 'Calculated', cost: '0'     },
            { id: 'ups_ground',     label: 'UPS Ground (Calculated)',      service: 'UPS',               type: 'Calculated', cost: '0'     },
            { id: 'free_shipping',  label: 'Free Shipping — USPS Priority',service: 'USPSPriority',      type: 'Flat',       cost: '0'     },
            { id: 'freight',        label: 'Freight / LTL',                service: 'FreightShipping',   type: 'Flat',       cost: '0'     },
            { id: 'flat_695',       label: 'Flat Rate — $6.95',            service: 'USPSGroundAdvantage', type: 'Flat',     cost: '6.95'  },
        ];

        // ── eBay Condition IDs ────────────────────────────────────────────────────
        const EBAY_CONDITIONS = [
            { id: '1000', label: 'New',                      short: 'NEW'      },
            { id: '1500', label: 'New — Other',              short: 'NEW-OTH'  },
            { id: '1750', label: 'New — Open Box',           short: 'OPEN-BOX' },
            { id: '2000', label: 'Seller Refurbished',       short: 'REFURB'   },
            { id: '2500', label: 'Used — Like New',          short: 'LIKE-NEW' },
            { id: '3000', label: 'Used — Good',              short: 'USED-GD'  },
            { id: '4000', label: 'Used — Acceptable',        short: 'USED-OK'  },
            { id: '7000', label: 'For Parts / Not Working',  short: 'PARTS'    },
        ];

        const JDINJAX_SYSTEM_PROMPT = `
SYSTEM PROMPT — JDINJAX eBay Listing Pro Agent
You are JDINJAX eBay Listing Pro Agent, a professional eBay listing generator for Captain John Philip DeBok.
Your sole purpose is to create clean, structured, fully formatted eBay Draft Template CSV files and high-quality descriptions.

CORE BEHAVIOR RULES:
- Immediately generate the listing requested. No small talk.
- Default Assumptions: Condition NEW, Item status: Complete with all parts.

CATEGORY INTELLIGENCE:
- You must identify the most granular "Leaf Category" numeric ID for eBay US (ebay.com).
- DO NOT use top-level or "Other" categories if a more specific sub-category exists.
- Research and provide the full Category Path string (e.g., "Home & Garden > Tools & Workshop Equipment > Power Tools > Drills").
- If the item is a multi-use tool or part, select the category based on its primary intended function.
- Verify that the Category ID provided is currently active and valid for the US site.

PACKAGE INTELLIGENCE:
- Estimate the Item Weight, Packaging Weight, and Dimensions (LxWxH).
- Format weights as strings like "2 lbs 4 oz".

JDINJAX DESCRIPTION CONTENT REQUIREMENTS:
1. Condition (Assumed New unless stated)
2. Key features (Professional, factual bullet points)
3. What's included
4. Any visible flaws (State "None observed" if applicable)
5. Tone: Simple, Professional, Factual. No hype or emojis.
6. Shipping Estimates: Provide numeric values for weights and dimensions.

STRICT CSV CONTENT RULES:
- DO NOT include any hyperlinks, URLs, or <a> tags within descriptions.
- Description must follow the exact bolded header and <p> tag structure.

TITLE RULES:
- The listing title MUST be 80 characters or fewer — this is a hard eBay limit.
- Count every character including spaces. Truncate or rephrase if needed.
- Never exceed 80 characters under any circumstance.
- Prioritize: Brand + Model + Key Spec + Condition keyword. No filler words.

PRICE RULES:
- Buy It Now price MUST end in .95.
`;

        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title:          { type: "STRING" },
                categoryPath:   { type: "STRING" },
                categoryId:     { type: "STRING" },
                buyItNowPrice:  { type: "NUMBER" },
                keyFeatures:    { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded:  { type: "ARRAY", items: { type: "STRING" } },
                flaws:          { type: "STRING" },
                weightItem:     { type: "STRING" },
                weightPackaging:{ type: "STRING" },
                weightTotal:    { type: "STRING" },
                dimensions:     { type: "STRING" },
                ebaySearchLink: { type: "STRING" },
                sellSimilarLink:{ type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        // ─── Icon Component ────────────────────────────────────────────────────────
        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };

        // ─── Description Builder ───────────────────────────────────────────────────
        const buildJDINJAXDescriptions = (data) => {
            const policies = {
                offer:    "Please don't hesitate to make a reasonable offer. A majority of our sales are concluded this way and it doesn't hurt to ask. NOTE: However, I most likely won't counteroffer \"low ball\" offers… it will simply be declined.",
                returns:  "Buyer is responsible for return shipping on any item that is not damaged, defective, or as described. As a reseller of items sourced from numerous places, we cannot control the manufacturing quality of an item. However, we CAN control how the items are sold, pricing, and time to ship of those items to you. If you are unsatisfied with your order in any way, please contact us and we will work with you to resolve it to your satisfaction.",
                shipping: "Items are shipped as fast as possible after payment is processed. This typically results in same-day shipping if payment is received before noon (Mon–Fri).",
                delivery: "We Do Not Ship Outside of the Continental U.S. or to P.O. Boxes.",
                feedback: "We take our reputation seriously; we buy and sell online, so we understand the value of trust. If you are unsatisfied with your order, please give us an opportunity to resolve it to your satisfaction before leaving negative feedback."
            };

            const featureText  = (data.keyFeatures  || []).map(f => `• ${f}`).join('\n');
            const includedText = (data.whatsIncluded || []).map(i => `• ${i}`).join('\n');
            const featureHtml  = (data.keyFeatures  || []).map(f => `• ${f}`).join('<br>');
            const includedHtml = (data.whatsIncluded || []).map(i => `• ${i}`).join('<br>');

            const markdown = `
# Description
**Condition:** New
**Key Features:**
${featureText}

**What's Included:**
${includedText}

**Visible Flaws:**
${data.flaws || "None observed"}

**Shipping Estimates:**
- Item Weight: ${data.weightItem || 'TBD'}
- Packaging Weight: ${data.weightPackaging || 'TBD'}
- Total Weight: ${data.weightTotal || 'TBD'}
- Dimensions: ${data.dimensions || 'TBD'}

# Making an Offer
${policies.offer}

# Return Policy (Please read)
${policies.returns}

# Shipping
${policies.shipping}

# Delivery
${policies.delivery}

# Feedback
${policies.feedback}
            `.trim();

            const html = `
<p><b>Description</b><br>
Condition: New<br><br>
<b>Key Features:</b><br>
${featureHtml}<br><br>
<b>What's Included:</b><br>
${includedHtml}<br><br>
<b>Visible Flaws:</b><br>
${data.flaws || "None observed"}<br><br>
<b>Shipping Estimates:</b><br>
Item Weight: ${data.weightItem || 'TBD'}<br>
Packaging Weight: ${data.weightPackaging || 'TBD'}<br>
Total Weight: ${data.weightTotal || 'TBD'}<br>
Dimensions: ${data.dimensions || 'TBD'}</p>
<p><b>Making an Offer</b><br>${policies.offer}</p>
<p><b>Return Policy (Please read)</b><br>${policies.returns}</p>
<p><b>Shipping</b><br>${policies.shipping}</p>
<p><b>Delivery</b><br>${policies.delivery}</p>
<p><b>Feedback</b><br>${policies.feedback}</p>
            `.trim().replace(/\n/g, '');

            return { markdown, html };
        };

        // ─── Image Preprocessing ───────────────────────────────────────────────────
        const processImageForAI = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1200;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });

        // ─── Cloudinary Upload ─────────────────────────────────────────────────────
        const uploadToCloudinary = async (file) => {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", CLOUDINARY_CONFIG.uploadPreset);

            const response = await fetch(
                `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`,
                { method: "POST", body: formData }
            );
            if (!response.ok) throw new Error(`Cloudinary Error: ${response.statusText}`);
            const data = await response.json();
            // FIX [Review #6]: Use Cloudinary's own secure_url — always correct format/extension.
            return data.secure_url;
        };

        // ─── Main App Component ────────────────────────────────────────────────────
        const App = () => {
            const [images, setImages]                   = useState([]);
            const [listings, setListings]               = useState([]);
            const [isProcessing, setIsProcessing]       = useState(false);
            const [status, setStatus]                   = useState("");
            const [activeTab, setActiveTab]             = useState('process');
            const [user, setUser]                       = useState(null);
            const [errorMsg, setErrorMsg]               = useState(null);
            const [toast, setToast]                     = useState("");
            const [showNukeConfirm, setShowNukeConfirm] = useState(false);
            const [isNuking, setIsNuking]               = useState(false);
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [tempCategoryData, setTempCategoryData]   = useState({ id: '', path: '' });
            const [pricingListingId, setPricingListingId]   = useState(null);  // which listing is being priced
            const [proxyOnline, setProxyOnline]         = useState(null); // null=checking, true=ok, false=down

            const dbRef = useRef(null);

            // ── Proxy Health Check on mount ──────────────────────────────────────
            useEffect(() => {
                fetch(PROXY_HEALTH_URL)
                    .then(r => r.ok ? setProxyOnline(true) : setProxyOnline(false))
                    .catch(() => setProxyOnline(false));
            }, []);

            // ── Config Fetch + Firebase Init ─────────────────────────────────────
            // Fetches Firebase/Cloudinary config from server before initializing.
            // No credentials are hardcoded in this file.
            useEffect(() => {
                const initApp = async () => {
                    try {
                        await fetchAppConfig();
                    } catch (e) {
                        console.error("Config fetch error:", e);
                        setErrorMsg("Failed to load app config from server. Is the proxy running?");
                        return;
                    }
                    try {
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        const auth = firebase.auth();
                        dbRef.current = firebase.firestore();
                        try {
                            await auth.signInAnonymously();
                        } catch (e) {
                            console.error("Auth error:", e);
                            setErrorMsg("Firebase auth failed. Ensure Anonymous Auth is enabled in your console.");
                        }
                        const unsubscribeAuth = auth.onAuthStateChanged((u) => setUser(u));
                        return () => unsubscribeAuth();
                    } catch (e) {
                        console.error("Firebase init error:", e);
                        setErrorMsg("Firebase initialization failed: " + e.message);
                    }
                };
                initApp();
            }, []);

            // ── Firestore Real-time Listener ─────────────────────────────────────
            useEffect(() => {
                if (!user || !dbRef.current) return;
                const listingsPath = getListingsPath(user.uid);
                const q = dbRef.current.collection(listingsPath);
                const unsubscribe = q.onSnapshot((snapshot) => {
                    setListings(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    console.error("Firestore error:", err);
                    setErrorMsg("Sync error: " + err.message);
                });
                return () => unsubscribe();
            }, [user]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(""), 3000);
            };

            // FIX [Review #3]: Replaced deprecated execCommand with Clipboard API.
            const copyToClipboard = async (text, label) => {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(`${label} copied!`);
                } catch (err) {
                    setErrorMsg(`Failed to copy ${label}. Clipboard access denied.`);
                }
            };

            // ── Gemini via Proxy ─────────────────────────────────────────────────
            // FIX [Review #1]: No API key in client. Request goes to local proxy.
            // FIX [Review #4]: Added Content-Type header.
            const generateJDINJAXListing = async (cloudinaryUrls, originalFiles) => {
                setStatus("Analyzing items & leaf categories...");
                const b64Images = await Promise.all(originalFiles.map(file => processImageForAI(file)));

                const payload = {
                    model: "gemini-2.5-flash",  // proxy reads this to build the upstream URL
                    contents: [{
                        role: "user",
                        parts: [
                            { text: "Analyze 4 images. Determine specific eBay US leaf category numeric ID, detailed features, and package specs (weights/dimensions). Return only valid JSON." },
                            ...b64Images.map(b64 => ({ inlineData: { mimeType: "image/jpeg", data: b64 } }))
                        ]
                    }],
                    systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: JSON_SCHEMA
                    }
                };

                const response = await fetch(PROXY_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (!response.ok) {
                    console.error("Proxy/API Error:", result);
                    throw new Error(`AI Engine Error: ${result.error?.message || response.statusText}`);
                }

                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) {
                    console.error("Unexpected API response:", result);
                    throw new Error("AI Engine returned no content.");
                }

                const rawData = JSON.parse(text);
                const { markdown, html } = buildJDINJAXDescriptions(rawData);
                return { ...rawData, markdownDescription: markdown, htmlDescription: html };
            };

            // ── Batch Processor ──────────────────────────────────────────────────
            const processBatches = async () => {
                if (images.length < 4 || !user) return;

                // FIX [Review #5]: Detect and warn about remainder images dropped from batching.
                const fullBatchCount = Math.floor(images.length / 4);
                const remainder = images.length % 4;
                const batches = [];
                for (let i = 0; i < fullBatchCount * 4; i += 4) {
                    batches.push(images.slice(i, i + 4));
                }

                if (remainder > 0) {
                    const confirm = window.confirm(
                        `⚠️ You have ${images.length} images loaded.\n` +
                        `${fullBatchCount} full batch(es) of 4 will be processed.\n` +
                        `${remainder} leftover image(s) will be skipped — batches require exactly 4.\n\n` +
                        `Proceed with ${fullBatchCount} batch(es)?`
                    );
                    if (!confirm) return;
                }

                setIsProcessing(true);
                setErrorMsg(null);

                try {
                    const listingsPath = getListingsPath(user.uid);
                    for (let idx = 0; idx < batches.length; idx++) {
                        const batch = batches[idx];
                        setStatus(`Batch ${idx + 1}/${batches.length}: Hosting to Cloudinary...`);
                        const cloudinaryUrls = await Promise.all(batch.map(img => uploadToCloudinary(img.file)));
                        setStatus(`Batch ${idx + 1}/${batches.length}: Analyzing with AI...`);
                        const aiData = await generateJDINJAXListing(cloudinaryUrls, batch.map(img => img.file));
                        await dbRef.current.collection(listingsPath).add({
                            ...aiData,
                            images:          cloudinaryUrls,
                            conditionId:     aiData.conditionId     || '1000',
                            shippingProfile: aiData.shippingProfile || 'ups_ground',
                            priceResearch:   null,
                            timestamp:       Date.now()
                        });
                    }
                    setImages([]);
                    setActiveTab('listings');
                    showToast(`${batches.length} listing(s) generated!`);
                } catch (error) {
                    console.error(error);
                    setErrorMsg(error.message);
                } finally {
                    setIsProcessing(false);
                    setStatus("");
                }
            };

            const saveCategoryUpdate = async (listingId) => {
                if (!user) return;
                try {
                    const docPath = `${getListingsPath(user.uid)}/${listingId}`;
                    await dbRef.current.doc(docPath).update({
                        categoryId:   tempCategoryData.id,
                        categoryPath: tempCategoryData.path
                    });
                    setEditingCategoryId(null);
                    showToast("Category updated!");
                } catch (error) {
                    console.error(error);
                    setErrorMsg("Update failed.");
                }
            };

            // ── Generic listing field updater ────────────────────────────────────
            const updateListingField = async (listingId, field, value) => {
                if (!user) return;
                try {
                    await dbRef.current.doc(`${getListingsPath(user.uid)}/${listingId}`).update({ [field]: value });
                } catch (e) {
                    console.error('Update failed:', e);
                    setErrorMsg('Failed to save update.');
                }
            };

            // ── Price Intelligence — Gemini-powered market research ───────────────
            // Sends item details to Gemini for a structured price range estimate.
            // When eBay API credentials are added, this will upgrade to live
            // completed listings data automatically.
            const researchPrice = async (listing) => {
                if (!listing || pricingListingId) return;
                setPricingListingId(listing.id);
                try {
                    const condLabel = (EBAY_CONDITIONS.find(c => c.id === (listing.conditionId || '1000')) || EBAY_CONDITIONS[0]).label;

                    const promptText =
                        "You are an eBay US pricing expert. Analyze this item and estimate its market price.\n\n" +
                        "Item: " + listing.title + "\n" +
                        "Category: " + (listing.categoryPath || "Unknown") + "\n" +
                        "Condition: " + condLabel + "\n" +
                        "Weight: " + (listing.weightTotal || "Unknown") + "\n\n" +
                        "Return a JSON object with: low (number), mid (number, must end in .95), high (number), " +
                        "confidence (HIGH/MEDIUM/LOW), basis (string under 60 chars), comparable (string under 60 chars).";

                    // Use gemini-1.5-flash — stable structured output, no thinking overhead
                    const payload = {
                        model: 'gemini-2.5-flash',
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            temperature: 0.1,
                            maxOutputTokens: 8192,
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    low:        { type: "NUMBER" },
                                    mid:        { type: "NUMBER" },
                                    high:       { type: "NUMBER" },
                                    confidence: { type: "STRING" },
                                    basis:      { type: "STRING" },
                                    comparable: { type: "STRING" }
                                },
                                required: ["low","mid","high","confidence","basis","comparable"]
                            }
                        }
                    };

                    const response = await fetch(PROXY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errBody = await response.json().catch(() => ({}));
                        throw new Error('API ' + response.status + ': ' + (errBody.error?.message || response.statusText));
                    }

                    const result = await response.json();
                    const raw = result.candidates?.[0]?.content?.parts?.[0]?.text || '';
                    console.log('[JDINJAX] Price response:', raw);

                    const priceData = JSON.parse(raw);
                    if (typeof priceData.mid !== 'number') throw new Error('mid not a number');

                    await updateListingField(listing.id, 'priceResearch', { ...priceData, generatedAt: Date.now() });
                    await updateListingField(listing.id, 'buyItNowPrice', priceData.mid);
                    showToast('Price research complete: $' + priceData.low + ' — $' + priceData.high);

                } catch (e) {
                    console.error('[JDINJAX] Price research error:', e);
                    setErrorMsg('Price research failed: ' + e.message);
                } finally {

                const infoLines = [
                    "#INFO,Version=0.0.2,Template= eBay-draft-listings-template_US,,,,,,,,,,,,,",
                    "#INFO Action and Category ID are required fields. 1) Set Action to Draft 2) Please find the category ID for your listings here: https://pages.ebay.com/sellerinformation/news/categorychanges.html,,,,,,,,,,,,,,,",
                    "\"#INFO After you've successfully uploaded your draft from the Seller Hub Reports tab, complete your drafts to active listings here: https://www.ebay.com/sh/lst/drafts\",,,,,,,,,,,,,,,",
                    "#INFO,,,,,,,,,,,,,,,"
                ];
                const headerRow = "Action(SiteID=US|Country=US|Currency=USD|Version=1193|CC=UTF-8),Custom label (SKU),Category ID,Title,UPC,Price,Quantity,Item photo URL,Condition ID,Description,Format,Duration,BuyItNow,BestOffer,ShippingType,ShippingService1Option,ShippingService1Cost,WeightMajor,WeightMinor,PackageLength,PackageWidth,PackageDepth";

                const rows = listings.map(l => {
                    const cleanSKU       = `JD-${l.id.substring(0, 8)}`;
                    const cleanCatId     = (l.categoryId || "").toString().trim();
                    const cleanTitle     = (l.title || "").trim().replace(/"/g, '""').substring(0, 80);
                    const cleanPrice     = (l.buyItNowPrice || 0.95).toFixed(2);
                    const cleanPhotoUrls = (l.images || []).map(url => url.trim()).join('|');
                    const cleanDesc      = (l.htmlDescription || "").trim().replace(/"/g, '""');

                    let weightMajor = "0", weightMinor = "0";
                    const weightStr = (l.weightTotal || "").toLowerCase();
                    const lbsMatch  = weightStr.match(/(\d+)\s*(lb|pound)/);
                    const ozMatch   = weightStr.match(/(\d+)\s*oz/);
                    if (lbsMatch) weightMajor = lbsMatch[1];
                    if (ozMatch)  weightMinor = ozMatch[1];

                    let l_val = "0", w_val = "0", h_val = "0";
                    const dimParts = (l.dimensions || "").split(/[xX*]/).map(s => s.trim().replace(/[^\d.]/g, ''));
                    if (dimParts.length >= 3) { l_val = dimParts[0]; w_val = dimParts[1]; h_val = dimParts[2]; }

                    // Condition
                    const condObj     = EBAY_CONDITIONS.find(c => c.id === (l.conditionId || '1000')) || EBAY_CONDITIONS[0];
                    const cleanCondId = condObj.id;

                    // Shipping profile
                    const shipProf    = SHIPPING_PROFILES.find(s => s.id === (l.shippingProfile || 'ups_ground')) || SHIPPING_PROFILES.find(s => s.id === 'ups_ground');
                    const shipType    = shipProf.type;
                    const shipService = shipProf.service;
                    const shipCost    = shipProf.cost;

                    return `"Draft","${cleanSKU}","${cleanCatId}","${cleanTitle}","Does Not Apply","${cleanPrice}","1","${cleanPhotoUrls}","${cleanCondId}","${cleanDesc}","FixedPrice","GTC","1","1","${shipType}","${shipService}","${shipCost}","${weightMajor}","${weightMinor}","${l_val}","${w_val}","${h_val}"`;
                });

                const csvContent = [...infoLines, headerRow, ...rows].join('\r\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);

                                                        </span>
                                                        <button
                                                            onClick={() => researchPrice(listing)}
                                                            disabled={pricingListingId === listing.id}
                                                            className="text-[9px] font-black uppercase tracking-widest bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-xl flex items-center gap-1.5 transition-all active:scale-95 disabled:bg-slate-200 disabled:text-slate-400"
                                                        >
                                                            {pricingListingId === listing.id
                                                                ? <><Icon name="Loader2" size={10} className="animate-spin"/> Researching...</>
                                                                : <><Icon name="Search" size={10}/> {listing.priceResearch ? 'Refresh' : 'Research Price'}</>
                                                            }
                                                        </button>
                                                    </div>

                                                    {listing.priceResearch ? (
                                                        <div>
                                                            <div className="flex items-end gap-3 mb-2">
                                                                <div className="text-center">
                                                                    <span className="text-[8px] text-slate-400 font-black uppercase block">Low</span>
                                                                    <span className="text-base font-black text-slate-600">${listing.priceResearch.low?.toFixed(2)}</span>
                                                                </div>
                                                                <div className="flex-1 text-center bg-white rounded-xl px-3 py-2 border border-blue-200 shadow-sm">
                                                                    <span className="text-[8px] text-blue-500 font-black uppercase block">Recommended</span>
                                                                    <span className="text-xl font-black text-blue-700">${listing.priceResearch.mid?.toFixed(2)}</span>
                                                                </div>
                                                                <div className="text-center">
                                                                    <span className="text-[8px] text-slate-400 font-black uppercase block">High</span>
                                                                    <span className="text-base font-black text-slate-600">${listing.priceResearch.high?.toFixed(2)}</span>
                                                                </div>
                                                                <span className={`text-[8px] font-black px-2 py-1 rounded-lg uppercase tracking-widest self-start ${
                                                                    listing.priceResearch.confidence === 'HIGH'   ? 'bg-green-100 text-green-700' :
                                                                    listing.priceResearch.confidence === 'MEDIUM' ? 'bg-amber-100 text-amber-700' :
                                                                    'bg-red-100 text-red-600'
                                                                }`}>{listing.priceResearch.confidence}</span>
                                                            </div>
                                                            <p className="text-[9px] text-slate-500 italic leading-relaxed">{listing.priceResearch.basis}</p>
                                                            {listing.priceResearch.comparable && (
                                                                <p className="text-[9px] text-blue-500 mt-1 font-bold">⚡ {listing.priceResearch.comparable}</p>
                                                            )}
                                                        </div>
                                                    ) : (
                                                        <p className="text-[10px] text-slate-400 italic">Click Research Price to get an AI-powered market value estimate based on comparable eBay sales.</p>
                                                    )}
                                                </div>

                                                {/* ── Action Buttons ──────────────────────────────────────────── */}
                                                <div className="flex items-center gap-8 border-t border-slate-100 pt-5 mt-2">
                                                    <div className="flex items-center gap-6 overflow-x-auto pb-1 no-scrollbar">
                                                        <button onClick={() => copyToClipboard(listing.markdownDescription, "Description")} className="text-slate-400 hover:text-blue-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all whitespace-nowrap"><Icon name="ClipboardList" size={14}/> Copy Description</button>
                                                        <button onClick={() => copyToClipboard((listing.images || []).join('\n'), "Links")} className="text-slate-400 hover:text-blue-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all whitespace-nowrap"><Icon name="Copy" size={12}/> Copy Links</button>
                                                        <a href={listing.sellSimilarLink} target="_blank" className="text-slate-400 hover:text-blue-600 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition-all whitespace-nowrap"><Icon name="ExternalLink" size={12}/> Sell Similar</a>
                                                    </div>
                                                    <button onClick={async () => {
                                                        if (!user) return;
                                                        await dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`).delete();
                                                    }} className="ml-auto text-slate-300 hover:text-red-500 transition-all hover:scale-110 p-2"><Icon name="Trash2" size={20}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {listings.length === 0 && (
                                        <div className="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-200 flex flex-col items-center animate-in fade-in">
                                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6"><Icon name="Image" className="text-slate-200" size={32} /></div>
                                            <h3 className="text-slate-400 font-black uppercase tracking-[0.4em] text-xs">Queue Is Empty</h3>
                                            <button onClick={() => setActiveTab('process')} className="mt-8 px-8 py-3 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl transition-all hover:bg-slate-900 active:scale-95">Initiate Batch Run</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    {/* FIX [Review #9]: Version sourced from single APP_VERSION constant */}
                    <footer className="max-w-6xl mx-auto mt-20 py-12 border-t border-slate-200 text-center text-slate-400 text-[9px] font-black uppercase tracking-[0.6em]">© 2025 JDINJAX AUTOMATION • v{APP_VERSION} PROXY EDITION</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[JDINJAX] SW registered:', reg.scope))
                    .catch(err => console.warn('[JDINJAX] SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
