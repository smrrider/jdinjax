                                {confirmPurge ? (
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => setConfirmPurge(false)} className="text-[9px] font-black text-slate-400 px-2 py-1 rounded-lg hover:bg-slate-100 uppercase">Cancel</button>
                                        <button onClick={purgeHistory} className="text-[9px] font-black text-red-600 px-2 py-1 rounded-lg bg-red-50 uppercase">Confirm</button>
                                    </div>
                                ) : (
                                    <button onClick={() => setConfirmPurge(true)} className="p-1.5 text-slate-300 hover:text-red-400 transition-colors rounded-lg">
                                        <Icon name="Trash2" size={14}/>
                                    </button>
                                )}
                            </div>
                        </div>

                        {barcodePreload && (
                            <div className="mx-4 mt-3 bg-emerald-50 border border-emerald-200 rounded-2xl px-4 py-3 flex items-center justify-between">
                                <div className="min-w-0 flex-1">
                                    <p className="text-[8px] font-black text-emerald-600 uppercase tracking-widest">Barcode Loaded</p>
                                    <p className="text-[10px] font-bold text-slate-700 leading-tight mt-0.5 truncate">{barcodePreload.title}</p>
                                </div>
                                <button onClick={() => setBarcodePreload(null)} className="text-slate-300 hover:text-slate-500 ml-2 shrink-0"><Icon name="X" size={14}/></button>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto no-scrollbar px-4 py-4 space-y-4">
                            {history.length > 0 && activeHistory === null && !result && (
                                <div className="space-y-1">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest px-1 mb-2">Recent Scans</p>
                                    {history.slice(0, 8).map((h) => (
                                        <button key={h._docId} onClick={() => setActiveHistory(history.indexOf(h))}
                                            className="w-full flex items-center gap-3 p-3 rounded-2xl text-left hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100">
                                            {h.imageUrl && <img src={h.imageUrl} className="w-10 h-10 rounded-xl object-cover border border-slate-200 shrink-0" onError={(e) => e.target.style.display='none'}/>}
                                            <div className="min-w-0 flex-1">
                                                <p className="text-[10px] font-black text-slate-800 uppercase leading-tight truncate">{h.itemTitle}</p>
                                                <p className="text-[9px] text-slate-400 mt-0.5">{h.timestamp}</p>
                                            </div>
                                            <span className={"text-[8px] font-black px-2 py-1 rounded-lg uppercase " + (h.verdict && h.verdict.tag === "GO" ? "bg-emerald-100 text-emerald-700" : h.verdict && h.verdict.tag === "MARGINAL" ? "bg-amber-100 text-amber-700" : "bg-red-100 text-red-700")}>{h.verdict ? h.verdict.tag : "?"}</span>
                                        </button>
                                    ))}
                                </div>
                            )}

                            {activeHistory !== null && (
                                <button onClick={() => setActiveHistory(null)} className="flex items-center gap-2 text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-slate-800 transition-colors">
                                    <Icon name="ChevronLeft" size={14}/> Back
                                </button>
                            )}

                            {!displayResult && activeHistory === null && (
                                <div className="space-y-3">
                                    {/* Image upload */}
                                    <div className="relative border-2 border-dashed border-slate-300 rounded-2xl overflow-hidden hover:border-emerald-400 transition-colors">
                                        <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                            onClick={(e) => { e.target.value = ''; }}
                                            onChange={(e) => { if (e.target.files[0]) setReconImage({ file: e.target.files[0], url: URL.createObjectURL(e.target.files[0]) }); }} />
                                        {reconImage ? (
                                            <div className="relative">
                                                <img src={reconImage.url} className="w-full h-40 object-contain bg-slate-50"/>
                                                <div className="absolute bottom-2 right-2 bg-emerald-500 text-white text-[9px] font-black px-2 py-1 rounded-full uppercase">Tap to Replace</div>
                                            </div>
                                        ) : (
                                            <div className="py-8 text-center">
                                                <Icon name="ImagePlus" size={32} className="text-slate-300 mb-2"/>
                                                <p className="text-xs font-black text-slate-400 uppercase">Load Item Photo</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Scan Barcode button (engine toggle removed — ALA §9.5 — 21 MAR 2026) */}
                                    <button onClick={() => setShowReconScanner(true)}
                                        className="w-full py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-1.5 bg-slate-100 text-slate-600 hover:bg-emerald-50 hover:text-emerald-600 active:scale-95">
                                        <Icon name="ScanLine" size={12}/> Scan Barcode
                                    </button>

                                    {/* Scan results */}
                                    <ReconScanResultsPanel
                                        reconScanResults={reconScanResults}
                                        reconManualTitle={reconManualTitle}
                                        setReconManualTitle={setReconManualTitle}
                                        setBarcodePreload={setBarcodePreload}
                                        setReconScanResults={setReconScanResults}
                                        setResult={setResult}
                                        setActiveHistory={setActiveHistory}
                                        setShowReconScanner={setShowReconScanner}
                                        setReconImage={setReconImage}
                                    />

                                    {/* Condition + Price Row */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Item Condition</p>
                                            <select value={condition} onChange={e => setCondition(e.target.value)}
                                                className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none uppercase cursor-pointer">
                                                {ebayConditions.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                            </select>
                                        </div>
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Purchase Price</p>
                                            <div className="flex gap-1 mb-2 flex-wrap">
                                                {['1','2','4','6','8','10'].map(v => (
                                                    <button key={v} onClick={() => setPurchasePrice(v)}
                                                        className={`text-[9px] font-black px-2 py-1 rounded-lg border transition-colors ${purchasePrice === v ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-500 border-slate-200 hover:border-emerald-400 hover:text-emerald-600'}`}>
                                                        ${v}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex items-center gap-1">
                                                <span className="text-slate-400 font-black text-sm">$</span>
                                                <input type="number" step="0.01" min="0" value={purchasePrice}
                                                    onChange={e => setPurchasePrice(e.target.value)}
                                                    placeholder="0.00"
                                                    className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none placeholder-slate-300" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Shipping Mode */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Buyer Shipping</p>
                                            <select value={shippingMode} onChange={e => setShippingMode(e.target.value)}
                                                className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none uppercase cursor-pointer">
                                                <option value="flat">Flat Fee</option>
                                                <option value="free">Free Shipping</option>
                                                <option value="pickup">Local Pickup</option>
                                            </select>
                                        </div>
                                        <div className={shippingMode !== "flat" ? "bg-slate-100 border border-slate-200 rounded-2xl p-4 opacity-40 pointer-events-none" : "bg-slate-50 border border-slate-200 rounded-2xl p-4"}>
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-2">Flat Fee Charged</p>
                                            <div className="flex items-center gap-1">
                                                <span className="text-slate-400 font-black text-sm">$</span>
                                                <input type="number" step="0.01" min="0" value={flatShippingFee}
                                                    onChange={e => setFlatShippingFee(e.target.value)}
                                                    disabled={shippingMode !== "flat"}
                                                    className="w-full bg-transparent text-[11px] font-black text-slate-800 focus:outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    {errorMsg && (
                                        <div className="bg-red-50 border border-red-200 rounded-2xl px-5 py-3 text-xs font-bold text-red-600">{errorMsg}</div>
                                    )}

                                    {/* Run Button */}
                                    <button onClick={runRecon} disabled={isRunning || (!reconImage && !barcodePreload)}
                                        className={`w-full py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all active:scale-95 shadow-lg flex items-center justify-center gap-3 ${isRunning || (!reconImage && !barcodePreload) ? "bg-slate-200 text-slate-400" : 'bg-emerald-500 text-white shadow-emerald-100 hover:bg-emerald-400'}`}>
                                        {isRunning ? <><Icon name="Loader2" size={16} className="animate-spin" /> {reconStatus || 'Running Recon...'}</> : <><Icon name="Zap" size={16} /> Run Profit Scout</>}
                                    </button>
                                </div>
                            )}

                            {/* Intel Card */}
                            {displayResult && (() => {
                                const r = displayResult;
                                return (
                                    <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-400">
                                        {(() => { const ar = r; const liveVerdict = getVerdict(ar.arb.netProfit); return (
                                        <div className={`rounded-2xl border-2 px-5 py-4 flex items-center justify-between ${liveVerdict.css}`}>
                                            <div>
                                                <p className="text-xl font-black leading-none">{liveVerdict.label}</p>
                                                <p className="text-[10px] font-black uppercase tracking-widest mt-1 opacity-70">Profit Verdict</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-black leading-none">${ar.arb.netProfit.toFixed(2)}</p>
                                                <p className="text-[9px] font-black uppercase tracking-widest mt-1 opacity-70">Net Profit · {ar.arb.roi.toFixed(0)}% ROI</p>
                                            </div>
                                        </div>
                                        ); })()}
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 flex gap-3">
                                            {r.imageUrl && <img src={r.imageUrl} className="w-16 h-16 rounded-xl object-cover border border-slate-200 shrink-0" onError={(e) => e.target.style.display='none'} />}
                                            <div className="min-w-0">
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Item Identified</p>
                                                <p className="text-xs font-black text-slate-900 leading-tight uppercase">{r.itemTitle}</p>
                                                <span className="text-[9px] font-black text-blue-500 bg-blue-50 border border-blue-100 px-2 py-1 rounded-lg mt-2 inline-block uppercase">{r.condition}</span>
                                            </div>
                                        </div>
                                        <div className="bg-white border border-slate-200 rounded-2xl p-4">
                                            <div className="flex items-center gap-2 mb-3">
                                                <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">AI Price Intel</p>
                                                <span className="text-[7px] font-black px-1.5 py-0.5 rounded bg-slate-600 text-white uppercase">🤖 AI</span>
                                            </div>
                                            <div className="grid grid-cols-3 gap-1.5">
                                                {[
                                                    { key:'priceLow',  label:'🔥 Move It', sub:'Undercut market', color:'bg-orange-50 border-orange-200 text-orange-700' },
                                                    { key:'priceMid',  label:'✅ Market',  sub:'Active median',  color:'bg-emerald-50 border-emerald-200 text-emerald-700' },
                                                    { key:'priceHigh', label:'💰 Hold',    sub:'Near ask high',  color:'bg-violet-50 border-violet-200 text-violet-700' },
                                                ].map(s => (
                                                    <div key={s.key} className={`rounded-xl p-2 border text-center ${s.color}`}>
                                                        <span className="text-[7px] font-black uppercase block mb-0.5">{s.label}</span>
                                                        <span className="text-sm font-black block">${Number(r[s.key]||0).toFixed(2)}</span>
                                                        <span className="text-[7px] opacity-70 block">{s.sub}</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <p className="text-[8px] text-slate-300 font-bold mt-2">Independent AI estimate · not derived from eBay data</p>
                                        </div>
                                        <div className="bg-white border border-slate-200 rounded-2xl p-4">
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">Cost Stack</p>
                                            <div className="space-y-1">{renderCostStack(r)}</div>

            // Map an eBay mandatory spec name → best-guess value from Gemini-extracted listing fields.
            // Pass allowedValues (eBay's enumeration for this spec) to enable title/description scanning —
            // this catches things like DDR5 for RAM Type, Rust for Exterior Color, Backpack for Style, etc.
            const getSpecAutoFill = (specName, listing, allowedValues = []) => {
                // 1. Already saved to Firestore — highest priority
                const saved = listing[`spec_${specName.replace(/\s+/g,'_')}`];
                if (saved) return saved;

                const n = specName.toLowerCase().replace(/[^a-z]/g,'');

                // 2. Direct Gemini-field mappings
                const directVal = (() => {
                    if (n === 'brand')                                 return listing.brand    || '';
                    if (n === 'type' || n === 'itemtype')              return listing.itemType || '';
                    if (n === 'model')                                 return listing.model    || '';
                    if (n === 'mpn' || n === 'manufacturerpartnumber') return listing.mpn      || '';
                    if (n === 'color' || n === 'colour' || n === 'exteriorcolor') return listing.color || '';
                    if (n === 'material' || n === 'exteriormaterial')  return listing.material || '';
                    if (n === 'size')                                   return listing.size    || '';
                    if (n === 'storage' || n === 'storagecapacity')    return listing.storage  || '';
                    return '';
                })();
                // If direct mapping gave a value AND it's in the allowed list (or free-text), use it
                if (directVal && (!allowedValues.length || allowedValues.some(v => v.toLowerCase() === directVal.toLowerCase()))) {
                    return directVal;
                }

                // 3. Scan title + description against eBay's allowed values list (word-boundary match)
                //    This catches: DDR5 in RAM title, Rust/Brown in bag title, Backpack/Tote in style, etc.
                if (allowedValues.length > 0) {
                    const searchText = [listing.title, listing.markdownDescription, listing.keyFeatures]
                        .filter(Boolean).join(' ');
                    const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    // Pass 1: full phrase match (e.g. "Rust" or "Backpack" found as whole word)
                    let match = allowedValues.find(v => {
                        if (!v || v.length < 2) return false;
                        return new RegExp(`\\b${esc(v)}\\b`, 'i').test(searchText);
                    });
                    // Pass 2: for multi-word eBay values (e.g. "DDR5 SDRAM"), check if the
                    // first significant token appears in the text ("DDR5" found in title)
                    if (!match) {
                        match = allowedValues.find(v => {
                            if (!v || !v.includes(' ')) return false;
                            const firstToken = v.split(/\s+/)[0];
                            if (firstToken.length < 3) return false;
                            return new RegExp(`\\b${esc(firstToken)}\\b`, 'i').test(searchText);
                        });
                    }
                    if (match) return match;
                }

                // 4. Use the direct Gemini value even if not in the list (user will see "confirm" label)
                if (directVal) return directVal;

                // 5. Brand last-resort: always return something so eBay never rejects for missing brand
                if (n === 'brand') return 'Unbranded';

                return '';
            };

            // Returns count of mandatory specs that still need user attention:
            //   - no value at all, OR
            //   - value isn't in eBay's allowed list for that spec
            // A field is considered resolved when the effective value is in eBay's enumerated list
            // (or the spec accepts free text and has any non-empty value).
            const getUnresolvedSpecCount = (listing, categoryData) => {

                    const val = listing[key] || getSpecAutoFill(spec.name, listing, spec.values);
                    if (!val) return true; // no value at all → unresolved
                    if (spec.values?.length > 0) {

                            setValidatedCategories(prev => ({ ...prev, [listing.categoryId]: d }));
                            loadedCatIdsRef.current.add(listing.categoryId);
                        }
                        setCategorySpecifics(d);
                        const fills = {};
                        const toSave = {};
                        const needsGemini = []; // specs where text-scan couldn't find a valid list match

                        (d.mandatory || []).forEach(spec => {
                            const key = `spec_${spec.name.replace(/\s+/g,'_')}`;
                            const val = getSpecAutoFill(spec.name, listing, spec.values);
                            const inList = !spec.values?.length || spec.values.some(v => v.toLowerCase() === (val||'').toLowerCase());
                            if (val && inList) {
                                // Text-scan found a confirmed match — use it immediately
                                fills[key] = val;
                                if (!listing[key]) toSave[key] = val;
                            } else if (spec.values?.length > 0) {
                                // eBay has an allowed list but we couldn't match — Gemini fallback
                                needsGemini.push({ spec, key });
                                if (val) fills[key] = val; // show tentative value while Gemini loads
                            } else if (val) {
                                // Free-text spec with a value — use it
                                fills[key] = val;
                                if (!listing[key]) toSave[key] = val;
                            }
                        });

                        setSpecAutoFills({ ...fills });
                        if (Object.keys(toSave).length) {
                            dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`).update(toSave).catch(()=>{});

            const convertToHtml = (text) => {
                if (!text) return "";
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                let html = "";
                let inList = false;
                const applyInline = (str) => str
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>');

                lines.forEach(line => {
                    if (line.startsWith('*') || line.startsWith('-') || line.startsWith('*')) {
                        if (!inList) { html += "<ul>"; inList = true; }
                        html += `<li>${applyInline(line.substring(1).trim())}</li>`;
                    } else {
                        if (inList) { html += "</ul>"; inList = false; }
                        if (line === line.toUpperCase() && line.length > 3) {
                            html += `<h4>${applyInline(line)}</h4>`;
                        } else {
                            html += `<p>${applyInline(line)}</p>`;
                        }
                    }
                });
                if (inList) html += "</ul>";
                return html;

                        `"${(settings.shippingProfile || "").replace(/"/g, '""')}"`,
                        `"${(settings.paymentProfile  || "").replace(/"/g, '""')}"`,
                        `"${(settings.returnProfile   || "").replace(/"/g, '""')}"`
                    ];
                });

                const csvContent = [
                    headers.join(","),
                    ...rows.map(r => r.join(","))
                ].join("\r\n");

                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                const blobUrl2 = URL.createObjectURL(blob);
                link.href = blobUrl2;
                link.download = `ebay_add_import_${Date.now()}.csv`;
                link.click();
                setTimeout(() => URL.revokeObjectURL(blobUrl2), 5000);
                showToast("✅ Add CSV Exported — Listings scheduled for: " + formatScheduleTimeDisplay(isoScheduleTime));
                setShowSchedulePicker(false);
            };

            const processImages = async (mode) => {
                if (!user) return;

                if (images.length === 0) {
                    showToast('No images loaded. Add images before processing.', 'error');
                    return;
                }

                // Single mode: ALL images → 1 listing.
                // Bulk mode: group by user-defined bulkGroupSize.
                const groupSize = parseInt(settings.bulkGroupSize) || 4;
                const batches = mode === 'single'
                    ? [images]
                    : Array.from({ length: Math.ceil(images.length / groupSize) }, (_, i) => images.slice(i * groupSize, i * groupSize + groupSize));
                const total = batches.length;
                setIsProcessing(true);
                let completed = 0;
                setStatus(`Processing 0/${total}...`);
                try {
                    const listingsPath = getListingsPath(user.uid);
                    // If BG removal is enabled, load the library once before parallel processing
                    let bgRemovalFn = null;
                    if (removeBgOnProcess) {
                        setStatus('Loading BG removal model…');
                        const lib = await getBgRemovalLib();
                        bgRemovalFn = lib.removeBackground;
                        setStatus(`Processing 0/${total}…`);
                    }

                    await Promise.all(batches.map(async (batch, i) => {
                        // Optionally strip backgrounds before compress+upload
                        const processedBatch = bgRemovalFn
                            ? await Promise.all(batch.map(async img => {
                                const bgBlob = await bgRemovalFn(img.url, { output: { format: 'image/png' } });
                                return { ...img, _bgBlob: bgBlob };
                              }))
                            : batch;

                        // Compress all images in this batch in parallel
                        const compressed = await Promise.all(processedBatch.map(img =>
                            img._bgBlob
                                // BG-removed: resize to 1024px + convert to WebP (transparency + ~80% size reduction vs PNG)
                                ? compressBgRemoved(img._bgBlob)
                                : compressImage(img)
                        ));
                        const primaryB64 = { data: compressed[0].b64, mimeType: compressed[0].mimeType };

                        // Single sign-upload call for the whole batch — all images share timestamp+signature
                        const timestamp = Math.round(Date.now() / 1000);
                        const signRes = await fetch(SIGN_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await user.getIdToken()}` },
                            body: JSON.stringify({ userId: user.uid, timestamp })
                        });
                        const { signature, folder } = await signRes.json();

                        // Fire Cloudinary uploads + Gemini in parallel
                        const MAX_UPLOAD_BYTES = 15 * 1024 * 1024; // 15 MB hard cap
                        const uploadPromise = Promise.allSettled(compressed.map(async (comp) => {
                            if (comp.blob.size > MAX_UPLOAD_BYTES) throw new Error(`Image exceeds 15 MB limit (${(comp.blob.size/1024/1024).toFixed(1)} MB)`);
                            const fd = new FormData();
                            fd.append("file", comp.blob);
                            fd.append("api_key", CLOUDINARY_CONFIG.apiKey);
                            fd.append("timestamp", timestamp);
                            fd.append("signature", signature);
                            fd.append("folder", folder);
                            const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const d = await r.json();
                            if (!d.secure_url) throw new Error(`Upload failed: ${d.error?.message || 'Unknown error'}`);
                            return d.secure_url;
                        }));

                        const geminiPromise = fetch(PROXY_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: "gemini-2.5-flash",
                                contents: [{ role: "user", parts: [{ text: processorKeyword.trim() ? `Item context: "${processorKeyword.trim()}" — Technical eBay JSON data.` : "Technical eBay JSON data." }, { inlineData: { mimeType: primaryB64.mimeType, data: primaryB64.data } }] }],
                                systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                                generationConfig: { responseMimeType: "application/json", responseSchema: JSON_SCHEMA }
                            })
                        });

                        const [uploadResults, geminiRes] = await Promise.all([uploadPromise, geminiPromise]);

                        const failedUploads = uploadResults.filter(r => r.status === 'rejected').length;
                        if (failedUploads > 0) showToast(`${failedUploads} image(s) failed to upload  -  skipped.`);
                        const urls = uploadResults.filter(r => r.status === 'fulfilled').map(r => r.value);
                        if (urls.length === 0) { showToast(`Batch ${i+1}: all uploads failed — check Cloudinary config.`, 'error'); return; }

                        const result = await geminiRes.json();
                        if (!result.candidates?.[0]?.content?.parts?.[0]?.text) {
                            console.error('[Gemini] Bad response:', JSON.stringify(result).substring(0, 300));
                            throw new Error('Gemini returned no candidates — check model or API key.');
                        }
                        const aiData = JSON.parse(cleanJson(result.candidates[0].content.parts[0].text));

                        aiData.categorySource = 'AI Draft';
                        const currentCondition = EBAY_CONDITIONS.find(c => c.id === batchCondition)?.label || 'Used';
                        const finalConditionId = sanitizeConditionId(batchCondition, aiData.categoryId);
                        const listingPayload = {
                            ...aiData,
                            images: urls,
                            conditionId: finalConditionId,
                            timestamp: Date.now(),
                            sku: `BKA-${Date.now()}`,
                            markdownDescription: buildDescription(aiData, currentCondition, settings.adFooter)
                        };
                        const docRef = await dbRef.current.collection(listingsPath).add(listingPayload);

                        // Background: refine category first, then auto price research.
                        // Sequencing matters — eBay Browse returns far better results when
                        // it has the correct leaf category rather than the initial Gemini guess.
                        (async () => {
                            let resolvedCategoryId = aiData.categoryId;
                            try {
                                const catRes = await fetch(CATEGORY_API_URL, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ title: aiData.title, keyFeatures: aiData.keyFeatures || [], description: aiData.markdownDescription || '' })
                                });
                                if (catRes.ok) {
                                    const catData = await catRes.json();
                                    resolvedCategoryId = catData.categoryId;
                                    await docRef.update({
                                        categoryId:     catData.categoryId,
                                        categoryPath:   catData.categoryPath,
                                        categorySource: catData.confidence === 'High' ? 'AI Verified' : 'AI Predicted',
                                        conditionId:    sanitizeConditionId(batchCondition, catData.categoryId)
                                    });
                                }
                            } catch(e) { console.warn('Category resolve failed:', e.message); }
                            // Auto price research fires after category is resolved.
                            // Post-remediation: uses Gemini independent knowledge only.
                            // No eBay marketplace data is used in pricing (ALA §9.5 compliant).
                            autoResearchPrice(docRef.id, {
                                title:       aiData.title,
                                conditionId: finalConditionId,
                                categoryId:  resolvedCategoryId,
                                brand:       aiData.brand,
                                model:       aiData.model
                            }).catch(() => {});
                        })();

                        completed++;
                        setStatus(`Processing ${completed}/${total}...`);
                    }));

                    images.forEach(img => URL.revokeObjectURL(img.url));
                    setImages([]); setInventoryFolder('drafts'); setActiveTab('listings'); showToast(`${total} Ad${total !== 1 ? 's' : ''} Generated.`);
                } catch (e) { showToast(e.message || 'Processing failed — check console.', 'error'); console.error('[processImages]', e); } finally { setIsProcessing(false); setStatus(""); }
            };

            // ── Shared price research core ────────────────────────────────────────
            // Used by both the manual Re-Price button and the auto-run after processing.
            // Stores conditionId alongside results so the UI can flag stale prices on condition change.
            const runPriceResearch = async (listing) => {
                const condition = EBAY_CONDITIONS.find(c => c.id === listing.conditionId)?.label || 'Used';
                let prices = null;
                // eBay Browse API call removed — ALA §9.5 compliance — 21 MAR 2026
                // Gemini AI estimate is the sole pricing source.
                if (!prices) {
                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ role: "user", parts: [{ text: `Estimate current eBay market value for: "${listing.title}". Condition: ${condition}. Return ONLY JSON with keys: low, mid, high (all numbers ending in .95), confidence (string: Low/Medium/High), basis (string: brief 1-sentence rationale).` }] }],
                            systemInstruction: { parts: [{ text: "You are an expert resale pricing analyst specializing in general merchandise and tactical gear. Use your independent market knowledge to estimate realistic resale prices. Do NOT reference eBay sold data or any specific marketplace. All prices must end in .95. Return ONLY valid JSON with no markdown or preamble." }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await res.json();
                    const gPrices = JSON.parse(cleanJson(data.candidates[0].content.parts[0].text));
                    // Synthesise strategies from Gemini low/mid/high so the card always
                    // uses the new Move It / Market / Hold layout regardless of data source.
                    prices = {
                        ...gPrices,
                        source: 'AI Estimate', count: null, conditionId: listing.conditionId,
                        strategies: {
                            moveIt: parseFloat((gPrices.low  * 0.97).toFixed(2)),
                            market: parseFloat(Number(gPrices.mid).toFixed(2)),
                            hold:   parseFloat(Number(gPrices.high).toFixed(2))
                        }
                    };
                }
                // Only write buyItNowPrice on first-time auto-price (no existing research).
                // Manual Re-Price refreshes the data but never stomps a price the user set.
                const isFirstRun = !listing.priceResearch && !(localPriceResults[listing.id]);
                const dbUpdate = isFirstRun
                    ? { priceResearch: prices, buyItNowPrice: prices.mid }
                    : { priceResearch: prices };
                await dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`).update(dbUpdate);
                setLocalPriceResults(prev => ({ ...prev, [listing.id]: prices }));
                return prices;
            };

            // Manual Re-Price button — shows spinner, blocks duplicate clicks
            const researchPrice = async (listing) => {
                if (pricingListingId) return;
                setPricingListingId(listing.id);
                try { await runPriceResearch(listing); }
                catch(e) { setErrorMsg("Re-Price Failed."); }
                finally { setPricingListingId(null); }
            };

            // Auto-run — fires silently after a new listing is created, no UI lock.
            // Data source: Gemini independent market knowledge only (ALA §9.5 compliant).
            // eBay Browse/sold data not used. Option C consent required to add eBay data.
            const autoResearchPrice = async (listingId, listingSnapshot) => {
                setAutoPricingIds(prev => new Set([...prev, listingId]));
                try { await runPriceResearch({ id: listingId, ...listingSnapshot }); }
                catch(e) { console.warn('[AutoPrice] Failed for', listingId, ':', e.message); }
                finally { setAutoPricingIds(prev => { const n = new Set(prev); n.delete(listingId); return n; }); }
            };

            // ── Phase 5: Direct Listing Submission ────────────────────────────
            // Calls POST /api/ebay/list which runs the full 3-step Sell Inventory API flow:
            //   PUT inventory_item → POST offer → POST offer/publish
            const listOnEbay = async (listing) => {
                if (!user) return;

                // Guard: double-click / concurrent submission protection (eBay error 25025)
                if (listingInFlight.current.has(listing.id)) return;
                listingInFlight.current.add(listing.id);

                // Guard: policies must be configured
                if (!ebayPolicies || !settings.shippingProfile || !settings.paymentProfile || !settings.returnProfile) {
                    showToast('Configure eBay policies in Settings first', 'error');
                    return;
                }

                // Resolve policy IDs from names stored in settings
                const fulfillmentPolicy = ebayPolicies.fulfillment?.find(p => p.name === settings.shippingProfile);
                const paymentPolicy     = ebayPolicies.payment?.find(p => p.name === settings.paymentProfile);
                const returnPolicy      = ebayPolicies.returns?.find(p => p.name === settings.returnProfile);

                if (!fulfillmentPolicy || !paymentPolicy || !returnPolicy) {
                    const missing = [
                        !fulfillmentPolicy && settings.shippingProfile,
                        !paymentPolicy     && settings.paymentProfile,
                        !returnPolicy      && settings.returnProfile
                    ].filter(Boolean).join(', ');
                    showToast(`eBay policy not found: ${missing}`, 'error');
                    return;
                }

                // Build aspects object from saved spec_* fields
                const aspects = {};
                Object.entries(listing).forEach(([key, val]) => {
                    if (key.startsWith('spec_') && val) {
                        const specName = key.slice(5).replace(/_/g, ' ');
                        aspects[specName] = [String(val)];
                    }
                });

                // Fill mandatory specs not covered by spec_* fields using the same
                // auto-fill logic the UI uses (reads listing.brand, listing.model, etc.)
                const categoryData = validatedCategories[listing.categoryId];
                if (categoryData?.mandatory) {
                    categoryData.mandatory.forEach(spec => {
                        const alreadySet = Object.keys(aspects).some(
                            k => k.toLowerCase().replace(/\s+/g,'') === spec.name.toLowerCase().replace(/\s+/g,'')
                        );
                        if (!alreadySet) {
                            const val = getSpecAutoFill(spec.name, listing, spec.values);
                            if (val) aspects[spec.name] = [String(val)];
                        }
                    });
                }

                // SKU: unique per listing using doc ID
                const sku = `SR-${listing.id}`;

                // Convert markdown description to HTML for eBay listing body
                const description = convertToHtml(listing.markdownDescription || listing.description || '');

                // Auction settings for this listing
                const auctionCfg  = auctionSettings[listing.id] || {};
                const isAuction   = auctionCfg.format === 'auction';

                setListingStatus(prev => ({ ...prev, [listing.id]: 'publishing' }));

                try {
                    const tok = await user.getIdToken();
                    const body = {
                        sku,
                        title:               listing.title,
                        description,
                        price:               listing.buyItNowPrice,
                        categoryId:          listing.categoryId,
                        conditionId:         listing.conditionId,
                        images:              listing.images || [],
                        aspects,
                        fulfillmentPolicyId: fulfillmentPolicy.id,
                        paymentPolicyId:     paymentPolicy.id,
                        returnPolicyId:      returnPolicy.id,
                        listingDocId:        listing.id,
                        format:              isAuction ? 'AUCTION' : 'FIXED_PRICE',
                        listingDuration:     isAuction ? (auctionCfg.duration || 'DAYS_7') : 'GTC'
                    };
                    if (isAuction) {
                        body.startPrice      = auctionCfg.startPrice || '0.99';
                        if (auctionCfg.reservePrice) body.reservePrice    = auctionCfg.reservePrice;
                        if (auctionCfg.binPrice)     body.auctionBinPrice = auctionCfg.binPrice;
                    } else {
                        // Fixed price extras
                        body.quantity = parseInt(auctionCfg.quantity || 1);
                        const validTiers = (auctionCfg.volumeDiscounts || []).filter(d => d.minQty >= 2 && d.pctOff > 0);
                        if (validTiers.length) body.volumeDiscounts = validTiers;
                    }
                    const res = await fetch('/api/ebay/list', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                        body: JSON.stringify(body)
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Listing failed');

                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'live', url: data.listingUrl, listingId: data.listingId, format: isAuction ? 'auction' : 'fixed' } }));
                    showToast(isAuction ? `🔨 Auction live! #${data.listingId}` : `🚀 Listed on eBay! #${data.listingId}`);
                } catch(e) {
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'error', message: e.message } }));
                    showToast(`eBay error: ${e.message}`, 'error');
                } finally {
                    listingInFlight.current.delete(listing.id);
                }
            };

            // ── Bulk list selected Draft items on eBay ────────────────────────────
            // Runs listOnEbay sequentially; continues on failure; reports failures at end.
            const bulkListOnEbay = async () => {
                if (!user || selectedDrafts.size === 0 || bulkListing) return;
                setBulkListing(true);
                const targets = listings.filter(l => selectedDrafts.has(l.id));
                const failed = [];
                for (const l of targets) {
                    try {
                        await listOnEbay(l);
                        // Brief pause between calls to reduce concurrent-modification risk
                        await new Promise(r => setTimeout(r, 400));
                    } catch {
                        failed.push(l.title || l.id);
                    }
                }
                setSelectedDrafts(new Set());
                setBulkListing(false);
                if (failed.length) {
                    showToast(`${failed.length} item(s) failed: ${failed.slice(0,3).join(', ')}${failed.length > 3 ? '…' : ''}`, 'error');
                } else {
                    showToast(`All ${targets.length} items submitted to eBay!`);
                }
            };

            // ── Phase 6: Batch-sync eBay status for all listed cards ──────────────
            // Calls POST /api/ebay/sync-status for every card that has an ebayOfferId,
            // then updates listingStatus in memory (and Firestore, server-side).
            const syncEbayStatus = async (targetListings) => {
                if (!user) return;
                const withOffer = (targetListings || listings).filter(l => l.ebayOfferId);
                if (!withOffer.length) return;
                setEbaySync(true);
                try {
                    const tok = await user.getIdToken();
                    // Process in chunks of 50 (server cap)
                    for (let i = 0; i < withOffer.length; i += 50) {
                        const chunk    = withOffer.slice(i, i + 50);
                        const offerIds = chunk.map(l => l.ebayOfferId);
                        const res = await fetch('/api/ebay/sync-status', {
                            method:  'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                            body:    JSON.stringify({ offerIds })
                        });
                        if (!res.ok) { console.warn('[Sync] batch failed:', await res.text()); continue; }
                        const { results } = await res.json();
                        setListingStatus(prev => {
                            const next = { ...prev };
                            chunk.forEach(l => {
                                const r = results[l.ebayOfferId];
                                if (!r) return;
                                if (r.ebayStatus === 'PUBLISHED') {
                                    next[l.id] = { status: 'live',  url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId, price: r.price, quantity: r.quantity };
                                } else if (r.ebayStatus === 'ENDED') {
                                    next[l.id] = { status: 'ended', url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId };
                                } else if (r.ebayStatus === 'SOLD') {
                                    next[l.id] = { status: 'sold', url: l.ebayListingUrl, listingId: l.ebayListingId, offerId: l.ebayOfferId, soldFor: r.soldDetails?.soldFor, soldTo: r.soldDetails?.soldTo };
                                }
                            });
                            return next;
                        });
                    }
                    setLastSynced(new Date());
                    showToast(`Synced ${withOffer.length} eBay listing${withOffer.length !== 1 ? 's' : ''}`);
                } catch(e) {
                    console.warn('[Sync]', e.message);
                    showToast('eBay sync failed: ' + e.message, 'error');
                } finally {
                    setEbaySync(false);
                }
            };

            // ── Phase 6: Relist an ended/sold item on eBay ────────────────────────
            const relistOnEbay = async (listing) => {
                if (!user) return;
                setListingStatus(prev => ({ ...prev, [listing.id]: 'publishing' }));
                try {
                    const tok = await user.getIdToken();
                    const res = await fetch('/api/ebay/relist', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
                        body:    JSON.stringify({ listingDocId: listing.id })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Relist failed');
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'live', url: data.listingUrl, listingId: data.listingId, offerId: data.offerId } }));
                    showToast(`🔄 Relisted on eBay! #${data.listingId}`);
                } catch(e) {
                    setListingStatus(prev => ({ ...prev, [listing.id]: { status: 'error', message: e.message } }));
                    showToast(`Relist error: ${e.message}`, 'error');
                }
            };

            if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><Icon name="Loader2" size={48} className="text-blue-600 animate-spin" /></div>;

            // ── Access Denied screen ──────────────────────────────────────────
            if (accessDenied) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-red-200 text-center">
                        <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                            <Icon name="ShieldX" size={28} className="text-red-500"/>
                        </div>
                        <h2 className="text-lg font-black text-red-700 uppercase tracking-tight mb-2">Access Denied</h2>
                        <p className="text-sm text-slate-500 mb-6">Your account has not been approved for Scout Recon. Contact the administrator to request access.</p>
                        <button onClick={() => { setAccessDenied(false); }} className="w-full py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-700 text-sm uppercase tracking-widest">Back to Login</button>
                    </div>
                </div>
            );

            // Surface init errors (bad env vars, network down, etc.) — prevents silent white screen
            if (errorMsg && !user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-red-200">
                        <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mb-6">
                            <Icon name="AlertTriangle" size={28} className="text-red-500"/>
                        </div>
                        <h2 className="text-lg font-black text-red-700 uppercase tracking-tight mb-2">Access Bridge Failure</h2>
                        <p className="text-sm font-bold text-slate-600 mb-4">{errorMsg}</p>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Checklist:</p>
                        <ul className="text-xs text-slate-500 space-y-1 list-disc list-inside mb-6">
                            <li>Node server running on port 3001?</li>
                            <li>.env has all FIREBASE_* keys set?</li>
                            <li>GEMINI_API_KEY present?</li>
                            <li>CLOUDINARY_* vars configured?</li>
                        </ul>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-red-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-500 transition-all">
                            Retry
                        </button>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="max-w-md w-full auth-card rounded-[3rem] shadow-2xl p-10 border border-slate-200 animate-in fade-in zoom-in-95 duration-500">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200 shadow-blue-200/50"><Icon name="Shield" size={40} className="text-white" /></div>
                            <h1 className="text-3xl font-black uppercase tracking-tight">Scout Recon</h1>
                            <p className="text-blue-600 text-xs font-black uppercase tracking-[0.3em] mt-2">Access Bridge Perimeter</p>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mt-1">Black Knight Armament Logistics</p>
                        </div>
                        <button onClick={handleGoogleAuth} className="w-full bg-white border border-slate-200 text-slate-700 font-bold py-4 rounded-2xl shadow-sm flex items-center justify-center gap-3 hover:bg-slate-50 active:scale-95 text-sm mb-3 transition-all">

                if (!barcodeListingData || !user) return;
                setIsProcessing(true);
                setActiveTab('process');
                try {
                    const listingsPath = getListingsPath(user.uid);
                    setStatus('Generating listing from barcode data...');

                    // Use SerpApi image URL directly  -  proxy fetch to b64 for Gemini
                    let imageUrls = [];
                    let b64Parts = [];
                    if (barcodeListingData.image) {
                        try {
                            const imgRes = await fetch('/api/proxy-image', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ url: barcodeListingData.image })
                            });
                            if (imgRes.ok) {
                                const { b64, mimeType, cloudinaryUrl } = await imgRes.json();
                                if (cloudinaryUrl) imageUrls = [cloudinaryUrl];
                                if (b64) b64Parts = [{ inlineData: { mimeType, data: b64 } }];
                            }
                        } catch(e) { console.warn('[Barcode Listing] Image proxy failed:', e.message); }
                    }

                    const contextHint = barcodeListingData.title
                        ? 'Item: ' + barcodeListingData.title + (barcodeListingData.price ? '  -  Market price: ' + barcodeListingData.price : '') + '. UPC: ' + (barcodeListingData.upc || '') + '. Generate a complete eBay listing.'
                        : 'Generate a complete eBay listing from the item image.';

                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ role: 'user', parts: [{ text: contextHint }, ...b64Parts] }],
                            systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: 'application/json', responseSchema: JSON_SCHEMA }
                        })
                    });
                    const result = await res.json();
                    const aiData = JSON.parse(cleanJson(result.candidates[0].content.parts[0].text));

                    // Category resolve
                    let finalSource = 'UNMAPPED';
                    try {
                        const catRes = await fetch(CATEGORY_API_URL, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: aiData.title, keyFeatures: aiData.keyFeatures || [], description: aiData.markdownDescription || '' })
                        });
                        if (catRes.ok) {
                            const catData = await catRes.json();
                            aiData.categoryId = catData.categoryId;
                            aiData.categoryPath = catData.categoryPath;
                            finalSource = catData.confidence === 'High' ? 'AI Verified' : 'AI Predicted';
                        }
                    } catch(e) { console.warn('[Barcode Listing] Category resolve failed:', e.message); }

                    aiData.categorySource = finalSource;
                    const currentCondition = EBAY_CONDITIONS.find(ec => ec.id === batchCondition)?.label || 'Used';
                    const newDocRef = await dbRef.current.collection(listingsPath).add({
                        ...aiData,
                        images: imageUrls,
                        conditionId: batchCondition,
                        timestamp: Date.now(),
                        sku: 'BKA-' + Date.now(),
                        markdownDescription: buildDescription(aiData, currentCondition, settings.adFooter),
                        upc: barcodeListingData.upc || '',
                        buyItNowPrice: barcodeListingData.price ? parseFloat(String(barcodeListingData.price).replace(/[^0-9.]/g,'')) || aiData.buyItNowPrice || 0 : aiData.buyItNowPrice || 0
                    });

                    // Auto-run price research on the new listing (non-blocking)
                    runPriceResearch({ id: newDocRef.id, ...aiData, conditionId: batchCondition });

                    setBarcodeListingData(null);
                    setInventoryFolder('drafts');
                    setActiveTab('listings');
                    showToast('Barcode listing generated successfully.');
