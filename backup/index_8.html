<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JDINJAX eBay Listing Pro</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JDINJAX">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">

    <!-- Android / Theme -->
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const APP_VERSION = "3.7.2";

        const _host    = window.location.hostname;
        const _isLocal = (_host === '127.0.0.1' || _host === 'localhost' || _host === '');
        const PROXY_API_URL    = _isLocal ? 'http://127.0.0.1:3001/api/gemini' : '/api/gemini';
        const PROXY_HEALTH_URL = _isLocal ? 'http://127.0.0.1:3001/health'     : '/health';
        const CONFIG_URL       = _isLocal ? 'http://127.0.0.1:3001/api/config' : '/api/config';
        const SCRAPER_API_URL  = _isLocal ? 'http://127.0.0.1:3001/api/category-lookup' : '/api/category-lookup';

        let firebaseConfig    = null;
        let CLOUDINARY_CONFIG = null;

        const fetchAppConfig = async () => {
            const res = await fetch(CONFIG_URL);
            if (!res.ok) throw new Error('Failed to load app config.');
            const cfg = await res.json();
            firebaseConfig    = cfg.firebase;
            CLOUDINARY_CONFIG = cfg.cloudinary;
        };

        const getListingsPath = (uid) => `artifacts/jdinjax-console/users/${uid}/listings`;

        const EBAY_CONDITIONS = [
            { id: '1000', label: 'New',                      short: 'NEW'      },
            { id: '1500', label: 'New — Other',              short: 'NEW-OTH'  },
            { id: '1750', label: 'New — Open Box',           short: 'OPEN-BOX' },
            { id: '2000', label: 'Seller Refurbished',       short: 'REFURB'   },
            { id: '2500', label: 'Used — Like New',          short: 'LIKE-NEW' },
            { id: '3000', label: 'Used — Good',              short: 'USED-GD'  },
            { id: '4000', label: 'Used — Acceptable',        short: 'USED-OK'  },
            { id: '7000', label: 'For Parts / Not Working',  short: 'PARTS'    },
        ];

        const SHIPPING_PROFILES = [
            { id: 'flat_695',       label: 'Flat Rate — $6.95',            service: 'USPSGroundAdvantage', type: 'Flat',     cost: '6.95'  },
            { id: 'usps_fr_small',  label: 'USPS Flat Rate — Small Box',  service: 'USPSPriority',      type: 'Flat',       cost: '9.85'  },
            { id: 'usps_fr_medium', label: 'USPS Flat Rate — Medium Box', service: 'USPSPriority',      type: 'Flat',       cost: '16.10' },
            { id: 'usps_fr_large',  label: 'USPS Flat Rate — Large Box',  service: 'USPSPriority',      type: 'Flat',       cost: '21.90' },
            { id: 'usps_priority',  label: 'USPS Priority (Calculated)',   service: 'USPSPriority',      type: 'Calculated', cost: '0'     },
            { id: 'ups_ground',     label: 'UPS Ground (Calculated)',      service: 'UPS',               type: 'Calculated', cost: '0'     },
            { id: 'free_shipping',  label: 'Free Shipping — USPS Priority',service: 'USPSPriority',      type: 'Flat',       cost: '0'     },
            { id: 'freight',        label: 'Freight / LTL',                service: 'FreightShipping',   type: 'Flat',       cost: '0'     },
        ];

        const JDINJAX_SYSTEM_PROMPT = `
SYSTEM PROMPT — JDINJAX eBay Listing Pro Agent
Role: Professional eBay Listing Generator for firearms/reloading niche (Black Knight Armament).
Title Rule: STRICT MAX 80 CHARACTERS.
Structure: Condition, Key Features, What's Included, Visible Flaws, Weights, Dimensions.
Format: JSON only.
`;

        const JSON_SCHEMA = {
            type: "OBJECT",
            properties: {
                title:          { type: "STRING" },
                categoryPath:   { type: "STRING" },
                categoryId:     { type: "STRING" },
                buyItNowPrice:  { type: "NUMBER" },
                keyFeatures:    { type: "ARRAY", items: { type: "STRING" } },
                whatsIncluded:  { type: "ARRAY", items: { type: "STRING" } },
                flaws:          { type: "STRING" },
                weightItem:     { type: "STRING" },
                weightPackaging:{ type: "STRING" },
                weightTotal:    { type: "STRING" },
                dimensions:     { type: "STRING" }
            },
            required: ["title", "buyItNowPrice", "categoryId", "categoryPath", "weightItem", "dimensions"]
        };

        const PRICE_SCHEMA = {
            type: "OBJECT",
            properties: {
                low: { type: "NUMBER" },
                mid: { type: "NUMBER" },
                high: { type: "NUMBER" },
                confidence: { type: "STRING" },
                basis: { type: "STRING" }
            },
            required: ["low", "mid", "high", "confidence", "basis"]
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    ref.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({ attrs: { 'stroke-width': 2, 'width': size, 'height': size } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-block align-middle leading-none ${className}`}></span>;
        };

        const App = () => {
            const [images, setImages]                   = useState([]);
            const [listings, setListings]               = useState([]);
            const [isProcessing, setIsProcessing]       = useState(false);
            const [status, setStatus]                   = useState("");
            const [activeTab, setActiveTab]             = useState('process');
            const [processMode, setProcessMode]         = useState('bulk');
            const [user, setUser]                       = useState(null);
            const [errorMsg, setErrorMsg]               = useState(null);
            const [toast, setToast]                     = useState("");
            const [proxyOnline, setProxyOnline]         = useState(null);
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [tempCategoryData, setTempCategoryData]   = useState({ id: '', path: '' });
            const [pricingListingId, setPricingListingId]   = useState(null);
            const [isFetchingId, setIsFetchingId]       = useState(false);

            const dbRef = useRef(null);

            useEffect(() => {
                fetch(PROXY_HEALTH_URL).then(r => setProxyOnline(r.ok)).catch(() => setProxyOnline(false));
                const init = async () => {
                    try {
                        await fetchAppConfig();
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                        dbRef.current = firebase.firestore();
                        const auth = firebase.auth();
                        await auth.signInAnonymously();
                        auth.onAuthStateChanged(u => setUser(u));
                    } catch (e) { setErrorMsg("Setup Error: " + e.message); }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const listingsPath = getListingsPath(user.uid);
                const unsubscribe = dbRef.current.collection(listingsPath).onSnapshot(snap => {
                    setListings(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    setErrorMsg("Sync error: " + err.message);
                });
                return () => unsubscribe();
            }, [user]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };

            const cleanAIResponse = (text) => {
                return text.replace(/```json/g, '').replace(/```/g, '').trim();
            };

            const buildJDINJAXDescriptions = (data) => {
                const policies = {
                    offer:    "Please don't hesitate to make a reasonable offer. A majority of our sales are concluded this way.",
                    returns:  "Buyer is responsible for return shipping on any item that is not damaged, defective, or as described.",
                    shipping: "Items are shipped as fast as possible after payment is processed. This typically results in same-day shipping if payment is received before noon (Mon–Fri).",
                    delivery: "We Do Not Ship Outside of the Continental U.S. or to P.O. Boxes.",
                    feedback: "We take our reputation seriously. If you are unsatisfied with your order, please give us an opportunity to resolve it to your satisfaction before leaving negative feedback."
                };
                const features = (data.keyFeatures  || []).map(f => `• ${f}`).join('\n');
                const included = (data.whatsIncluded || []).map(i => `• ${i}`).join('\n');

                return `Description\nCondition: New\n\nKey Features:\n${features}\n\nWhat's Included:\n${included}\n\nVisible Flaws:\n${data.flaws || "None observed"}\n\nShipping Estimates:\n- Item Weight: ${data.weightItem || 'TBD'}\n- Packaging Weight: ${data.weightPackaging || 'TBD'}\n- Total Weight: ${data.weightTotal || 'TBD'}\n- Dimensions: ${data.dimensions || 'TBD'}\n\nMaking an Offer\n${policies.offer}\n\nReturn Policy\n${policies.returns}\n\nShipping\n${policies.shipping}\n\nDelivery\n${policies.delivery}\n\nFeedback\n${policies.feedback}`.trim();
            };

            const generateJDINJAXListing = async (files, promptText) => {
                const b64s = await Promise.all(files.map(file => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 1200;
                            let width = img.width, height = img.height;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
                        };
                    };
                    reader.onerror = reject;
                })));

                const res = await fetch(PROXY_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gemini-2.5-flash",
                        contents: [{ role: "user", parts: [{ text: promptText }, ...b64s.map(b => ({ inlineData: { mimeType: "image/jpeg", data: b } }))] }],
                        systemInstruction: { parts: [{ text: JDINJAX_SYSTEM_PROMPT }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: JSON_SCHEMA
                        }
                    })
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error?.message || "AI Error");
                
                const rawData = JSON.parse(cleanAIResponse(result.candidates[0].content.parts[0].text));
                if (rawData.title) rawData.title = rawData.title.substring(0, 80).trim();
                return rawData;
            };

            const processImages = async (mode) => {
                if (!user) return;
                const step = mode === 'bulk' ? 4 : 1;
                const total = Math.floor(images.length / step);
                if (total === 0) return;

                setIsProcessing(true);
                try {
                    const listingsPath = getListingsPath(user.uid);
                    for (let i = 0; i < total; i++) {
                        const batch = images.slice(i * step, (i * step) + step);
                        setStatus(`Processing Ad ${i+1}/${total}: Analyzing...`);
                        
                        const urls = await Promise.all(batch.map(async img => {
                            const fd = new FormData();
                            fd.append("file", img.file);
                            fd.append("upload_preset", CLOUDINARY_CONFIG.uploadPreset);
                            const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`, { method: "POST", body: fd });
                            const d = await r.json(); return d.secure_url;
                        }));

                        const aiData = await generateJDINJAXListing(batch.map(b => b.file), `Analyze items and generate structured eBay listing data. Return JSON.`);

                        // ── LOCAL DB TAXONOMY PAIRING ──
                        try {
                            const params = new URLSearchParams({ title: aiData.title, predictedPath: aiData.categoryPath });
                            const dbRes = await fetch(`${SCRAPER_API_URL}?${params.toString()}`);
                            if (dbRes.ok) {
                                const dbData = await dbRes.json();
                                aiData.categoryId = dbData.categoryId;
                                aiData.categoryPath = dbData.categoryPath;
                            }
                        } catch (e) { console.warn("Pairing error"); }

                        await dbRef.current.collection(listingsPath).add({
                            ...aiData,
                            images: urls,
                            markdownDescription: buildJDINJAXDescriptions(aiData),
                            conditionId: '1000',
                            shippingProfile: 'ups_ground',
                            timestamp: Date.now()
                        });
                    }
                    setImages(images.slice(total * step));
                    setActiveTab('listings');
                    showToast(`${total} Ads Build Complete.`);
                } catch (e) { setErrorMsg(e.message); }
                finally { setIsProcessing(false); setStatus(""); }
            };

            const researchPrice = async (listing) => {
                if (pricingListingId) return;
                setPricingListingId(listing.id);
                try {
                    const res = await fetch(PROXY_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            contents: [{ parts: [{ text: `Estimate eBay market price for: ${listing.title}. Return a JSON object with: low (number), mid (number, recommended price), high (number), confidence (HIGH/MEDIUM/LOW), basis (string under 80 chars).` }] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: PRICE_SCHEMA
                            }
                        })
                    });
                    
                    if (!res.ok) throw new Error("Price Intel Server Error");
                    
                    const result = await res.json();
                    const text = cleanAIResponse(result.candidates[0].content.parts[0].text);
                    const prices = JSON.parse(text);

                    await dbRef.current.doc(`${getListingsPath(user.uid)}/${listing.id}`).update({ 
                        priceResearch: prices, 
                        buyItNowPrice: prices.mid 
                    });
                    showToast("Market Intelligence Applied.");
                } catch (e) { 
                    console.error(e);
                    setErrorMsg("Research Failed: Ensure your local server is running v3.7.0+");
                }
                finally { setPricingListingId(null); }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl animate-in fade-in slide-in-from-top-4">{toast}</div>}

                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <div>
                            <h1 className="text-2xl font-black flex items-center gap-3">
                                <Icon name="Package" className="text-blue-600" size={32} />
                                JDINJAX <span className="text-blue-600">CONSOLE</span>
                            </h1>
                            <p className="text-[10px] font-black uppercase opacity-60">v{APP_VERSION} • {proxyOnline ? '✅ Proxy Active' : '❌ Proxy Offline'}</p>
                        </div>
                        <nav className="flex bg-white rounded-xl shadow-sm p-1 border border-slate-200">
                            <button onClick={() => setActiveTab('process')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'process' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>PROCESSOR</button>
                            <button onClick={() => setActiveTab('listings')} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === 'listings' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>INVENTORY ({listings.length})</button>
                        </nav>
                    </header>

                    {errorMsg && <div className="mb-6 p-4 bg-red-50 text-red-600 rounded-xl flex justify-between font-bold text-sm"><span>{errorMsg}</span><button onClick={() => setErrorMsg(null)}><Icon name="X" size={16}/></button></div>}

                    <main>
                        {activeTab === 'process' ? (
                            <section className="space-y-6 animate-in fade-in">
                                <div className="flex bg-white rounded-2xl p-1 border border-slate-200 shadow-sm w-fit mx-auto md:mx-0">
                                    <button onClick={() => setProcessMode('single')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${processMode === 'single' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Single Ad Mode</button>
                                    <button onClick={() => setProcessMode('bulk')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${processMode === 'bulk' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Bulk Ad Mode (4:1)</button>
                                </div>

                                <div className="bg-blue-50 border border-blue-100 rounded-2xl p-5">
                                    <h4 className="text-[10px] font-black uppercase text-blue-600 mb-1 flex items-center gap-2"><Icon name="Info" size={14} /> {processMode === 'single' ? 'Single Submission Mode' : 'Bulk submission Mode'}</h4>
                                    <p className="text-xs text-blue-800 leading-relaxed italic">{processMode === 'single' ? "Generates one unique listing for every individual photo. Best for unique parts." : "Generates one detailed listing for every 4 photos. Best for die sets and assemblies."}</p>
                                </div>

                                <div className="bg-white border-2 border-dashed border-slate-300 rounded-[2.5rem] p-12 text-center hover:border-blue-400 relative group transition-all">
                                    <input id="fileInput" type="file" multiple accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => {
                                        const f = Array.from(e.target.files).map(file => ({ id: Math.random().toString(36), url: URL.createObjectURL(file), file }));
                                        setImages([...images, ...f]);
                                    }} />
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors"><Icon name="Upload" size={28} /></div>
                                    <h3 className="text-lg font-black uppercase tracking-tight">Load Assets</h3>
                                    <p className="text-slate-400 text-xs mt-2 italic">Exactly 4 photos per ad for optimal batch processing.</p>
                                </div>

                                {images.length > 0 && (
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="p-4 grid grid-cols-4 sm:grid-cols-8 gap-3 max-h-64 overflow-y-auto no-scrollbar">
                                            {images.map(img => (
                                                <div key={img.id} className="aspect-square rounded-xl overflow-hidden border border-slate-100 relative group">
                                                    <img src={img.url} className="w-full h-full object-cover" />
                                                    <button onClick={() => setImages(images.filter(i => i.id !== img.id))} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2" size={12}/></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 bg-slate-50 border-t flex flex-col gap-3">
                                            <button 
                                                disabled={isProcessing || !proxyOnline} 
                                                onClick={() => processImages(processMode)} 
                                                className={`w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 ${processMode === 'single' ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                                            >
                                                {isProcessing ? <Icon name="Loader2" className="animate-spin" /> : <Icon name="Zap" size={16}/>}
                                                {isProcessing ? status : `Generate ${processMode === 'single' ? images.length : Math.floor(images.length / 4)} Ad(s) in ${processMode === 'single' ? 'Single' : 'Bulk'} Mode`}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </section>
                        ) : (
                            <div className="space-y-6 animate-in fade-in">
                                {listings.sort((a,b)=>b.timestamp-a.timestamp).map(l => (
                                    <div key={l.id} className="bg-white rounded-[2rem] border border-slate-200 flex flex-col md:flex-row overflow-hidden shadow-sm hover:border-blue-300 transition-all">
                                        <div className="md:w-72 h-72 md:h-auto shrink-0 bg-slate-50 border-r border-slate-100 relative">
                                            <img src={l.images?.[0]} className="w-full h-full object-cover" />
                                            <div className="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">{l.images?.length} Assets</div>
                                        </div>
                                        <div className="p-8 flex-grow">
                                            <div className="flex justify-between items-start mb-4">
                                                {editingCategoryId === l.id ? (
                                                    <div className="flex flex-col gap-3 w-full mr-4 bg-blue-50/50 p-5 rounded-3xl border border-blue-200 animate-in slide-in-from-top-2 shadow-inner">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-[10px] font-black uppercase tracking-widest text-blue-800">Tactical Override</span>
                                                            <button onClick={async () => {
                                                                setIsFetchingId(true);
                                                                try {
                                                                    const query = encodeURIComponent((l.title || '').split(' ').slice(0, 4).join(' '));
                                                                    const res = await fetch(`${SCRAPER_API_URL}?title=${query}&predictedPath=${encodeURIComponent(l.categoryPath)}`);
                                                                    const data = await res.json();
                                                                    if (data.categoryId) {
                                                                        setTempCategoryData({ id: data.categoryId, path: data.categoryPath });
                                                                        showToast("ID Auto-Resolved!");
                                                                    } else { throw new Error("No ID found"); }
                                                                } catch (err) { setErrorMsg("Auto-fetch failed. Proxy might be offline."); }
                                                                finally { setIsFetchingId(false); }
                                                            }} className="text-[10px] font-black text-white bg-blue-600 hover:bg-blue-700 flex items-center gap-1.5 px-3 py-1.5 rounded-xl shadow-sm transition-all active:scale-95 disabled:bg-slate-300">
                                                                {isFetchingId ? <Icon name="Loader2" size={12} className="animate-spin" /> : <Icon name="Zap" size={12}/>} Auto-Fetch ID
                                                            </button>
                                                        </div>
                                                        <input className="text-xs font-bold border border-blue-200 rounded-xl px-4 py-3 bg-white text-blue-800 w-full focus:outline-none focus:border-blue-500 transition-all" value={tempCategoryData.path} onChange={(e) => setTempCategoryData({...tempCategoryData, path: e.target.value})} placeholder="Official Category Path" />
                                                        <div className="flex gap-2">
                                                            <input className="text-sm font-black border border-blue-200 rounded-xl px-4 py-3 bg-white text-slate-900 flex-grow focus:outline-none focus:border-blue-500 transition-all" value={tempCategoryData.id} onChange={(e) => setTempCategoryData({...tempCategoryData, id: e.target.value})} placeholder="Numeric Leaf ID" />
                                                            <button onClick={async () => {
                                                                await dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({ categoryId: tempCategoryData.id, categoryPath: tempCategoryData.path });
                                                                setEditingCategoryId(null); showToast("Saved!");
                                                            }} className="bg-blue-600 text-white px-5 rounded-xl hover:bg-blue-700 shadow-md transition-all font-black uppercase text-[10px] tracking-widest flex items-center gap-2"><Icon name="Save" size={16}/> Save</button>
                                                            <button onClick={() => setEditingCategoryId(null)} className="bg-white text-slate-400 px-4 rounded-xl border border-slate-200 hover:bg-slate-50 transition-all"><Icon name="X" size={16}/></button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full uppercase tracking-widest border border-blue-100 shadow-sm flex items-center gap-2 group/cat">
                                                            {l.categoryPath || 'Identifying...'}
                                                            <button onClick={() => { setEditingCategoryId(l.id); setTempCategoryData({ id: l.categoryId, path: l.categoryPath }); }} className="opacity-0 group-hover/cat:opacity-100 transition-opacity hover:text-blue-800"><Icon name="Edit2" size={10}/></button>
                                                        </span>
                                                        <div className="flex flex-col items-end">
                                                            <span className="text-2xl font-black text-slate-900 tracking-tighter">${(l.buyItNowPrice || 0).toFixed(2)}</span>
                                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Leaf ID: {l.categoryId}</span>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                            
                                            <div className="mb-4">
                                                <h3 className="text-xl font-black text-slate-900 uppercase leading-tight">{l.title}</h3>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">{l.title?.length}/80 chars</p>
                                            </div>

                                            <div className="bg-slate-50 border border-slate-200 rounded-3xl p-5 mb-6 shadow-inner">
                                                <div className="whitespace-pre-wrap text-[11px] font-mono text-slate-600 h-48 overflow-y-auto no-scrollbar leading-relaxed">{l.markdownDescription}</div>
                                            </div>

                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-5 rounded-3xl border border-slate-200 mb-6">
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Item Weight</p><p className="text-xs font-bold text-slate-800">{l.weightItem || 'TBD'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Packaging</p><p className="text-xs font-bold text-slate-800">{l.weightPackaging || 'TBD'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Total Wt</p><p className="text-xs font-bold text-slate-800">{l.weightTotal || 'TBD'}</p></div>
                                                <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Dimensions</p><p className="text-xs font-bold text-slate-800">{l.dimensions || 'TBD'}</p></div>
                                            </div>

                                            <div className="flex flex-col md:flex-row gap-4 mb-6">
                                                <div className="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Item Condition</span>
                                                    <select value={l.conditionId || '1000'} onChange={e => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({conditionId: e.target.value})} className="w-full bg-transparent text-xs font-black uppercase focus:outline-none cursor-pointer">{EBAY_CONDITIONS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>
                                                </div>
                                                <div className="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Shipping Profile</span>
                                                    <select value={l.shippingProfile || 'ups_ground'} onChange={e => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).update({shippingProfile: e.target.value})} className="w-full bg-transparent text-xs font-black uppercase focus:outline-none cursor-pointer">{SHIPPING_PROFILES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select>
                                                </div>
                                            </div>

                                            <div className="bg-gradient-to-br from-blue-50 to-slate-50 rounded-2xl p-5 border border-blue-100 mb-6 shadow-sm">
                                                <div className="flex items-center justify-between mb-4">
                                                    <span className="text-[9px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                                                        <Icon name="TrendingUp" size={14}/> Price Intelligence
                                                    </span>
                                                    <button
                                                        onClick={() => researchPrice(l)}
                                                        disabled={pricingListingId === l.id}
                                                        className="text-[9px] font-black uppercase tracking-widest bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl flex items-center gap-2 transition-all active:scale-95 disabled:bg-slate-200 disabled:text-slate-400 shadow-md"
                                                    >
                                                        {pricingListingId === l.id ? <><Icon name="Loader2" size={10} className="animate-spin"/> Researching...</> : <><Icon name="Search" size={10}/> {l.priceResearch ? 'Refresh Intel' : 'Get Research'}</>}
                                                    </button>
                                                </div>
                                                {l.priceResearch ? (
                                                    <div className="animate-in fade-in duration-500">
                                                        <div className="flex items-end gap-4 mb-3">
                                                            <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">Low</span><span className="text-sm font-black text-slate-500">${l.priceResearch.low?.toFixed(2)}</span></div>
                                                            <div className="flex-1 text-center bg-white rounded-2xl px-4 py-3 border border-blue-200 shadow-sm ring-2 ring-blue-50">
                                                                <span className="text-[8px] text-blue-500 font-black uppercase block mb-1">Recommended</span>
                                                                <span className="text-2xl font-black text-blue-700">${l.priceResearch.mid?.toFixed(2)}</span>
                                                            </div>
                                                            <div className="text-center"><span className="text-[8px] text-slate-400 font-black uppercase block mb-1">High</span><span className="text-sm font-black text-slate-500">${l.priceResearch.high?.toFixed(2)}</span></div>
                                                            <span className={`text-[8px] font-black px-2 py-1 rounded-lg uppercase tracking-widest bg-green-100 text-green-700 shadow-sm`}>{l.priceResearch.confidence} Confidence</span>
                                                        </div>
                                                        <p className="text-[10px] text-slate-600 italic leading-relaxed border-l-2 border-blue-200 pl-3">{l.priceResearch.basis}</p>
                                                    </div>
                                                ) : <p className="text-[10px] text-slate-400 italic">Click Research Price to analyze market value.</p>}
                                            </div>

                                            <div className="flex items-center justify-between border-t border-slate-100 pt-6">
                                                <div className="flex gap-4">
                                                    <button onClick={async () => { await navigator.clipboard.writeText(l.markdownDescription); showToast("Desc Copied!"); }} className="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-slate-200 flex items-center gap-2 active:scale-95 shadow-sm"><Icon name="Clipboard" size={14}/> Copy Desc</button>
                                                    <button onClick={async () => { const photoUrls = (l.images || []).join('\n'); await navigator.clipboard.writeText(photoUrls); showToast("Photo URLs Copied!"); }} className="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest border border-slate-200 hover:bg-slate-50 transition-all flex items-center gap-2 active:scale-95 shadow-sm"><Icon name="Image" size={14}/> Photo Links</button>
                                                </div>
                                                <button onClick={() => dbRef.current.doc(`${getListingsPath(user.uid)}/${l.id}`).delete()} className="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all active:scale-90"><Icon name="Trash2" size={22}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-8 border-t text-center text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 opacity-60 italic">© 2026 JDINJAX AUTOMATION • BLACK KNIGHT ARMAMENT • v{APP_VERSION}</footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
