<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a2233"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Gold border frame -->
  <rect x="28" y="28" width="456" height="456" rx="48" fill="none" stroke="url(#gold)" stroke-width="8" filter="url(#glow)" opacity="0.85"/>

  <!-- Inner subtle border -->
  <rect x="44" y="44" width="424" height="424" rx="36" fill="none" stroke="#92400e" stroke-width="2" opacity="0.4"/>

  <!-- ELA — bold centered -->
  <text x="256" y="320"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="220"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="-8">ELA</text>

  <!-- Thin gold underline rule -->
  <line x1="80" y1="358" x2="432" y2="358" stroke="url(#gold)" stroke-width="4" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="256" y="410"
        font-family="Arial, sans-serif"
        font-size="36"
        font-weight="700"
        fill="#94a3b8"
        text-anchor="middle"
        letter-spacing="6">LISTING AGENT</text>
</svg>
